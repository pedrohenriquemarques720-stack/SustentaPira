        }
        return L.divIcon({
            html: `<div style="background-color: #2c5e2e; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.3);">${iconHtml}</div>`,
            className: 'custom-marker',
            iconSize: [34, 34],
            popupAnchor: [0, -15]
        });
    }

    // Adicionar marcadores com popup completo
    function adicionarMarcadores(filtro = 'todos') {
        // Remove todos os marcadores atuais
        markers.forEach(marker => map.removeLayer(marker));
        markers = [];

        let pontosFiltrados = pontosColeta;
        if (filtro !== 'todos') {
            pontosFiltrados = pontosColeta.filter(p => p.tipo === filtro);
        }

        pontosFiltrados.forEach(ponto => {
            const icone = getIconForType(ponto.tipo);
            // Criar conteúdo HTML do popup com todas as informações
            const estrelas = '★'.repeat(Math.round(ponto.avaliacao)) + '☆'.repeat(5 - Math.round(ponto.avaliacao));
            const popupContent = `
                <div class="custom-popup" style="min-width: 240px;">
                    <div class="popup-title">${ponto.nome}</div>
                    <div class="popup-detail"><i class="fas fa-tag"></i> <strong>${ponto.tipo}</strong></div>
                    <div class="popup-detail"><i class="fas fa-map-pin"></i> ${ponto.endereco}</div>
                    <div class="popup-detail"><i class="fas fa-clock"></i> ${ponto.horario}</div>
                    <div class="popup-detail"><i class="fas fa-phone-alt"></i> ${ponto.telefone}</div>
                    <div class="popup-detail"><i class="fas fa-star" style="color: #ffb800;"></i> ${estrelas} (${ponto.avaliacao})</div>
                    <div class="badge-cat"><i class="fas fa-recycle"></i> Material: ${ponto.categoria === 'geral' ? 'Resíduos diversos' : ponto.categoria}</div>
                    <div class="popup-footer">
                        <i class="fas fa-leaf"></i> Ponto oficial • Piracicaba Sustentável
                    </div>
                </div>
            `;
            
            const marker = L.marker([ponto.lat, ponto.lng], { icon: icone })
                .bindPopup(popupContent, { maxWidth: 300, className: 'eco-popup' })
                .addTo(map);
            
            markers.push(marker);
        });
        
        // Atualizar contador visual
        document.getElementById('totalPontos').innerText = pontosFiltrados.length;
    }

    // Inicializar com todos os pontos
    adicionarMarcadores('todos');

    // Funções de zoom customizadas
    document.getElementById('zoomInBtn').addEventListener('click', () => {
        map.zoomIn();
    });
    document.getElementById('zoomOutBtn').addEventListener('click', () => {
        map.zoomOut();
    });

    // Sistema de filtros com botões interativos
    const filterBtns = document.querySelectorAll('.filter-btn');
    let filtroAtual = 'todos';

    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const filtro = btn.getAttribute('data-filter');
            filtroAtual = filtro;
            // Atualizar UI dos botões
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            adicionarMarcadores(filtro);
        });
    });

    document.getElementById('resetFilterBtn').addEventListener('click', () => {
        filtroAtual = 'todos';
        filterBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('.filter-btn[data-filter="todos"]').classList.add('active');
        adicionarMarcadores('todos');
    });

    // Ajustar viewport para mostrar todos os pontos no início (opcional: fitBounds)
    function ajustarZoomParaTodos() {
        const bounds = L.latLngBounds(pontosColeta.map(p => [p.lat, p.lng]));
        map.fitBounds(bounds, { padding: [50, 50] });
    }
    // Pequeno delay para garantir que o mapa carregou
    setTimeout(() => {
        ajustarZoomParaTodos();
    }, 500);

    // Adicionar legenda rápida
    const legend = L.control({ position: 'bottomleft' });
    legend.onAdd = function() {
        const div = L.DomUtil.create('div', 'info legend');
        div.style.backgroundColor = 'white';
        div.style.padding = '10px 14px';
        div.style.borderRadius = '20px';
        div.style.boxShadow = '0 2px 10px rgba(0,0,0,0.2)';
        div.style.fontSize = '12px';
        div.style.fontWeight = '500';
        div.innerHTML = '<strong><i class="fas fa-info-circle"></i> Dica:</strong> Clique nos marcadores para expandir e ver todos os detalhes do ponto.';
        return div;
    };
    legend.addTo(map);

    // Mensagem de boas-vindas no console
    console.log('🌿 Mapa interativo de Piracicaba carregado! Use os botões + e - para zoom, e clique nos pontos para informações completas.');
</script>
</body>
</html>
