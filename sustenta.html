<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SustentaPira · Ranking Real</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #FFFFFF; color: #5d3a1a; min-height: 100vh; }
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 20px; background: #FFFFFF; z-index: 1000; transition: opacity 0.5s ease, visibility 0.5s ease; overflow-y: auto; }
        .login-screen.hidden { opacity: 0; visibility: hidden; }
        .auth-wrapper { width: 100%; max-width: 500px; margin: auto; }
        .auth-card { background: #F5F5F5; border-radius: 32px; padding: 40px 30px; border: 1px solid #8b5a2b; box-shadow: 0 10px 30px rgba(93, 58, 26, 0.1); animation: fadeInUp 0.6s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 64px; margin-bottom: 10px; display: inline-block; animation: float 3s ease-in-out infinite; }
        .logo-area h1 { font-size: 36px; font-weight: 700; background: linear-gradient(135deg, #8b4513, #b85e3a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 30px; background: #2a2a2a; padding: 6px; border-radius: 60px; }
        .auth-tab { flex: 1; padding: 16px 20px; border: none; background: transparent; color: rgba(255,255,255,0.7); font-weight: 600; border-radius: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .auth-tab.active { background: #8b4513; color: #FFFFFF; box-shadow: 0 4px 15px rgba(139,69,19,0.4); }
        .auth-pane { display: none; animation: slideIn 0.4s ease; }
        .auth-pane.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        .form-group { margin-bottom: 20px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-icon { position: absolute; left: 16px; color: #8b4513; }
        .form-group input { width: 100%; padding: 15px 15px 15px 48px; background: #FFFFFF; border: 2px solid #8b5a2b; border-radius: 16px; font-size: 16px; }
        .form-group input:focus { outline: none; border-color: #8b4513; box-shadow: 0 0 0 4px rgba(139,69,19,0.1); }
        .btn-auth { width: 100%; padding: 16px; background: linear-gradient(135deg, #8b4513, #b85e3a); border: none; border-radius: 16px; color: white; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; transition: 0.3s; }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139,69,19,0.5); }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin: 20px 0; }
        .alert { padding: 15px 20px; border-radius: 16px; margin: 20px 0; border-left: 4px solid; background: #F5F5F5; display: flex; align-items: center; gap: 10px; }
        .alert-success { border-left-color: #8b4513; }
        .alert-error { border-left-color: #f44336; }
        .benefits { display: grid; grid-template-columns: repeat(3,1fr); gap: 15px; margin: 30px 0 0; padding: 20px; background: #F5F5F5; border-radius: 24px; border: 1px solid #8b5a2b; }
        .benefit-item { text-align: center; }
        .app-screen { min-height: 100vh; display: flex; flex-direction: column; opacity: 1; transition: opacity 0.5s ease; }
        .app-screen.hidden { display: none; }
        .app-container { width: 100%; max-width: 1400px; padding: 20px; margin: 0 auto; }
        .top-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; padding: 15px 20px; background: linear-gradient(145deg,#F5F5F5,#f0e9e0); border-radius: 50px; border: 1px solid #8b5a2b; }
        .logo-container { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .logo-image { width: 60px; height: 60px; background: linear-gradient(135deg,#8b4513,#b85e3a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; color: white; }
        .logo-text h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg,#8b4513,#b85e3a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-actions { display: flex; align-items: center; gap: 20px; }
        .header-stat { display: flex; align-items: center; gap: 8px; background: rgba(139,69,19,0.1); padding: 8px 16px; border-radius: 50px; border: 1px solid #8b5a2b; }
        .header-avatar { width: 50px; height: 50px; background: linear-gradient(135deg,#8b4513,#b85e3a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; cursor: pointer; position: relative; }
        .logout-btn-header { background: rgba(244,67,54,0.1); border: 1px solid #f44336; color: #f44336; padding: 10px 20px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .app-tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; background: #3a2a1a; padding: 10px; border-radius: 60px; }
        .app-tab { padding: 12px 24px; background: transparent; border: none; color: #FFFFFF; border-radius: 50px; font-weight: 700; cursor: pointer; }
        .app-tab.active { background: #8b4513; box-shadow: 0 4px 15px rgba(139,69,19,0.3); }
        .app-tab-content { display: none; }
        .app-tab-content.active { display: block; }
        .card-moderno { background: #F5F5F5; border-radius: 24px; padding: 25px; border: 1px solid #8b5a2b; box-shadow: 0 5px 20px rgba(93,58,26,0.1); transition: 0.3s; margin-bottom: 20px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .badge { display: inline-block; padding: 6px 14px; border-radius: 50px; font-size: 12px; font-weight: 600; margin: 5px; }
        .badge-success { background: linear-gradient(135deg,#2e7d32,#1b5e20); color: white; }
        .titulo-secao { font-size: 28px; font-weight: 700; margin-bottom: 30px; position: relative; padding-bottom: 15px; color: #3a2a1a; }
        .titulo-secao:after { content: ''; position: absolute; bottom: 0; left: 0; width: 60px; height: 4px; background: linear-gradient(90deg,#8b4513,#b85e3a); border-radius: 2px; }
        .ranking-item-premium { display: flex; align-items: center; gap: 15px; padding: 15px; margin-bottom: 10px; background: white; border-radius: 20px; border: 1px solid #e0d5c0; transition: 0.3s; }
        .ranking-position-badge { font-size: 24px; font-weight: 800; min-width: 60px; text-align: center; }
        .ranking-avatar-premium { width: 50px; height: 50px; background: linear-gradient(135deg,#8b4513,#b85e3a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; }
        .ranking-info-premium { flex: 1; }
        .ranking-name-premium { font-weight: 700; font-size: 18px; }
        .ranking-points-premium { background: linear-gradient(135deg,#8b4513,#b85e3a); color: white; padding: 8px 16px; border-radius: 50px; font-weight: 700; }
        .podium-spectacular { display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin: 50px 0; flex-wrap: wrap; }
        .podium-spot { flex: 1; min-width: 200px; text-align: center; padding: 20px 15px 30px; border-radius: 30px 30px 0 0; cursor: pointer; }
        .podium-spot.first { background: linear-gradient(180deg, rgba(255,215,0,0.3), rgba(255,215,0,0.1)); border-top: 4px solid #FFD700; order: 2; }
        .podium-spot.second { background: linear-gradient(180deg, rgba(192,192,192,0.3), rgba(192,192,192,0.1)); border-top: 4px solid #C0C0C0; order: 1; }
        .podium-spot.third { background: linear-gradient(180deg, rgba(205,127,50,0.3), rgba(205,127,50,0.1)); border-top: 4px solid #CD7F32; order: 3; }
        .podium-avatar-giant { width: 100px; height: 100px; background: linear-gradient(135deg,#8b4513,#b85e3a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 48px; color: white; margin: 0 auto 15px; }
        .podium-spot.first .podium-avatar-giant { width: 120px; height: 120px; border: 3px solid #FFD700; }
        .mapa-container { margin: 20px 0; border-radius: 20px; overflow: hidden; border: 1px solid #8b5a2b; }
        #mapaPontos { height: 500px; width: 100%; background: #e0d5c0; }
        @media (max-width: 768px) { .top-header { flex-direction: column; gap: 15px; } .podium-spectacular { flex-direction: column; align-items: center; } .podium-spot { width: 100%; } #mapaPontos { height: 350px; } }
    </style>
</head>
<body>
<div class="login-screen" id="loginScreen">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo-area"><div class="logo-icon">🌿</div><h1>SustentaPira</h1><p>Sustentabilidade em ação</p></div>
            <div class="auth-tabs"><button class="auth-tab active" onclick="switchTab('login')" id="tabLogin"><i class="fas fa-sign-in-alt"></i><span>Entrar</span></button><button class="auth-tab" onclick="switchTab('cadastro')" id="tabCadastro"><i class="fas fa-user-plus"></i><span>Criar conta</span></button></div>
            <div id="alertArea"></div>
            <div class="auth-content">
                <div class="auth-pane active" id="paneLogin">
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group"><label>E-mail</label><div class="input-wrapper"><i class="fas fa-envelope input-icon"></i><input type="email" id="loginEmail" placeholder="seu@email.com" required></div></div>
                        <div class="form-group"><label>Senha</label><div class="input-wrapper"><i class="fas fa-lock input-icon"></i><input type="password" id="loginSenha" placeholder="••••••••" required></div></div>
                        <div class="checkbox-group"><input type="checkbox" id="lembrar"><label for="lembrar">Lembrar meu acesso</label></div>
                        <button type="submit" class="btn-auth"><i class="fas fa-sign-in-alt"></i> Entrar no SustentaPira</button>
                        <div class="auth-links" style="text-align:center; margin-top:15px;"><a href="#" onclick="esqueciSenha(event)" style="color:#8b4513;">Esqueceu sua senha?</a></div>
                    </form>
                </div>
                <div class="auth-pane" id="paneCadastro">
                    <form onsubmit="handleCadastro(event)">
                        <div class="form-group"><label>Nome completo</label><div class="input-wrapper"><i class="fas fa-user input-icon"></i><input type="text" id="cadastroNome" placeholder="João Silva" required></div></div>
                        <div class="form-group"><label>E-mail</label><div class="input-wrapper"><i class="fas fa-envelope input-icon"></i><input type="email" id="cadastroEmail" placeholder="joao@email.com" required></div></div>
                        <div class="form-group"><label>Telefone</label><div class="input-wrapper"><i class="fas fa-phone input-icon"></i><input type="tel" id="cadastroTelefone" placeholder="(19) 99999-9999"></div></div>
                        <div class="form-group"><label>Senha</label><div class="input-wrapper"><i class="fas fa-lock input-icon"></i><input type="password" id="cadastroSenha" placeholder="Mínimo 6 caracteres" required minlength="6"></div></div>
                        <div class="form-group"><label>Confirmar senha</label><div class="input-wrapper"><i class="fas fa-lock input-icon"></i><input type="password" id="cadastroConfirmar" placeholder="Digite novamente" required></div></div>
                        <div class="checkbox-group"><input type="checkbox" id="termos" required><label for="termos">Eu aceito os <a href="#" onclick="abrirTermosDeUso(event)" style="color:#8b4513;">Termos de Uso</a></label></div>
                        <button type="submit" class="btn-auth"><i class="fas fa-user-plus"></i> Criar minha conta</button>
                    </form>
                </div>
            </div>
            <div class="footer-links" style="display:flex; justify-content:center; gap:20px; margin-top:20px;"><a href="#" onclick="abrirPoliticaPrivacidade(event)"><i class="fas fa-lock"></i> Política</a><a href="#" onclick="abrirTermosDeUso(event)"><i class="fas fa-file-contract"></i> Termos</a></div>
            <div class="benefits"><div class="benefit-item"><i class="fas fa-calendar-alt"></i><span>Eventos exclusivos</span></div><div class="benefit-item"><i class="fas fa-trophy"></i><span>Sistema de níveis</span></div><div class="benefit-item"><i class="fas fa-leaf"></i><span>Impacto real</span></div></div>
        </div>
    </div>
</div>
<div class="app-screen hidden" id="appScreen">
    <div class="app-container">
        <div class="top-header">
            <div class="logo-container" onclick="mudarTabApp('inicio')"><div class="logo-image">🌿</div><div class="logo-text"><h1>SustentaPira</h1><p>Sustentabilidade em ação</p></div></div>
            <div class="header-actions">
                <div class="header-stat"><i class="fas fa-fire"></i><span>Streak <span class="stat-highlight" id="headerStreak">0</span></span></div>
                <div class="header-stat"><i class="fas fa-star"></i><span>Pontos <span class="stat-highlight" id="headerPoints">0</span></span></div>
                <div class="header-avatar" id="headerAvatar" onclick="mudarTabApp('perfil')">👤<span class="online-indicator"></span></div>
                <button class="logout-btn-header" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
        </div>
        <div class="app-tabs">
            <button class="app-tab" data-tab="inicio" onclick="mudarTabApp('inicio')">🏠 Início</button>
            <button class="app-tab active" data-tab="desafios" onclick="mudarTabApp('desafios')">🌱 Desafios</button>
            <button class="app-tab" data-tab="perfil" onclick="mudarTabApp('perfil')">👤 Perfil</button>
            <button class="app-tab" data-tab="ranking" onclick="mudarTabApp('ranking')">🏆 Ranking</button>
            <button class="app-tab" data-tab="eventos" onclick="mudarTabApp('eventos')">📅 Eventos</button>
            <button class="app-tab" data-tab="pontos" onclick="mudarTabApp('pontos')">📍 Pontos</button>
        </div>
        <div id="appContent"></div>
    </div>
</div>
<div class="modal-overlay" id="legalModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(5px); display:flex; align-items:center; justify-content:center; z-index:2000; opacity:0; visibility:hidden; transition:0.3s;"><div class="modal-content" style="max-width:600px; width:90%; max-height:90vh; overflow-y:auto;" id="legalContent"></div></div>
<div class="modal-overlay" id="uploadModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(5px); display:flex; align-items:center; justify-content:center; z-index:2000; opacity:0; visibility:hidden;"><div class="modal-content" style="max-width:500px; width:90%; background:#F5F5F5; border-radius:32px; padding:25px;" id="uploadContent"></div></div>
<script>
    const SHEETDB_URL = 'https://sheetdb.io/api/v1/pxcozyw0d91x8';
    let usuariosReais = [];      // Todos os usuários do banco
    let usuarioLogado = null;
    let tabAppAtiva = 'desafios';
    let inscricoesUsuario = [];
    let mapaPontos = null;
    const desafios = [
        { id: 1, titulo: "Recicle 10kg de materiais recicláveis", pontos: 200, icone: "♻️", dica: "Tire foto dos materiais na balança" },
        { id: 2, titulo: "Participe de 1 evento ambiental", pontos: 150, icone: "📅", dica: "Tire foto no local do evento" },
        { id: 3, titulo: "Plante 1 árvore nativa", pontos: 300, icone: "🌳", dica: "Tire foto da muda plantada" },
        { id: 4, titulo: "Descarte 10 pilhas em ponto de coleta", pontos: 150, icone: "🔋", dica: "Tire foto das pilhas no ponto" },
        { id: 5, titulo: "Use bicicleta em vez de carro 5 vezes", pontos: 250, icone: "🚲", dica: "Compartilhe seu trajeto" }
    ];
    const eventos = [
        { id: 1, titulo: "🌱 1º Mutirão de Limpeza 2026", descricao: "Limpeza das margens do Rio Piracicaba.", data: "10/01/2026", hora: "08:00", local: "Rua do Porto", vagas: 200, inscritos: 78, pontos: 200 },
        { id: 2, titulo: "♻️ Oficina de Reciclagem de Papel", descricao: "Aprenda a fazer papel reciclado artesanal.", data: "17/01/2026", hora: "14:00", local: "SENAI Piracicaba", vagas: 40, inscritos: 35, pontos: 150 }
    ];
    const pontosColeta = [
        { id: 1, nome: "Ecoponto Centro", endereco: "Av. Rui Barbosa, 800", tipo: "Ecoponto", lat: -22.7245, lng: -47.6472, icone: "🗑️" },
        { id: 2, nome: "Shopping Piracicaba (Pilhas)", endereco: "Av. Limeira, 700", tipo: "Pilhas", lat: -22.7176, lng: -47.6345, icone: "🔋" },
        { id: 3, nome: "ESALQ/USP (Eletrônicos)", endereco: "Av. Pádua Dias, 11", tipo: "Eletrônicos", lat: -22.7082, lng: -47.6445, icone: "💻" },
        { id: 4, nome: "Savegnago (Óleo)", endereco: "Av. Cruzeiro do Sul, 800", tipo: "Óleo", lat: -22.7274, lng: -47.6589, icone: "🫒" }
    ];
    async function carregarUsuariosReais() {
        try {
            const res = await fetch(SHEETDB_URL);
            const data = await res.json();
            usuariosReais = Array.isArray(data) ? data : [];
            console.log(`✅ ${usuariosReais.length} usuários carregados da planilha`);
        } catch(e) { console.error("Erro ao carregar usuários:", e); usuariosReais = []; }
    }
    function getRankingReal() {
        if(!usuariosReais.length) return [];
        return [...usuariosReais]
            .map(u => ({ nome: u.nome || "Anônimo", pontos: parseInt(u.pontos) || 0, streak: parseInt(u.streak) || 0, nivel: u.nivel || "🌱 EcoIniciante", email: u.email }))
            .sort((a,b) => b.pontos - a.pontos);
    }
    function atualizarHeaderInfo() { if(usuarioLogado) { document.getElementById('headerStreak').innerText = usuarioLogado.streak || 0; document.getElementById('headerPoints').innerText = usuarioLogado.pontos || 0; document.getElementById('headerAvatar').innerHTML = (usuarioLogado.nome?.charAt(0) || 'U').toUpperCase() + '<span class="online-indicator"></span>'; } }
    function mostrarAlerta(tipo, msg) { const area = document.getElementById('alertArea'); area.innerHTML = `<div class="alert alert-${tipo}"><i class="fas ${tipo==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i><span>${msg}</span></div>`; setTimeout(()=> area.innerHTML='', 4000); }
    async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const senha = document.getElementById('loginSenha').value;
        const lembrar = document.getElementById('lembrar').checked;
        if(!usuariosReais.length) await carregarUsuariosReais();
        const usuario = usuariosReais.find(u => u.email === email && u.senha === senha);
        if(usuario) {
            usuarioLogado = { ...usuario, pontos: parseInt(usuario.pontos)||0, streak: parseInt(usuario.streak)||0 };
            if(lembrar) localStorage.setItem('sustentapira_user', JSON.stringify({email: usuario.email}));
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
            atualizarHeaderInfo();
            renderAppContent();
            mostrarAlerta('success', `Bem-vindo, ${usuario.nome}!`);
        } else { mostrarAlerta('error', 'E-mail ou senha inválidos!'); }
    }
    async function handleCadastro(e) {
        e.preventDefault();
        const nome = document.getElementById('cadastroNome').value;
        const email = document.getElementById('cadastroEmail').value;
        const senha = document.getElementById('cadastroSenha').value;
        const confirmar = document.getElementById('cadastroConfirmar').value;
        const telefone = document.getElementById('cadastroTelefone').value;
        if(senha !== confirmar) { mostrarAlerta('error', 'Senhas não coincidem'); return; }
        try {
            const check = await fetch(`${SHEETDB_URL}/search?email=${email}`);
            const existente = await check.json();
            if(existente.length) { mostrarAlerta('error', 'E-mail já cadastrado'); return; }
            const novoUsuario = { nome, email, senha, telefone: telefone || '', cidade: "Piracicaba", data_cadastro: new Date().toLocaleDateString('pt-BR'), pontos: "0", nivel: "🌱 EcoIniciante", streak: "1", desafios: "0" };
            const res = await fetch(SHEETDB_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ data: [novoUsuario] }) });
            if(res.ok) { mostrarAlerta('success', 'Conta criada! Faça login.'); switchTab('login'); document.getElementById('cadastroNome').value = ''; document.getElementById('cadastroEmail').value = ''; await carregarUsuariosReais(); }
            else mostrarAlerta('error', 'Erro ao criar conta');
        } catch(err) { mostrarAlerta('error', 'Erro de conexão'); }
    }
    function logout() { usuarioLogado = null; localStorage.removeItem('sustentapira_user'); document.getElementById('appScreen').classList.add('hidden'); document.getElementById('loginScreen').classList.remove('hidden'); }
    function switchTab(tab) { document.getElementById('tabLogin').classList.toggle('active', tab==='login'); document.getElementById('tabCadastro').classList.toggle('active', tab==='cadastro'); document.getElementById('paneLogin').classList.toggle('active', tab==='login'); document.getElementById('paneCadastro').classList.toggle('active', tab==='cadastro'); }
    function mudarTabApp(tab) { if(tabAppAtiva === tab) return; tabAppAtiva = tab; document.querySelectorAll('.app-tab').forEach(btn => { btn.classList.remove('active'); if(btn.textContent.includes(tab==='inicio'?'Início':tab==='desafios'?'Desafios':tab==='perfil'?'Perfil':tab==='ranking'?'Ranking':tab==='eventos'?'Eventos':'Pontos')) btn.classList.add('active'); }); renderAppContent(); }
    function renderAppContent() { const container = document.getElementById('appContent'); if(tabAppAtiva === 'inicio') renderInicio(container); else if(tabAppAtiva === 'desafios') renderDesafios(container); else if(tabAppAtiva === 'perfil') renderPerfil(container); else if(tabAppAtiva === 'ranking') renderRanking(container); else if(tabAppAtiva === 'eventos') renderEventos(container); else if(tabAppAtiva === 'pontos') renderPontos(container); }
    function renderInicio(container) { container.innerHTML = `<div class="app-tab-content active"><h1 class="titulo-secao">🏠 Sobre o SustentaPira</h1><div class="card-moderno"><h2>🌱 Missão</h2><p>Promover sustentabilidade em Piracicaba conectando pessoas, empresas e poder público.</p></div><div class="card-moderno"><h2>👥 Fundadores</h2><p>Pedro, Pablo, Marcelo, Silvana e Gabriel — unidos pelo futuro verde.</p></div><div class="link-politica" style="margin-top:20px; text-align:center;"><a href="#" onclick="abrirPoliticaPrivacidade(event)">Política de Privacidade</a> | <a href="#" onclick="abrirTermosDeUso(event)">Termos de Uso</a></div></div>`; }
    function renderDesafios(container) { let html = '<div class="app-tab-content active"><h1 class="titulo-secao">🌱 Desafios Ambientais</h1><div class="card-grid">'; desafios.forEach(d => { html += `<div class="card-moderno"><div style="font-size:48px;text-align:center">${d.icone}</div><h3>${d.titulo}</h3><span class="badge badge-success">+${d.pontos} pts</span><p>💡 ${d.dica}</p><button class="btn-auth" onclick="abrirUpload(${d.id})">📸 Comprovar</button></div>`; }); html += '</div></div>'; container.innerHTML = html; }
    function renderRanking(container) {
        const rankingReal = getRankingReal();
        if(!rankingReal.length) { container.innerHTML = `<div class="app-tab-content active"><h1 class="titulo-secao">🏆 Ranking</h1><p>Carregando ranking dos usuários reais...</p></div>`; carregarUsuariosReais().then(()=> renderRanking(container)); return; }
        let html = `<div class="app-tab-content active"><h1 class="titulo-secao">🏆 Ranking EcoCidadãos</h1><div class="podium-spectacular">`;
        const top3 = rankingReal.slice(0,3);
        top3.forEach((u,idx) => { let classe = idx===0?'first':idx===1?'second':'third'; let medal = idx===0?'👑':idx===1?'🥈':'🥉'; html += `<div class="podium-spot ${classe}"><div class="podium-medal-giant" style="font-size:48px;">${medal}</div><div class="podium-avatar-giant">${u.nome?.charAt(0)||'U'}</div><div class="podium-name-giant">${u.nome}</div><div class="podium-points-giant">${u.pontos} pts</div><div class="podium-stats-giant">🔥 ${u.streak} dias</div></div>`; });
        html += `</div><div class="ranking-list-premium" style="background:#F5F5F5; border-radius:30px; padding:20px;"><h3>📋 Classificação Geral</h3>`;
        rankingReal.forEach((user, i) => { let medalIcon = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}º`; html += `<div class="ranking-item-premium"><div class="ranking-position-badge">${medalIcon}</div><div class="ranking-avatar-premium">${user.nome?.charAt(0)||'U'}</div><div class="ranking-info-premium"><div class="ranking-name-premium">${user.nome}</div><div class="ranking-level-premium">${user.nivel}</div></div><div class="ranking-points-premium">${user.pontos} pts</div></div>`; });
        html += `</div></div>`;
        container.innerHTML = html;
    }
    function renderPerfil(container) { if(!usuarioLogado) { container.innerHTML = `<div class="app-tab-content active"><div style="text-align:center; padding:60px;"><h2>🔐 Acesse seu perfil</h2><button class="btn-auth" onclick="document.getElementById('tabLogin').click()">Fazer Login</button></div></div>`; return; } const nivel = usuarioLogado.nivel || "🌱 EcoIniciante"; const progresso = Math.min(100, (usuarioLogado.pontos/5000)*100); container.innerHTML = `<div class="app-tab-content active"><div class="perfil-container"><div class="card-moderno" style="text-align:center;"><div class="perfil-avatar-melhorado" style="width:100px;height:100px;background:#8b4513;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:48px;margin:0 auto 20px;color:white;">${usuarioLogado.nome?.charAt(0).toUpperCase()}</div><h2>${usuarioLogado.nome}</h2><p><i class="fas fa-envelope"></i> ${usuarioLogado.email}</p><div class="perfil-badge-container" style="display:flex;gap:10px;justify-content:center;margin:15px 0;"><span class="badge badge-success">${nivel}</span><span class="badge badge-info">🔥 ${usuarioLogado.streak} dias</span></div><div class="progress-container"><div class="progress-bar-melhorado" style="background:#e0d5c0;border-radius:10px;height:12px;"><div class="progress-fill-melhorado" style="width:${progresso}%;height:100%;background:#8b4513;border-radius:10px;"></div></div><p style="margin-top:8px;">${usuarioLogado.pontos} / 5000 pontos</p></div><button class="btn-auth" onclick="simularBonusLocal()">🎁 Ganhar bônus (demo)</button></div></div></div>`; }
    function renderEventos(container) { let html = '<div class="app-tab-content active"><h1 class="titulo-secao">📅 Eventos</h1><div class="card-grid">'; eventos.forEach(e => { const inscrito = inscricoesUsuario.includes(e.id); html += `<div class="card-moderno"><h3>${e.titulo}</h3><p><i class="fas fa-calendar"></i> ${e.data} - ${e.local}</p><span class="badge badge-success">+${e.pontos} pts</span>${!inscrito ? `<button class="btn-auth" style="margin-top:15px" onclick="inscreverEvento(${e.id})">📝 Inscrever-se</button>` : '<span class="badge badge-info">✅ Inscrito</span>'}</div>`; }); html += '</div></div>'; container.innerHTML = html; }
    function renderPontos(container) { container.innerHTML = `<div class="app-tab-content active"><h1 class="titulo-secao">📍 Pontos de Coleta</h1><div class="mapa-container"><div id="mapaPontos"></div></div></div>`; setTimeout(() => inicializarMapa(), 100); }
    function inicializarMapa() { if(mapaPontos) mapaPontos.remove(); const mapaDiv = document.getElementById('mapaPontos'); if(!mapaDiv) return; mapaPontos = L.map('mapaPontos').setView([-22.7253,-47.6492],13); L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(mapaPontos); pontosColeta.forEach(p => { L.marker([p.lat,p.lng]).bindPopup(`<b>${p.nome}</b><br>${p.endereco}<br>♻️ ${p.tipo}`).addTo(mapaPontos); }); }
    function abrirUpload(id) { const desafio = desafios.find(d=>d.id===id); if(!desafio) return; document.getElementById('uploadContent').innerHTML = `<div class="card-moderno"><h2>📸 Comprovar: ${desafio.titulo}</h2><p>💡 ${desafio.dica}</p><input type="file" id="uploadFileInput" accept="image/*" style="margin:15px 0;"><button class="btn-auth" onclick="confirmarUpload(${id})">Enviar comprovante</button><button class="btn-auth" style="background:#666; margin-top:10px;" onclick="fecharUploadModal()">Cancelar</button></div>`; document.getElementById('uploadModal').style.opacity = '1'; document.getElementById('uploadModal').style.visibility = 'visible'; }
    function confirmarUpload(id) { const fileInput = document.getElementById('uploadFileInput'); if(!fileInput || !fileInput.files[0]) { alert('Selecione uma imagem'); return; } const desafio = desafios.find(d=>d.id===id); if(usuarioLogado && desafio) { usuarioLogado.pontos = (usuarioLogado.pontos || 0) + desafio.pontos; usuarioLogado.streak = (usuarioLogado.streak || 0) + 1; if(usuarioLogado.pontos >= 5000) usuarioLogado.nivel = "🏆 EcoHerói"; else if(usuarioLogado.pontos >= 1000) usuarioLogado.nivel = "🌳 EcoMestre"; atualizarHeaderInfo(); renderAppContent(); alert(`✅ Comprovante enviado! +${desafio.pontos} pontos`); } fecharUploadModal(); }
    function fecharUploadModal() { document.getElementById('uploadModal').style.opacity = '0'; document.getElementById('uploadModal').style.visibility = 'hidden'; }
    function inscreverEvento(id) { if(!usuarioLogado) { mostrarAlerta('error','Faça login primeiro'); return; } if(!inscricoesUsuario.includes(id)) { inscricoesUsuario.push(id); const evento = eventos.find(e=>e.id===id); if(evento && usuarioLogado) { usuarioLogado.pontos = (usuarioLogado.pontos || 0) + evento.pontos; atualizarHeaderInfo(); renderAppContent(); mostrarAlerta('success',`Inscrito em ${evento.titulo} +${evento.pontos} pts`); } } }
    function simularBonusLocal() { if(usuarioLogado) { usuarioLogado.pontos = (usuarioLogado.pontos || 0) + 100; atualizarHeaderInfo(); renderAppContent(); mostrarAlerta('success','+100 pontos de bônus!'); } }
    function abrirPoliticaPrivacidade(e) { if(e) e.preventDefault(); const modal = document.getElementById('legalModal'); document.getElementById('legalContent').innerHTML = `<div class="card-moderno"><h2>🔒 Política de Privacidade</h2><p>Seus dados são protegidos e utilizados apenas para o funcionamento do app.</p><button class="btn-auth" onclick="fecharModalLegal()">Fechar</button></div>`; modal.style.opacity = '1'; modal.style.visibility = 'visible'; }
    function abrirTermosDeUso(e) { if(e) e.preventDefault(); const modal = document.getElementById('legalModal'); document.getElementById('legalContent').innerHTML = `<div class="card-moderno"><h2>📜 Termos de Uso</h2><p>Ao usar o app você concorda com as práticas sustentáveis.</p><button class="btn-auth" onclick="fecharModalLegal()">Fechar</button></div>`; modal.style.opacity = '1'; modal.style.visibility = 'visible'; }
    function fecharModalLegal() { const modal = document.getElementById('legalModal'); modal.style.opacity = '0'; modal.style.visibility = 'hidden'; }
    function esqueciSenha(e) { e.preventDefault(); mostrarAlerta('info','Recuperação enviada para e-mail cadastrado.'); }
    async function verificarLoginSalvo() { const saved = localStorage.getItem('sustentapira_user'); if(saved) { try { const {email} = JSON.parse(saved); await carregarUsuariosReais(); const user = usuariosReais.find(u => u.email === email); if(user) { usuarioLogado = { ...user, pontos: parseInt(user.pontos)||0, streak: parseInt(user.streak)||0 }; document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('appScreen').classList.remove('hidden'); atualizarHeaderInfo(); renderAppContent(); } } catch(e) {} } }
    (async function init() { await carregarUsuariosReais(); verificarLoginSalvo(); })();
    window.mudarTabApp = mudarTabApp; window.handleLogin = handleLogin; window.handleCadastro = handleCadastro; window.switchTab = switchTab; window.logout = logout; window.abrirUpload = abrirUpload; window.confirmarUpload = confirmarUpload; window.fecharUploadModal = fecharUploadModal; window.inscreverEvento = inscreverEvento; window.simularBonusLocal = simularBonusLocal; window.abrirPoliticaPrivacidade = abrirPoliticaPrivacidade; window.abrirTermosDeUso = abrirTermosDeUso; window.fecharModalLegal = fecharModalLegal; window.esqueciSenha = esqueciSenha;
</script>
</body>
</html>
