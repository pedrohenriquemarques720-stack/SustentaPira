<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SustentaPira · App Sustentável</title>
    
    <!-- Fontes e ícones -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Leaflet CSS e JS para o mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FFFFFF;
            color: #5d3a1a;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* ===== TELA DE LOGIN ===== */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #FFFFFF;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            overflow-y: auto;
        }

        .login-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 500px;
            margin: auto;
        }

        .auth-card {
            background: #F5F5F5;
            border-radius: 32px;
            padding: 40px 30px;
            border: 1px solid #8b5a2b;
            box-shadow: 0 10px 30px rgba(93, 58, 26, 0.1);
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes glow {
            0% { box-shadow: 0 0 5px rgba(139, 69, 19, 0.3); }
            50% { box-shadow: 0 0 20px rgba(139, 69, 19, 0.6); }
            100% { box-shadow: 0 0 5px rgba(139, 69, 19, 0.3); }
        }

        @keyframes shine {
            0% { background-position: -100px; }
            40%, 100% { background-position: 200px; }
        }

        @keyframes logoGlow {
            0% { filter: drop-shadow(0 0 5px rgba(139, 69, 19, 0.3)); }
            50% { filter: drop-shadow(0 0 20px rgba(139, 69, 19, 0.6)); }
            100% { filter: drop-shadow(0 0 5px rgba(139, 69, 19, 0.3)); }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 64px;
            margin-bottom: 10px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        .logo-area h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .logo-area p {
            color: #8b4513;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ===== ESTILOS DAS ABAS ===== */
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #2a2a2a;
            padding: 6px;
            border-radius: 60px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 1px solid #3a3a3a;
        }
        
        .auth-tab {
            flex: 1;
            padding: 16px 20px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }
        
        .auth-tab i {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
        }
        
        .auth-tab.active {
            background: #8b4513;
            color: #FFFFFF;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.4);
            transform: scale(1.02);
        }
        
        .auth-tab.active i {
            color: #FFFFFF;
        }
        
        .auth-tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            color: #FFFFFF;
        }
        
        .auth-tab:hover:not(.active) i {
            color: #FFFFFF;
        }

        .auth-pane {
            display: none;
            animation: slideIn 0.4s ease;
        }

        .auth-pane.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #5d3a1a;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #8b4513;
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 48px;
            background: #FFFFFF;
            border: 2px solid #8b5a2b;
            border-radius: 16px;
            color: #5d3a1a;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #8b4513;
            box-shadow: 0 0 0 4px rgba(139, 69, 19, 0.1);
            background: #FFFFFF;
        }

        .btn-auth {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.5);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #8b4513;
        }

        .checkbox-group label {
            color: #5d3a1a;
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
        }

        .auth-links a {
            color: #8b4513;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .benefits {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0 0;
            padding: 20px;
            background: #F5F5F5;
            border-radius: 24px;
            border: 1px solid #8b5a2b;
        }

        .benefit-item {
            text-align: center;
        }

        .benefit-item i {
            font-size: 24px;
            color: #8b4513;
            margin-bottom: 8px;
        }

        .benefit-item span {
            display: block;
            font-size: 12px;
            color: #5d3a1a;
            font-weight: 600;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 16px;
            margin: 20px 0;
            border-left: 4px solid;
            background: #F5F5F5;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #5d3a1a;
        }

        .alert-success {
            border-left-color: #8b4513;
        }

        .alert-error {
            border-left-color: #f44336;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(139, 69, 19, 0.3);
            border-top-color: #8b4513;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== TELA PRINCIPAL DO APP ===== */
        .app-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .app-screen.hidden {
            display: none;
            opacity: 0;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            margin: 0 auto;
        }

        /* ===== HEADER SUPERIOR ===== */
        .top-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding: 15px 20px;
            background: linear-gradient(145deg, #F5F5F5, #f0e9e0);
            border-radius: 50px;
            border: 1px solid #8b5a2b;
            box-shadow: 0 5px 20px rgba(93, 58, 26, 0.1);
            position: relative;
            overflow: hidden;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 2;
            cursor: pointer;
        }

        .logo-image {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
            transition: all 0.3s ease;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-text h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .logo-text p {
            font-size: 12px;
            color: #5d3a1a;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 2;
            flex-wrap: wrap;
        }

        .header-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(139, 69, 19, 0.1);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid #8b5a2b;
            transition: all 0.3s ease;
        }

        .header-stat i {
            color: #8b4513;
            font-size: 18px;
        }

        .header-stat span {
            font-weight: 600;
            color: #3a2a1a;
        }

        .header-stat .stat-highlight {
            color: #8b4513;
            font-weight: 700;
            margin-left: 5px;
        }

        .header-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            cursor: pointer;
            border: 2px solid #8b4513;
            transition: all 0.3s ease;
            position: relative;
        }

        .logout-btn-header {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid #f44336;
            color: #f44336;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .logout-btn-header:hover {
            background: #f44336;
            color: white;
        }

        /* Tabs do app */
        .app-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            background: #3a2a1a;
            padding: 10px;
            border-radius: 60px;
        }

        .app-tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: #FFFFFF;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .app-tab.active {
            background: #8b4513;
            color: #FFFFFF;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
        }

        /* Cards */
        .card-moderno {
            background: #F5F5F5;
            border-radius: 24px;
            padding: 25px;
            border: 1px solid #8b5a2b;
            box-shadow: 0 5px 20px rgba(93, 58, 26, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            color: #5d3a1a;
            margin-bottom: 20px;
        }

        .card-moderno:hover {
            transform: translateY(-5px);
            border-color: #8b4513;
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.15);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            margin: 5px;
        }

        .badge-success {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            color: white;
        }

        .badge-info {
            background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
            color: white;
        }

        .badge-warning {
            background: linear-gradient(135deg, #ff8f00 0%, #ff6f00 100%);
            color: white;
        }

        .badge-gold {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #5d3a1a;
            font-weight: 700;
        }

        .badge-silver {
            background: linear-gradient(135deg, #C0C0C0, #A9A9A9);
            color: #5d3a1a;
            font-weight: 700;
        }

        .badge-bronze {
            background: linear-gradient(135deg, #CD7F32, #B87333);
            color: white;
            font-weight: 700;
        }

        .titulo-secao {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 15px;
            color: #3a2a1a;
        }

        .titulo-secao:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #8b4513, #b85e3a);
            border-radius: 2px;
        }

        /* ===== RANKING PROFISSIONAL - NOVO VISUAL ===== */
        .ranking-stats-premium {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .rank-stat-card {
            background: linear-gradient(135deg, #fff, #faf5f0);
            border-radius: 24px;
            padding: 25px 20px;
            text-align: center;
            border: 1px solid rgba(139, 69, 19, 0.2);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .rank-stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(139,69,19,0.05) 0%, transparent 70%);
            border-radius: 50%;
        }

        .rank-stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(139, 69, 19, 0.15);
        }

        .rank-stat-icon {
            font-size: 40px;
            color: #8b4513;
            margin-bottom: 15px;
        }

        .rank-stat-value {
            font-size: 36px;
            font-weight: 800;
            color: #3a2a1a;
        }

        .rank-stat-label {
            font-size: 14px;
            color: #8b4513;
            font-weight: 500;
            margin-top: 5px;
        }

        /* Pódio 3D */
        .podium-3d-container {
            background: linear-gradient(135deg, #f8f4ef, #f0e9e0);
            border-radius: 48px;
            padding: 40px 20px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .podium-3d-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="rgba(139,69,19,0.03)" stroke-width="2"/></svg>') repeat;
            opacity: 0.5;
        }

        .podium-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .podium-title h2 {
            font-size: 24px;
            font-weight: 700;
            color: #8b4513;
        }

        .podium-title p {
            color: #6b5a4a;
            font-size: 14px;
        }

        .podium-crown {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        .podium-grid {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 30px;
            flex-wrap: wrap;
        }

        .podium-item {
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            animation: fadeInUp 0.6s ease forwards;
        }

        .podium-item:hover {
            transform: translateY(-10px);
        }

        .podium-item.first {
            animation-delay: 0.1s;
        }

        .podium-item.second {
            animation-delay: 0.2s;
        }

        .podium-item.third {
            animation-delay: 0.3s;
        }

        .podium-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: all 0.3s;
            border: 3px solid white;
        }

        .podium-item.first .podium-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            font-size: 60px;
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.4);
        }

        .podium-item.second .podium-avatar {
            background: linear-gradient(135deg, #C0C0C0, #A9A9A9);
        }

        .podium-item.third .podium-avatar {
            background: linear-gradient(135deg, #CD7F32, #B87333);
        }

        .podium-name {
            font-weight: 800;
            font-size: 18px;
            color: #3a2a1a;
            margin-top: 10px;
        }

        .podium-points {
            font-size: 24px;
            font-weight: 800;
            color: #8b4513;
            margin: 5px 0;
        }

        .podium-level {
            font-size: 12px;
            background: rgba(139, 69, 19, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .podium-streak {
            font-size: 12px;
            color: #ff6b35;
            margin-top: 5px;
        }

        .podium-base {
            margin-top: 15px;
            height: 8px;
            background: linear-gradient(90deg, #8b4513, #b85e3a);
            border-radius: 4px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        .podium-item.first .podium-base {
            width: 100%;
            height: 12px;
        }

        /* Tabela de Ranking */
        .ranking-table-premium {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .ranking-header {
            display: grid;
            grid-template-columns: 80px 80px 1fr 120px 100px;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            color: white;
            padding: 18px 20px;
            font-weight: 700;
        }

        .ranking-row-premium {
            display: grid;
            grid-template-columns: 80px 80px 1fr 120px 100px;
            padding: 16px 20px;
            border-bottom: 1px solid #f0e8e0;
            transition: all 0.3s;
            align-items: center;
        }

        .ranking-row-premium:hover {
            background: #faf5f0;
            transform: translateX(5px);
        }

        .rank-position {
            font-weight: 800;
            font-size: 18px;
        }

        .rank-position.top-1 { color: #FFD700; text-shadow: 0 0 5px rgba(255,215,0,0.5); }
        .rank-position.top-2 { color: #C0C0C0; }
        .rank-position.top-3 { color: #CD7F32; }

        .rank-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #e0d5c8, #d0c5b8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .rank-info .rank-name {
            font-weight: 700;
            font-size: 16px;
        }

        .rank-info .rank-level {
            font-size: 12px;
            color: #8b4513;
        }

        .rank-points {
            font-weight: 800;
            font-size: 18px;
            color: #8b4513;
        }

        .rank-streak {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ff6b35;
        }

        .motivation-card {
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            border-radius: 28px;
            padding: 30px;
            margin-top: 30px;
            color: white;
            text-align: center;
        }

            const pontos = parseInt(usuarioLogado.pontos);
            const progresso = Math.min(100, (pontos / 5000) * 100);
            container.innerHTML = `<h1 class="titulo-secao">👤 Meu Perfil</h1><div class="card-moderno"><h2>${usuarioLogado.nome}</h2><p><i class="fas fa-trophy"></i> ${usuarioLogado.nivel}</p><p><i class="fas fa-star"></i> ${usuarioLogado.pontos} pontos</p><p><i class="fas fa-fire"></i> ${usuarioLogado.streak} dias</p><p><i class="fas fa-check-circle"></i> ${usuarioLogado.desafios} desafios</p><div style="background:#e0e0e0; border-radius:10px; overflow:hidden; margin-top:15px;"><div style="width:${progresso}%; background:#8b4513; height:10px;"></div></div></div>`;
        }

        // ========== RANKING PROFISSIONAL MELHORADO ==========
        function renderRankingProfissional(container) {
            const totalPontos = ranking.reduce((a, b) => a + b.pontos, 0);
            const mediaPontos = Math.round(totalPontos / ranking.length);
            const maiorStreak = Math.max(...ranking.map(r => r.streak));
            const top3 = ranking.slice(0, 3);
            
            let html = `
                <h1 class="titulo-secao">🏆 Ranking dos Campeões</h1>
                
                <div class="ranking-stats-premium">
                    <div class="rank-stat-card"><div class="rank-stat-icon"><i class="fas fa-users"></i></div><div class="rank-stat-value">${ranking.length}</div><div class="rank-stat-label">Participantes</div></div>
                    <div class="rank-stat-card"><div class="rank-stat-icon"><i class="fas fa-chart-line"></i></div><div class="rank-stat-value">${mediaPontos}</div><div class="rank-stat-label">Média de Pontos</div></div>
                    <div class="rank-stat-card"><div class="rank-stat-icon"><i class="fas fa-fire"></i></div><div class="rank-stat-value">${maiorStreak}</div><div class="rank-stat-label">Maior Streak</div></div>
                    <div class="rank-stat-card"><div class="rank-stat-icon"><i class="fas fa-trophy"></i></div><div class="rank-stat-value">${totalPontos}</div><div class="rank-stat-label">Pontos Totais</div></div>
                </div>
                
                <div class="podium-3d-container">
                    <div class="podium-crown">👑</div>
                    <div class="podium-title"><h2>Pódio dos Campeões</h2><p>Os melhores da comunidade sustentável</p></div>
                    <div class="podium-grid">`;
            
            top3.forEach((user, idx) => {
                const classe = idx === 0 ? "first" : idx === 1 ? "second" : "third";
                const medalha = idx === 0 ? "🥇" : idx === 1 ? "🥈" : "🥉";
                html += `
                    <div class="podium-item ${classe}">
                        <div class="podium-avatar">${user.avatar}</div>
                        <div class="podium-name">${user.nome}</div>
                        <div class="podium-points">${user.pontos} pts</div>
                        <div class="podium-level">${user.nivel}</div>
                        <div class="podium-streak"><i class="fas fa-fire"></i> ${user.streak} dias</div>
                        <div class="podium-base"></div>
                    </div>
                `;
            });
            
            html += `</div></div><div class="ranking-table-premium"><div class="ranking-header"><div>Posição</div><div></div><div>Participante</div><div>Pontos</div><div>Streak</div></div>`;
            
            ranking.forEach((user, idx) => {
                const posClass = idx === 0 ? "top-1" : idx === 1 ? "top-2" : idx === 2 ? "top-3" : "";
                html += `
                    <div class="ranking-row-premium">
                        <div class="rank-position ${posClass}">${idx + 1}º</div>
                        <div class="rank-avatar">${user.avatar}</div>
                        <div class="rank-info"><div class="rank-name">${user.nome}</div><div class="rank-level">${user.nivel}</div></div>
                        <div class="rank-points">${user.pontos}</div>
                        <div class="rank-streak"><i class="fas fa-fire"></i> ${user.streak}</div>
                    </div>
                `;
            });
            
            const userPontos = usuarioLogado ? parseInt(usuarioLogado.pontos) : 0;
            const pontosParaTop1 = ranking[0].pontos - userPontos;
            const progressoTop1 = Math.min(100, (userPontos / ranking[0].pontos) * 100);
            
            html += `</div><div class="motivation-card"><h3><i class="fas fa-chart-line"></i> Sua Jornada até o Topo</h3><p>${usuarioLogado ? usuarioLogado.nome : 'Você'} está a ${pontosParaTop1 > 0 ? pontosParaTop1 : 0} pontos de alcançar o 1º lugar!</p><div class="progress-to-top"><div class="progress-fill" style="width: ${progressoTop1}%;"></div></div><p>Complete desafios e participe de eventos para acumular pontos e subir no ranking!</p></div>`;
            
            container.innerHTML = html;
        }

        function renderEventos(container) {
            let html = '<h1 class="titulo-secao">📅 Eventos</h1><div class="card-grid">';
            eventos.forEach(e => {
                const inscrito = inscricoesUsuario.includes(e.id);
                html += `<div class="card-moderno"><h3>${e.titulo}</h3><p>${e.descricao}</p><p><i class="fas fa-calendar"></i> ${e.data} ${e.hora}</p><p><i class="fas fa-map-marker-alt"></i> ${e.local}</p><span class="badge badge-success">+${e.pontos} pts</span>${!inscrito ? `<button class="btn-auth" style="margin-top:10px;" onclick="inscreverEvento(${e.id})">Inscrever-se</button>` : '<span class="badge badge-success">✅ Inscrito</span>'}</div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function inscreverEvento(id) {
            inscricoesUsuario.push(id);
            mostrarAlerta('success', 'Inscrição realizada!');
            renderAppContent();
        }

        function renderPontosComMapa(container) {
            container.innerHTML = `<h1 class="titulo-secao">🗺️ Mapa Interativo - Pontos de Coleta</h1><div class="map-wrapper"><div id="map" style="height:500px;"></div><div class="custom-zoom"><button class="zoom-btn" id="zoomPlus"><i class="fas fa-plus"></i></button><button class="zoom-btn" id="zoomMinus"><i class="fas fa-minus"></i></button></div><div class="filter-panel"><h4>Filtrar</h4><button class="filter-btn active" data-filter="todos">Todos</button>${[...new Set(pontosColeta.map(p=>p.tipo))].map(t=>`<button class="filter-btn" data-filter="${t}">${t}</button>`).join('')}<button class="reset-filter" id="resetFiltro">Mostrar todos</button></div></div>`;
            if (mapaInstance) mapaInstance.remove();
            mapaInstance = L.map('map').setView([-22.728, -47.649], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap' }).addTo(mapaInstance);
            function addMarkers(f='todos') { if(markers.length) markers.forEach(m=>mapaInstance.removeLayer(m)); markers=[]; const filtrados=f==='todos'?pontosColeta:pontosColeta.filter(p=>p.tipo===f); filtrados.forEach(p=>{ const iconHtml=`<div style="background:#2c5e2e; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white;">${p.tipo==='Ecoponto'?'🗑️':p.tipo==='Pilhas'?'🔋':'💻'}</div>`; const m=L.marker([p.lat,p.lng],{icon:L.divIcon({html:iconHtml,iconSize:[36,36]})}).bindPopup(`<b>${p.nome}</b><br>${p.endereco}<br>${p.horario}`).addTo(mapaInstance); markers.push(m); }); }
            addMarkers('todos');
            document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>addMarkers(btn.dataset.filter)));
            document.getElementById('resetFiltro')?.addEventListener('click',()=>addMarkers('todos'));
            document.getElementById('zoomPlus')?.addEventListener('click',()=>mapaInstance.zoomIn());
            document.getElementById('zoomMinus')?.addEventListener('click',()=>mapaInstance.zoomOut());
        }

        function abrirUpload(id) {
            desafioAtual = desafios.find(d => d.id === id);
            document.getElementById('uploadContent').innerHTML = `<div class="card-moderno"><h2>📸 Comprovar: ${desafioAtual.titulo}</h2><p>${desafioAtual.dica}</p><input type="file" id="uploadFile" accept="image/*"><button class="btn-auth" onclick="confirmarUpload(${desafioAtual.id}, ${desafioAtual.pontos})">Enviar</button><button class="btn-auth" style="background:#666;" onclick="fecharModal('uploadModal')">Cancelar</button></div>`;
            document.getElementById('uploadModal').classList.add('active');
        }

        function confirmarUpload(id, pontos) {
            const novosPontos = parseInt(usuarioLogado.pontos) + pontos;
            usuarioLogado.pontos = novosPontos.toString();
            usuarioLogado.desafios = (parseInt(usuarioLogado.desafios) + 1).toString();
            if (novosPontos >= 5000) usuarioLogado.nivel = "👑 Lenda Ambiental";
            else if (novosPontos >= 3000) usuarioLogado.nivel = "🏆 Mestre Eco";
            else if (novosPontos >= 1500) usuarioLogado.nivel = "🌳 Guardião";
            else if (novosPontos >= 500) usuarioLogado.nivel = "🍃 EcoHerói";
            atualizarHeaderInfo();
            mostrarAlerta('success', `+${pontos} pontos!`);
            fecharModal('uploadModal');
            renderAppContent();
        }

        function fecharModal(modalId) { document.getElementById(modalId).classList.remove('active'); }

        function toggleChatbot() { document.getElementById('chatbotContainer').classList.toggle('open'); }
        function enviarMensagem() {
            const input = document.getElementById('chatbotInput');
            const msg = input.value.trim();
            if(!msg) return;
            const container = document.getElementById('chatbotMessages');
            container.innerHTML += `<div class="message user">${msg}</div>`;
            input.value = '';
            setTimeout(() => { container.innerHTML += `<div class="message bot">🌿 Pergunte sobre reciclagem, compostagem ou pontos de coleta!</div>`; container.scrollTop = container.scrollHeight; }, 500);
            container.scrollTop = container.scrollHeight;
        }

        window.switchTab = switchTab;
        window.handleLogin = handleLogin;
        window.handleCadastro = handleCadastro;
        window.logout = logout;
        window.mudarTabApp = mudarTabApp;
        window.abrirUpload = abrirUpload;
        window.confirmarUpload = confirmarUpload;
        window.fecharModal = fecharModal;
        window.inscreverEvento = inscreverEvento;
        window.toggleChatbot = toggleChatbot;
        window.enviarMensagem = enviarMensagem;
    </script>
</body>
</html>
