<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SustentaPira · Ranking Real com Google Sheets</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #FFFFFF; color: #5d3a1a; min-height: 100vh; }
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 20px; background: #FFFFFF; z-index: 1000; transition: opacity 0.5s ease, visibility 0.5s ease; overflow-y: auto; }
        .login-screen.hidden { opacity: 0; visibility: hidden; }
        .auth-wrapper { width: 100%; max-width: 500px; margin: auto; }
        .auth-card { background: #F5F5F5; border-radius: 32px; padding: 40px 30px; border: 1px solid #8b5a2b; box-shadow: 0 10px 30px rgba(93, 58, 26, 0.1); animation: fadeInUp 0.6s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 64px; margin-bottom: 10px; display: inline-block; animation: float 3s ease-in-out infinite; }
        .logo-area h1 { font-size: 36px; font-weight: 700; background: linear-gradient(135deg, #8b4513, #b85e3a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 30px; background: #2a2a2a; padding: 6px; border-radius: 60px; }
        .auth-tab { flex: 1; padding: 16px 20px; border: none; background: transparent; color: rgba(255,255,255,0.7); font-weight: 600; border-radius: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .auth-tab.active { background: #8b4513; color: #FFFFFF; box-shadow: 0 4px 15px rgba(139,69,19,0.4); }
        .auth-pane { display: none; animation: slideIn 0.4s ease; }
        .auth-pane.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        .form-group { margin-bottom: 20px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-icon { position: absolute; left: 16px; color: #8b4513; }
        .form-group input { width: 100%; padding: 15px 15px 15px 48px; background: #FFFFFF; border: 2px solid #8b5a2b; border-radius: 16px; font-size: 16px; transition: 0.3s; }
        .form-group input:focus { outline: none; border-color: #8b4513; box-shadow: 0 0 0 4px rgba(139,69,19,0.1); }
        .btn-auth { width: 100%; padding: 16px; background: linear-gradient(135deg, #8b4513, #b85e3a); border: none; border-radius: 16px; color: white; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; transition: 0.3s; }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139,69,19,0.5); }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin: 20px 0; }
        .alert { padding: 15px 20px; border-radius: 16px; margin: 20px 0; border-left: 4px solid; background: #F5F5F5; display: flex; align-items: center; gap: 10px; }
        .alert-success { border-left-color: #8b4513; }
        .alert-error { border-left-color: #f44336; }
        .benefits { display: grid; grid-template-columns: repeat(3,1fr); gap: 15px; margin: 30px 0 0; padding: 20px; background: #F5F5F5; border-radius: 24px; border: 1px solid #8b5a2b; }
        .benefit-item { text-align: center; }
        .app-screen { min-height: 100vh; display: flex; flex-direction: column; opacity: 1; transition: opacity 0.5s ease; }
        .app-screen.hidden { display: none; }
        .app-container { width: 100%; max-width: 1400px; padding: 20px; margin: 0 auto; }
        .top-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; padding: 15px 20px; background: linear-gradient(145deg,#F5F5F5,#f0e9e0); border-radius: 50px; border: 1px solid #8b5a2b; flex-wrap: wrap; gap: 15px; }
        .logo-container { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .logo-image { width: 60px; height: 60px; background: linear-gradient(135deg,#8b4513,#b85e3a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; color: white; }
        .logo-text h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg,#8b4513,#b85e3a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .header-stat { display: flex; align-items: center; gap: 8px; background: rgba(139,69,19,0.1); padding: 8px 16px; border-radius: 50px; border: 1px solid #8b5a2b; }
        .header-avatar { width: 50px; height: 50px; background: linear-gradient(135deg,#8b4513,#b85e3a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; cursor: pointer; position: relative; }
        .logout-btn-header { background: rgba(244,67,54,0.1); border: 1px solid #f44336; color: #f44336; padding: 8px 18px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; transition: 0.3s; }
        .logout-btn-header:hover { background: #f44336; color: white; }
        .app-tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; background: #3a2a1a; padding: 10px; border-radius: 60px; }
        .app-tab { padding: 12px 24px; background: transparent; border: none; color: #FFFFFF; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .app-tab.active { background: #8b4513; box-shadow: 0 4px 15px rgba(139,69,19,0.3); }
        .app-tab-content { display: none; }
        .app-tab-content.active { display: block; }
        .card-moderno { background: #F5F5F5; border-radius: 24px; padding: 25px; border: 1px solid #8b5a2b; box-shadow: 0 5px 20px rgba(93,58,26,0.1); transition: 0.3s; margin-bottom: 20px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .badge { display: inline-block; padding: 6px 14px; border-radius: 50px; font-size: 12px; font-weight: 600; margin: 5px; }
        .badge-success { background: linear-gradient(135deg,#2e7d32,#1b5e20); color: white; }
        .badge-info { background: linear-gradient(135deg,#1565c0,#0d47a1); color: white; }
        .titulo-secao { font-size: 28px; font-weight: 700; margin-bottom: 30px; position: relative; padding-bottom: 15px; color: #3a2a1a; }
        .titulo-secao:after { content: ''; position: absolute; bottom: 0; left: 0; width: 60px; height: 4px; background: linear-gradient(90deg,#8b4513,#b85e3a); border-radius: 2px; }
        .ranking-item-premium { display: flex; align-items: center; gap: 15px; padding: 15px; margin-bottom: 10px; background: white; border-radius: 20px; border: 1px solid #e0d5c0; transition: 0.3s; }
        .ranking-item-premium:hover { transform: translateX(5px); border-color: #8b4513; }
        .ranking-position-badge { font-size: 24px; font-weight: 800; min-width: 60px; text-align: center; }
        .ranking-avatar-premium { width: 50px; height: 50px; background: linear-gradient(135deg,#8b4513,#b85e3a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; }
        .ranking-info-premium { flex: 1; }
        .ranking-name-premium { font-weight: 700; font-size: 18px; }
        .ranking-points-premium { background: linear-gradient(135deg,#8b4513,#b85e3a); color: white; padding: 8px 16px; border-radius: 50px; font-weight: 700; }
        .podium-spectacular { display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin: 40px 0 50px; flex-wrap: wrap; }
        .podium-spot { flex: 1; min-width: 180px; text-align: center; padding: 20px 15px 30px; border-radius: 30px 30px 0 0; cursor: pointer; transition: 0.3s; }
        .podium-spot:hover { transform: translateY(-10px); }
        .podium-spot.first { background: linear-gradient(180deg, rgba(255,215,0,0.3), rgba(255,215,0,0.05)); border-top: 4px solid #FFD700; order: 2; }
        .podium-spot.second { background: linear-gradient(180deg, rgba(192,192,192,0.3), rgba(192,192,192,0.05)); border-top: 4px solid #C0C0C0; order: 1; }
        .podium-spot.third { background: linear-gradient(180deg, rgba(205,127,50,0.3), rgba(205,127,50,0.05)); border-top: 4px solid #CD7F32; order: 3; }
        .podium-avatar-giant { width: 90px; height: 90px; background: linear-gradient(135deg,#8b4513,#b85e3a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 42px; color: white; margin: 0 auto 15px; }
        .podium-spot.first .podium-avatar-giant { width: 110px; height: 110px; border: 3px solid #FFD700; font-size: 52px; }
        .mapa-container { margin: 20px 0; border-radius: 20px; overflow: hidden; border: 1px solid #8b5a2b; }
        #mapaPontos { height: 500px; width: 100%; background: #e0d5c0; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; background: #F5F5F5; border-radius: 32px; padding: 25px; }
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { .top-header { flex-direction: column; align-items: stretch; } .podium-spectacular { flex-direction: column; align-items: center; } .podium-spot { width: 100%; } #mapaPontos { height: 350px; } }
    </style>
</head>
<body>
<div class="login-screen" id="loginScreen">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo-area"><div class="logo-icon">🌿</div><h1>SustentaPira</h1><p>Sustentabilidade em ação</p></div>
            <div class="auth-tabs"><button class="auth-tab active" onclick="switchTab('login')" id="tabLogin"><i class="fas fa-sign-in-alt"></i><span>Entrar</span></button><button class="auth-tab" onclick="switchTab('cadastro')" id="tabCadastro"><i class="fas fa-user-plus"></i><span>Criar conta</span></button></div>
            <div id="alertArea"></div>
            <div class="auth-content">
                <div class="auth-pane active" id="paneLogin">
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group"><label>E-mail</label><div class="input-wrapper"><i class="fas fa-envelope input-icon"></i><input type="email" id="loginEmail" placeholder="seu@email.com" required></div></div>
                        <div class="form-group"><label>Senha</label><div class="input-wrapper"><i class="fas fa-lock input-icon"></i><input type="password" id="loginSenha" placeholder="••••••••" required></div></div>
                        <div class="checkbox-group"><input type="checkbox" id="lembrar"><label for="lembrar">Lembrar meu acesso</label></div>
                        <button type="submit" class="btn-auth"><i class="fas fa-sign-in-alt"></i> Entrar no SustentaPira</button>
                        <div class="auth-links" style="text-align:center; margin-top:15px;"><a href="#" onclick="esqueciSenha(event)" style="color:#8b4513;">Esqueceu sua senha?</a></div>
                    </form>
                </div>
                <div class="auth-pane" id="paneCadastro">
                    <form onsubmit="handleCadastro(event)">
                        <div class="form-group"><label>Nome completo</label><div class="input-wrapper"><i class="fas fa-user input-icon"></i><input type="text" id="cadastroNome" placeholder="João Silva" required></div></div>
                        <div class="form-group"><label>E-mail</label><div class="input-wrapper"><i class="fas fa-envelope input-icon"></i><input type="email" id="cadastroEmail" placeholder="joao@email.com" required></div></div>
                        <div class="form-group"><label>Telefone</label><div class="input-wrapper"><i class="fas fa-phone input-icon"></i><input type="tel" id="cadastroTelefone" placeholder="(19) 99999-9999"></div></div>
                        <div class="form-group"><label>Senha</label><div class="input-wrapper"><i class="fas fa-lock input-icon"></i><input type="password" id="cadastroSenha" placeholder="Mínimo 6 caracteres" required minlength="6"></div></div>
                        <div class="form-group"><label>Confirmar senha</label><div class="input-wrapper"><i class="fas fa-lock input-icon"></i><input type="password" id="cadastroConfirmar" placeholder="Digite novamente" required></div></div>
                        <div class="checkbox-group"><input type="checkbox" id="termos" required><label for="termos">Eu aceito os <a href="#" onclick="abrirTermosDeUso(event)" style="color:#8b4513;">Termos de Uso</a></label></div>
                        <button type="submit" class="btn-auth"><i class="fas fa-user-plus"></i> Criar minha conta</button>
                    </form>
                </div>
            </div>
            <div class="footer-links" style="display:flex; justify-content:center; gap:20px; margin-top:20px;"><a href="#" onclick="abrirPoliticaPrivacidade(event)"><i class="fas fa-lock"></i> Política</a><a href="#" onclick="abrirTermosDeUso(event)"><i class="fas fa-file-contract"></i> Termos</a></div>
            <div class="benefits"><div class="benefit-item"><i class="fas fa-calendar-alt"></i><span>Eventos exclusivos</span></div><div class="benefit-item"><i class="fas fa-trophy"></i><span>Sistema de níveis</span></div><div class="benefit-item"><i class="fas fa-leaf"></i><span>Impacto real</span></div></div>
        </div>
    </div>
</div>
<div class="app-screen hidden" id="appScreen">
    <div class="app-container">
        <div class="top-header">
            <div class="logo-container" onclick="mudarTabApp('inicio')"><div class="logo-image">🌿</div><div class="logo-text"><h1>SustentaPira</h1><p>Sustentabilidade em ação</p></div></div>
            <div class="header-actions">
                <div class="header-stat"><i class="fas fa-fire"></i><span>Streak <span class="stat-highlight" id="headerStreak">0</span></span></div>
                <div class="header-stat"><i class="fas fa-star"></i><span>Pontos <span class="stat-highlight" id="headerPoints">0</span></span></div>
                <div class="header-avatar" id="headerAvatar" onclick="mudarTabApp('perfil')">👤</div>
                <button class="logout-btn-header" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
        </div>
        <div class="app-tabs">
            <button class="app-tab" data-tab="inicio" onclick="mudarTabApp('inicio')">🏠 Início</button>
            <button class="app-tab active" data-tab="desafios" onclick="mudarTabApp('desafios')">🌱 Desafios</button>
            <button class="app-tab" data-tab="perfil" onclick="mudarTabApp('perfil')">👤 Perfil</button>
            <button class="app-tab" data-tab="ranking" onclick="mudarTabApp('ranking')">🏆 Ranking</button>
            <button class="app-tab" data-tab="eventos" onclick="mudarTabApp('eventos')">📅 Eventos</button>
            <button class="app-tab" data-tab="pontos" onclick="mudarTabApp('pontos')">📍 Pontos</button>
        </div>
        <div id="appContent"></div>
    </div>
</div>
<div class="modal-overlay" id="legalModal"><div class="modal-content" id="legalContent"></div></div>
<div class="modal-overlay" id="uploadModal"><div class="modal-content" id="uploadContent"></div></div>

<script>
    // ===== CONEXÃO COM A PLANILHA GOOGLE VIA SHEETDB =====
    const SHEETDB_URL = 'https://sheetdb.io/api/v1/pxcozyw0d91x8';
    
    // ===== DADOS REAIS =====
    let usuariosReais = [];      // TODOS os usuários da sua planilha
    let usuarioLogado = null;
    let tabAppAtiva = 'desafios';
    let inscricoesUsuario = [];
    let mapaPontos = null;
    
    // Desafios e eventos estáticos
    const desafios = [
        { id: 1, titulo: "Recicle 10kg de materiais recicláveis", pontos: 200, icone: "♻️", dica: "Tire foto dos materiais na balança" },
        { id: 2, titulo: "Participe de 1 evento ambiental", pontos: 150, icone: "📅", dica: "Tire foto no local do evento" },
        { id: 3, titulo: "Plante 1 árvore nativa", pontos: 300, icone: "🌳", dica: "Tire foto da muda plantada" },
        { id: 4, titulo: "Descarte 10 pilhas em ponto de coleta", pontos: 150, icone: "🔋", dica: "Tire foto das pilhas no ponto" },
        { id: 5, titulo: "Use bicicleta em vez de carro 5 vezes", pontos: 250, icone: "🚲", dica: "Compartilhe seu trajeto" }
    ];
    
    const eventos = [
        { id: 1, titulo: "🌱 1º Mutirão de Limpeza 2026", descricao: "Limpeza das margens do Rio Piracicaba.", data: "10/01/2026", hora: "08:00", local: "Rua do Porto", vagas: 200, inscritos: 78, pontos: 200 },
        { id: 2, titulo: "♻️ Oficina de Reciclagem de Papel", descricao: "Aprenda a fazer papel reciclado artesanal.", data: "17/01/2026", hora: "14:00", local: "SENAI Piracicaba", vagas: 40, inscritos: 35, pontos: 150 }
    ];
    
    const pontosColeta = [
        { id: 1, nome: "Ecoponto Centro", endereco: "Av. Rui Barbosa, 800", tipo: "Ecoponto", lat: -22.7245, lng: -47.6472, icone: "🗑️" },
        { id: 2, nome: "Shopping Piracicaba (Pilhas)", endereco: "Av. Limeira, 700", tipo: "Pilhas", lat: -22.7176, lng: -47.6345, icone: "🔋" },
        { id: 3, nome: "ESALQ/USP (Eletrônicos)", endereco: "Av. Pádua Dias, 11", tipo: "Eletrônicos", lat: -22.7082, lng: -47.6445, icone: "💻" },
        { id: 4, nome: "Savegnago (Óleo)", endereco: "Av. Cruzeiro do Sul, 800", tipo: "Óleo", lat: -22.7274, lng: -47.6589, icone: "🫒" }
    ];
    
    // ===== FUNÇÃO QUE GERA O RANKING COM OS USUÁRIOS REAIS =====
    function getRankingReal() {
        if (!usuariosReais.length) return [];
        // Ordena por pontos (decrescente) e retorna apenas os dados necessários
        return [...usuariosReais]
            .map(u => ({ 
                nome: u.nome || "Usuário", 
                pontos: parseInt(u.pontos) || 0, 
                streak: parseInt(u.streak) || 0, 
                nivel: u.nivel || "🌱 EcoIniciante",
                email: u.email 
            }))
            .sort((a, b) => b.pontos - a.pontos);
    }
    
    // ===== CARREGA TODOS OS USUÁRIOS DA PLANILHA =====
    async function carregarUsuariosReais() {
        try {
            const resposta = await fetch(SHEETDB_URL);
            const dados = await resposta.json();
            usuariosReais = Array.isArray(dados) ? dados : [];
            console.log(`✅ ${usuariosReais.length} usuários carregados da planilha Google`);
            return usuariosReais;
        } catch (erro) {
            console.error("Erro ao carregar usuários:", erro);
            usuariosReais = [];
            return [];
        }
    }
    
    // ===== FUNÇÕES DE UI =====
    function atualizarHeaderInfo() {
        if (usuarioLogado) {
            document.getElementById('headerStreak').innerText = usuarioLogado.streak || 0;
            document.getElementById('headerPoints').innerText = usuarioLogado.pontos || 0;
            const inicial = (usuarioLogado.nome?.charAt(0) || 'U').toUpperCase();
            document.getElementById('headerAvatar').innerHTML = inicial + '<span class="online-indicator" style="position:absolute; bottom:2px; right:2px; width:12px; height:12px; background:#4caf50; border-radius:50%; border:2px solid white;"></span>';
        }
    }
    
    function mostrarAlerta(tipo, msg) {
        const area = document.getElementById('alertArea');
        area.innerHTML = `<div class="alert alert-${tipo}"><i class="fas ${tipo==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i><span>${msg}</span></div>`;
        setTimeout(() => area.innerHTML = '', 4000);
    }
    
    // ===== LOGIN COM USUÁRIOS REAIS =====
    async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const senha = document.getElementById('loginSenha').value;
        const lembrar = document.getElementById('lembrar').checked;
        
        if (!usuariosReais.length) await carregarUsuariosReais();
        
        const usuario = usuariosReais.find(u => u.email === email && u.senha === senha);
        
        if (usuario) {
            usuarioLogado = { 
                ...usuario, 
                pontos: parseInt(usuario.pontos) || 0, 
                streak: parseInt(usuario.streak) || 0,
                nivel: usuario.nivel || "🌱 EcoIniciante"
            };
            if (lembrar) localStorage.setItem('sustentapira_user', JSON.stringify({ email: usuario.email }));
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
            atualizarHeaderInfo();
            renderAppContent();
            mostrarAlerta('success', `Bem-vindo, ${usuario.nome}!`);
        } else {
            mostrarAlerta('error', 'E-mail ou senha inválidos!');
        }
    }
    
    // ===== CADASTRO =====
    async function handleCadastro(e) {
        e.preventDefault();
        const nome = document.getElementById('cadastroNome').value;
        const email = document.getElementById('cadastroEmail').value;
        const senha = document.getElementById('cadastroSenha').value;
        const confirmar = document.getElementById('cadastroConfirmar').value;
        const telefone = document.getElementById('cadastroTelefone').value;
        
        if (senha !== confirmar) {
            mostrarAlerta('error', 'As senhas não coincidem');
            return;
        }
        
        try {
            const check = await fetch(`${SHEETDB_URL}/search?email=${email}`);
            const existente = await check.json();
            if (existente.length) {
                mostrarAlerta('error', 'E-mail já cadastrado');
                return;
            }
            
            const novoUsuario = {
                nome: nome,
                email: email,
                senha: senha,
                telefone: telefone || '',
                cidade: "Piracicaba",
                data_cadastro: new Date().toLocaleDateString('pt-BR'),
                pontos: "0",
                nivel: "🌱 EcoIniciante",
                streak: "1",
                desafios: "0"
            };
            
            const res = await fetch(SHEETDB_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: [novoUsuario] })
            });
            
            if (res.ok) {
                mostrarAlerta('success', 'Conta criada com sucesso! Faça login.');
                switchTab('login');
                document.getElementById('cadastroNome').value = '';
                document.getElementById('cadastroEmail').value = '';
                document.getElementById('cadastroSenha').value = '';
                document.getElementById('cadastroConfirmar').value = '';
                await carregarUsuariosReais();
            } else {
                mostrarAlerta('error', 'Erro ao criar conta');
            }
        } catch (err) {
            mostrarAlerta('error', 'Erro de conexão com o servidor');
        }
    }
    
    function logout() {
        usuarioLogado = null;
        localStorage.removeItem('sustentapira_user');
        document.getElementById('appScreen').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
        inscricoesUsuario = [];
    }
    
    function switchTab(tab) {
        document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
        document.getElementById('tabCadastro').classList.toggle('active', tab === 'cadastro');
        document.getElementById('paneLogin').classList.toggle('active', tab === 'login');
        document.getElementById('paneCadastro').classList.toggle('active', tab === 'cadastro');
    }
    
    function mudarTabApp(tab) {
        if (tabAppAtiva === tab) return;
        tabAppAtiva = tab;
        document.querySelectorAll('.app-tab').forEach(btn => {
            btn.classList.remove('active');
            const texto = btn.textContent;
            if ((tab === 'inicio' && texto.includes('Início')) ||
                (tab === 'desafios' && texto.includes('Desafios')) ||
                (tab === 'perfil' && texto.includes('Perfil')) ||
                (tab === 'ranking' && texto.includes('Ranking')) ||
                (tab === 'eventos' && texto.includes('Eventos')) ||
                (tab === 'pontos' && texto.includes('Pontos'))) {
                btn.classList.add('active');
            }
        });
        renderAppContent();
    }
    
    function renderAppContent() {
        const container = document.getElementById('appContent');
        if (tabAppAtiva === 'inicio') renderInicio(container);
        else if (tabAppAtiva === 'desafios') renderDesafios(container);
        else if (tabAppAtiva === 'perfil') renderPerfil(container);
        else if (tabAppAtiva === 'ranking') renderRanking(container);
        else if (tabAppAtiva === 'eventos') renderEventos(container);
        else if (tabAppAtiva === 'pontos') renderPontos(container);
    }
    
    function renderInicio(container) {
        container.innerHTML = `<div class="app-tab-content active"><h1 class="titulo-secao">🏠 Sobre o SustentaPira</h1><div class="card-moderno"><h2><i class="fas fa-bullseye"></i> Missão</h2><p>Promover a sustentabilidade em Piracicaba conectando cidadãos, empresas e poder público.</p></div><div class="card-moderno"><h2><i class="fas fa-users"></i> Fundadores</h2><p>Pedro, Pablo, Marcelo, Silvana e Gabriel — unidos pelo futuro verde.</p></div><div class="card-moderno"><h2><i class="fas fa-chart-line"></i> Ranking Real</h2><p>O ranking é gerado dinamicamente com os dados da sua planilha do Google!</p></div><div class="link-politica" style="margin-top:20px; text-align:center;"><a href="#" onclick="abrirPoliticaPrivacidade(event)">Política de Privacidade</a> | <a href="#" onclick="abrirTermosDeUso(event)">Termos de Uso</a></div></div>`;
    }
    
    function renderDesafios(container) {
        let html = '<div class="app-tab-content active"><h1 class="titulo-secao">🌱 Desafios Ambientais</h1><div class="card-grid">';
        desafios.forEach(d => {
            html += `<div class="card-moderno"><div style="font-size:48px;text-align:center">${d.icone}</div><h3>${d.titulo}</h3><span class="badge badge-success">+${d.pontos} pts</span><p style="margin:12px 0;">💡 ${d.dica}</p><button class="btn-auth" onclick="abrirUpload(${d.id})">📸 Comprovar</button></div>`;
        });
        html += '</div></div>';
        container.innerHTML = html;
    }
    
    function renderRanking(container) {
        const rankingReal = getRankingReal();
        if (!rankingReal.length) {
            container.innerHTML = `<div class="app-tab-content active"><h1 class="titulo-secao">🏆 Ranking</h1><div class="card-moderno" style="text-align:center;"><p>Carregando ranking dos usuários reais da planilha...</p><div class="spinner" style="margin:20px auto;"></div></div></div>`;
            carregarUsuariosReais().then(() => renderRanking(container));
            return;
        }
        
        let html = `<div class="app-tab-content active"><h1 class="titulo-secao">🏆 Ranking EcoCidadãos</h1><p style="margin-bottom:20px; color:#8b4513;">📊 Baseado nos dados reais da sua planilha do Google</p><div class="podium-spectacular">`;
        
        const top3 = rankingReal.slice(0, 3);
        top3.forEach((u, idx) => {
            const classe = idx === 0 ? 'first' : idx === 1 ? 'second' : 'third';
            const medalha = idx === 0 ? '👑' : idx === 1 ? '🥈' : '🥉';
            html += `<div class="podium-spot ${classe}"><div style="font-size:48px;">${medalha}</div><div class="podium-avatar-giant">${u.nome?.charAt(0) || 'U'}</div><div class="podium-name-giant" style="font-weight:800; font-size:18px;">${u.nome}</div><div class="podium-points-giant" style="font-size:26px; font-weight:800; color:#8b4513;">${u.pontos} pts</div><div class="podium-stats-giant"><i class="fas fa-fire"></i> ${u.streak} dias</div></div>`;
        });
        
        html += `</div><div class="card-moderno" style="margin-top:20px;"><h3><i class="fas fa-list-ol"></i> Classificação Geral</h3>`;
        rankingReal.forEach((user, i) => {
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}º`;
            html += `<div class="ranking-item-premium"><div class="ranking-position-badge">${medal}</div><div class="ranking-avatar-premium">${user.nome?.charAt(0) || 'U'}</div><div class="ranking-info-premium"><div class="ranking-name-premium">${user.nome}</div><div class="ranking-level-premium" style="font-size:12px; color:#8b4513;">${user.nivel}</div></div><div class="ranking-points-premium">${user.pontos} pts</div></div>`;
        });
        html += `</div></div>`;
        container.innerHTML = html;
    }
    
    function renderPerfil(container) {
        if (!usuarioLogado) {
            container.innerHTML = `<div class="app-tab-content active"><div style="text-align:center; padding:60px;"><div style="font-size:80px;">🔐</div><h2 style="color:#8b4513;">Acesse seu perfil</h2><button class="btn-auth" style="width:auto; padding:12px 30px; margin-top:20px;" onclick="document.getElementById('tabLogin').click()">Fazer Login</button></div></div>`;
            return;
        }
        const progresso = Math.min(100, ((usuarioLogado.pontos || 0) / 5000) * 100);
        container.innerHTML = `<div class="app-tab-content active"><div class="perfil-container"><div class="card-moderno" style="text-align:center;"><div style="width:100px;height:100px;background:linear-gradient(135deg,#8b4513,#b85e3a);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:48px;margin:0 auto 20px;color:white;">${usuarioLogado.nome?.charAt(0).toUpperCase()}</div><h2>${usuarioLogado.nome}</h2><p><i class="fas fa-envelope"></i> ${usuarioLogado.email}</p><div style="display:flex; gap:10px; justify-content:center; margin:15px 0;"><span class="badge badge-success">${usuarioLogado.nivel || "🌱 EcoIniciante"}</span><span class="badge badge-info"><i class="fas fa-fire"></i> ${usuarioLogado.streak || 0} dias</span></div><div class="progress-container"><div class="progress-bar-melhorado" style="background:#e0d5c0; border-radius:10px; height:12px;"><div class="progress-fill-melhorado" style="width:${progresso}%; height:100%; background:#8b4513; border-radius:10px;"></div></div><p style="margin-top:8px;">${usuarioLogado.pontos || 0} / 5000 pontos</p></div><button class="btn-auth" onclick="simularBonusLocal()"><i class="fas fa-gift"></i> Ganhar bônus (demo)</button></div></div></div>`;
    }
    
    function renderEventos(container) {
        let html = '<div class="app-tab-content active"><h1 class="titulo-secao">📅 Eventos</h1><div class="card-grid">';
        eventos.forEach(e => {
            const inscrito = inscricoesUsuario.includes(e.id);
            html += `<div class="card-moderno"><h3>${e.titulo}</h3><p><i class="fas fa-calendar"></i> ${e.data} - ${e.local}</p><span class="badge badge-success">+${e.pontos} pts</span>${!inscrito ? `<button class="btn-auth" style="margin-top:15px" onclick="inscreverEvento(${e.id})">📝 Inscrever-se</button>` : '<span class="badge badge-info" style="margin-top:15px; display:inline-block;">✅ Inscrito</span>'}</div>`;
        });
        html += '</div></div>';
        container.innerHTML = html;
    }
    
    function renderPontos(container) {
        container.innerHTML = `<div class="app-tab-content active"><h1 class="titulo-secao">📍 Pontos de Coleta</h1><div class="mapa-container"><div id="mapaPontos"></div></div></div>`;
        setTimeout(() => inicializarMapa(), 100);
    }
    
    function inicializarMapa() {
        if (mapaPontos) mapaPontos.remove();
        const mapaDiv = document.getElementById('mapaPontos');
        if (!mapaDiv) return;
        mapaPontos = L.map('mapaPontos').setView([-22.7253, -47.6492], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(mapaPontos);
        pontosColeta.forEach(p => {
            L.marker([p.lat, p.lng]).bindPopup(`<b>${p.nome}</b><br>${p.endereco}<br>♻️ ${p.tipo}`).addTo(mapaPontos);
        });
    }
    
    function abrirUpload(id) {
        const desafio = desafios.find(d => d.id === id);
        document.getElementById('uploadContent').innerHTML = `<div class="card-moderno"><h2>📸 Comprovar: ${desafio.titulo}</h2><p>💡 ${desafio.dica}</p><input type="file" id="uploadFileInput" accept="image/*" style="margin:15px 0; padding:10px;"><button class="btn-auth" onclick="confirmarUpload(${id})">Enviar comprovante</button><button class="btn-auth" style="background:#666; margin-top:10px;" onclick="fecharUploadModal()">Cancelar</button></div>`;
        document.getElementById('uploadModal').classList.add('active');
    }
    
    function confirmarUpload(id) {
        const fileInput = document.getElementById('uploadFileInput');
        if (!fileInput || !fileInput.files[0]) { alert('Selecione uma imagem'); return; }
        const desafio = desafios.find(d => d.id === id);
        if (usuarioLogado && desafio) {
            usuarioLogado.pontos = (usuarioLogado.pontos || 0) + desafio.pontos;
            usuarioLogado.streak = (usuarioLogado.streak || 0) + 1;
            if (usuarioLogado.pontos >= 5000) usuarioLogado.nivel = "🏆 EcoHerói";
            else if (usuarioLogado.pontos >= 1000) usuarioLogado.nivel = "🌳 EcoMestre";
            atualizarHeaderInfo();
            renderAppContent();
            alert(`✅ Comprovante enviado! +${desafio.pontos} pontos`);
        }
        fecharUploadModal();
    }
    
    function fecharUploadModal() { document.getElementById('uploadModal').classList.remove('active'); }
    function inscreverEvento(id) { if (!usuarioLogado) { mostrarAlerta('error', 'Faça login primeiro'); return; } if (!inscricoesUsuario.includes(id)) { inscricoesUsuario.push(id); const evento = eventos.find(e => e.id === id); if (evento && usuarioLogado) { usuarioLogado.pontos = (usuarioLogado.pontos || 0) + evento.pontos; atualizarHeaderInfo(); renderAppContent(); mostrarAlerta('success', `Inscrito em ${evento.titulo} +${evento.pontos} pts`); } } }
    function simularBonusLocal() { if (usuarioLogado) { usuarioLogado.pontos = (usuarioLogado.pontos || 0) + 100; atualizarHeaderInfo(); renderAppContent(); mostrarAlerta('success', '+100 pontos de bônus!'); } }
    function abrirPoliticaPrivacidade(e) { e?.preventDefault(); document.getElementById('legalContent').innerHTML = `<div class="card-moderno"><h2>🔒 Política de Privacidade</h2><p>Seus dados são protegidos e utilizados apenas para o funcionamento do app SustentaPira.</p><button class="btn-auth" style="margin-top:20px;" onclick="fecharModalLegal()">Fechar</button></div>`; document.getElementById('legalModal').classList.add('active'); }
    function abrirTermosDeUso(e) { e?.preventDefault(); document.getElementById('legalContent').innerHTML = `<div class="card-moderno"><h2>📜 Termos de Uso</h2><p>Ao utilizar o SustentaPira você concorda com as práticas sustentáveis e com a veracidade das informações enviadas.</p><button class="btn-auth" style="margin-top:20px;" onclick="fecharModalLegal()">Fechar</button></div>`; document.getElementById('legalModal').classList.add('active'); }
    function fecharModalLegal() { document.getElementById('legalModal').classList.remove('active'); }
    function esqueciSenha(e) { e.preventDefault(); mostrarAlerta('info', 'Instruções de recuperação enviadas para seu e-mail.'); }
    
    async function verificarLoginSalvo() {
        const saved = localStorage.getItem('sustentapira_user');
        if (saved) {
            try {
                const { email } = JSON.parse(saved);
                await carregarUsuariosReais();
                const user = usuariosReais.find(u => u.email === email);
                if (user) {
                    usuarioLogado = { ...user, pontos: parseInt(user.pontos) || 0, streak: parseInt(user.streak) || 0, nivel: user.nivel || "🌱 EcoIniciante" };
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('appScreen').classList.remove('hidden');
                    atualizarHeaderInfo();
                    renderAppContent();
                }
            } catch (e) { console.log(e); }
        }
    }
    
    (async function init() {
        await carregarUsuariosReais();
        verificarLoginSalvo();
    })();
    
    window.mudarTabApp = mudarTabApp;
    window.handleLogin = handleLogin;
    window.handleCadastro = handleCadastro;
    window.switchTab = switchTab;
    window.logout = logout;
    window.abrirUpload = abrirUpload;
    window.confirmarUpload = confirmarUpload;
    window.fecharUploadModal = fecharUploadModal;
    window.inscreverEvento = inscreverEvento;
    window.simularBonusLocal = simularBonusLocal;
    window.abrirPoliticaPrivacidade = abrirPoliticaPrivacidade;
    window.abrirTermosDeUso = abrirTermosDeUso;
    window.fecharModalLegal = fecharModalLegal;
    window.esqueciSenha = esqueciSenha;
</script>
</body>
</html>
