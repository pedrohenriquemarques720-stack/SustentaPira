<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SustentaPira · App Sustentável</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #faf8f5; color: #2c3e2f; min-height: 100vh; }
        
        /* Animações */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        
        /* TELA DE LOGIN */
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #FFFFFF; z-index: 1000; transition: opacity 0.5s; overflow-y: auto; }
        .login-screen.hidden { opacity: 0; visibility: hidden; }
        .auth-wrapper { max-width: 500px; width: 100%; margin: 20px; }
        .auth-card { background: #F5F5F5; border-radius: 32px; padding: 40px 30px; border: 1px solid #8b5a2b; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 64px; animation: float 3s ease-in-out infinite; display: inline-block; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 30px; background: #2a2a2a; padding: 6px; border-radius: 60px; }
        .auth-tab { flex: 1; padding: 16px; border: none; background: transparent; color: rgba(255,255,255,0.7); font-weight: 600; border-radius: 50px; cursor: pointer; transition: all 0.3s; }
        .auth-tab.active { background: #8b4513; color: white; }
        .form-group { margin-bottom: 20px; position: relative; }
        .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #8b4513; }
        .form-group input { width: 100%; padding: 15px 15px 15px 48px; background: #FFFFFF; border: 2px solid #8b5a2b; border-radius: 16px; }
        .btn-auth { width: 100%; padding: 16px; background: linear-gradient(135deg, #8b4513, #b85e3a); border: none; border-radius: 16px; color: white; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .alert { padding: 12px 20px; border-radius: 16px; margin: 15px 0; display: flex; align-items: center; gap: 10px; }
        .alert-success { background: #e8f5e9; border-left: 4px solid #4caf50; }
        .alert-error { background: #ffebee; border-left: 4px solid #f44336; }
        .benefits { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px; padding: 20px; background: #F5F5F5; border-radius: 24px; }
        .benefit-item { text-align: center; }
        
        /* APP SCREEN */
        .app-screen { min-height: 100vh; display: none; }
        .app-screen.active { display: block; }
        .app-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .top-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 25px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 60px; margin-bottom: 30px; border: 1px solid rgba(139,69,19,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.08); flex-wrap: wrap; gap: 15px; }
        .logo-container { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .logo-image { width: 55px; height: 55px; background: linear-gradient(135deg, #8b4513, #b85e3a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; }
        .logo-text h1 { font-size: 26px; background: linear-gradient(135deg, #8b4513, #b85e3a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-actions { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .header-stat { background: rgba(139,69,19,0.1); padding: 8px 18px; border-radius: 40px; display: flex; align-items: center; gap: 8px; border: 1px solid #e0d5c8; }
        .header-avatar { width: 45px; height: 45px; background: linear-gradient(135deg, #8b4513, #b85e3a); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; }
        .logout-btn-header { background: rgba(244,67,54,0.1); border: 1px solid #f44336; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        
        /* Tabs */
        .app-tabs { display: flex; gap: 12px; margin-bottom: 35px; flex-wrap: wrap; background: #3a2a1a; padding: 10px; border-radius: 60px; }
        .app-tab { padding: 12px 28px; background: transparent; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; color: white; transition: all 0.3s; }
        .app-tab.active { background: #8b4513; box-shadow: 0 4px 15px rgba(139,69,19,0.3); }
        
        /* Cards Gerais */
        .card-moderno { background: white; border-radius: 28px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); transition: all 0.3s; border: 1px solid rgba(139,69,19,0.15); margin-bottom: 20px; }
        .card-moderno:hover { transform: translateY(-5px); box-shadow: 0 25px 50px rgba(0,0,0,0.1); }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .titulo-secao { font-size: 32px; font-weight: 800; margin-bottom: 30px; background: linear-gradient(135deg, #2c5e2e, #8b4513); -webkit-background-clip: text; -webkit-text-fill-color: transparent; position: relative; display: inline-block; }
        .titulo-secao::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 60px; height: 4px; background: linear-gradient(90deg, #8b4513, #b85e3a); border-radius: 2px; }
        .badge { display: inline-block; padding: 6px 14px; border-radius: 50px; font-size: 12px; font-weight: 600; margin: 5px; }
        .badge-success { background: #2e7d32; color: white; }
        
        /* Chatbot */
        .chatbot-button { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; background: linear-gradient(135deg, #8b4513, #b85e3a); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; cursor: pointer; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .chatbot-container { position: fixed; bottom: 120px; right: 30px; width: 380px; height: 550px; background: white; border-radius: 25px; border: 2px solid #8b4513; display: none; flex-direction: column; overflow: hidden; z-index: 1001; }
        .chatbot-container.open { display: flex; }
        .chatbot-header { background: linear-gradient(135deg, #8b4513, #b85e3a); color: white; padding: 20px; display: flex; justify-content: space-between; }
        .chatbot-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; }
        .message.bot { background: #f0f0f0; align-self: flex-start; }
        .message.user { background: #8b4513; color: white; align-self: flex-end; }
        .chatbot-input-area { display: flex; gap: 10px; padding: 15px; border-top: 1px solid #ddd; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; background: white; border-radius: 28px; padding: 20px; }
        .upload-preview { margin: 20px 0; text-align: center; }
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(139,69,19,0.3); border-top-color: #8b4513; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .card-grid { grid-template-columns: 1fr; }
            .chatbot-container { width: 90%; right: 5%; }
        }
    </style>
</head>
<body>
    <!-- TELA DE LOGIN -->
    <div class="login-screen" id="loginScreen">
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="logo-area"><div class="logo-icon">🌿</div><h1>SustentaPira</h1><p>Sustentabilidade em ação</p></div>
                <div class="auth-tabs"><button class="auth-tab active" onclick="switchTab('login')">Entrar</button><button class="auth-tab" onclick="switchTab('cadastro')">Criar conta</button></div>
                <div id="alertArea"></div>
                <div id="paneLogin" class="auth-pane active">
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group"><i class="fas fa-envelope input-icon"></i><input type="email" id="loginEmail" placeholder="E-mail" required></div>
                        <div class="form-group"><i class="fas fa-lock input-icon"></i><input type="password" id="loginSenha" placeholder="Senha" required></div>
                        <div class="checkbox-group" style="margin:15px 0;"><input type="checkbox" id="lembrar"><label for="lembrar">Lembrar meu acesso</label></div>
                        <button type="submit" class="btn-auth">Entrar no SustentaPira</button>
                    </form>
                </div>
                <div id="paneCadastro" class="auth-pane">
                    <form onsubmit="handleCadastro(event)">
                        <div class="form-group"><i class="fas fa-user input-icon"></i><input type="text" id="cadastroNome" placeholder="Nome completo" required></div>
                        <div class="form-group"><i class="fas fa-envelope input-icon"></i><input type="email" id="cadastroEmail" placeholder="E-mail" required></div>
                        <div class="form-group"><i class="fas fa-phone input-icon"></i><input type="tel" id="cadastroTelefone" placeholder="Telefone"></div>
                        <div class="form-group"><i class="fas fa-lock input-icon"></i><input type="password" id="cadastroSenha" placeholder="Senha" required></div>
                        <div class="form-group"><i class="fas fa-lock input-icon"></i><input type="password" id="cadastroConfirmar" placeholder="Confirmar senha" required></div>
                        <button type="submit" class="btn-auth">Criar minha conta</button>
                    </form>
                </div>
                <div class="benefits"><div class="benefit-item"><i class="fas fa-calendar-alt"></i><span>Eventos exclusivos</span></div><div class="benefit-item"><i class="fas fa-trophy"></i><span>Sistema de níveis</span></div><div class="benefit-item"><i class="fas fa-leaf"></i><span>Impacto real</span></div></div>
            </div>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div class="app-screen" id="appScreen">
        <div class="app-container">
            <div class="top-header">
                <div class="logo-container" onclick="mudarTabApp('inicio')"><div class="logo-image">🌿</div><div class="logo-text"><h1>SustentaPira</h1><p>Sustentabilidade em ação</p></div></div>
                <div class="header-actions"><div class="header-stat"><i class="fas fa-fire"></i><span id="headerStreak">0</span> dias</div><div class="header-stat"><i class="fas fa-star"></i><span id="headerPoints">0</span> pts</div><div class="header-avatar" id="headerAvatar">👤</div><button class="logout-btn-header" onclick="logout()">Sair</button></div>
            </div>
            <div class="app-tabs">
                <button class="app-tab" onclick="mudarTabApp('inicio')">🏠 Início</button>
                <button class="app-tab" onclick="mudarTabApp('desafios')">🌱 Desafios</button>
                <button class="app-tab" onclick="mudarTabApp('perfil')">👤 Perfil</button>
                <button class="app-tab" onclick="mudarTabApp('ranking')">🏆 Ranking</button>
                <button class="app-tab" onclick="mudarTabApp('eventos')">📅 Eventos</button>
                <button class="app-tab" onclick="mudarTabApp('pontos')">🗺️ Pontos</button>
            </div>
            <div id="appContent"></div>
        </div>
    </div>

    <div class="modal-overlay" id="uploadModal"><div class="modal-content" id="uploadContent"></div></div>
    <div class="chatbot-button" onclick="toggleChatbot()"><i class="fas fa-robot"></i></div>
    <div class="chatbot-container" id="chatbotContainer">
        <div class="chatbot-header"><h3><i class="fas fa-leaf"></i> EcoBot</h3><button onclick="toggleChatbot()">✕</button></div>
        <div class="chatbot-messages" id="chatbotMessages"><div class="message bot">Olá! Pergunte sobre reciclagem, compostagem ou pontos de coleta!</div></div>
        <div class="chatbot-input-area"><input type="text" id="chatbotInput" placeholder="Digite sua pergunta..." onkeypress="if(event.key==='Enter') enviarMensagem()"><button onclick="enviarMensagem()">📤</button></div>
    </div>

            { id: 7, titulo: "👕 Doar Roupas", descricao: "Doe 15 peças", pontos: 200, icone: "👕", dica: "Foto das roupas" },
            { id: 8, titulo: "💧 Economizar Água", descricao: "Reduza consumo em 20%", pontos: 400, icone: "💧", dica: "Compartilhe sua conta" },
            { id: 9, titulo: "⚡ Energia Solar", descricao: "Instale placa solar", pontos: 500, icone: "☀️", dica: "Foto da instalação" },
            { id: 10, titulo: "🌱 Compostagem", descricao: "Inicie uma composteira", pontos: 350, icone: "🌱", dica: "Foto da composteira" },
            { id: 11, titulo: "📚 Educador Ambiental", descricao: "Palestre sobre sustentabilidade", pontos: 450, icone: "📚", dica: "Foto do evento" },
            { id: 12, titulo: "🏆 EcoLíder", descricao: "Convide 5 amigos", pontos: 300, icone: "🏆", dica: "Compartilhe seu código" }
        ];

        const eventos = [
            { id: 1, titulo: "🌱 Mutirão de Limpeza", descricao: "Limpeza das margens do Rio Piracicaba", data: "10/04/2026", hora: "08:00", local: "Rua do Porto", vagas: 200, inscritos: 78, pontos: 200 },
            { id: 2, titulo: "♻️ Oficina de Reciclagem", descricao: "Aprenda técnicas avançadas", data: "17/04/2026", hora: "14:00", local: "SENAI", vagas: 40, inscritos: 35, pontos: 150 },
            { id: 3, titulo: "🌿 Workshop Compostagem", descricao: "Compostagem doméstica", data: "24/05/2026", hora: "10:00", local: "Horto Municipal", vagas: 60, inscritos: 42, pontos: 180 },
            { id: 4, titulo: "🚴 Pedal Sustentável", descricao: "Passeio ciclístico", data: "01/06/2026", hora: "08:00", local: "Largo dos Pescadores", vagas: 150, inscritos: 89, pontos: 180 }
        ];

        const pontosColeta = [
            { id: 1, nome: "Ecoponto Centro", endereco: "Av. Rui Barbosa, 800", tipo: "Ecoponto", horario: "Seg-Sex 8h-17h", telefone: "(19) 3403-1100", avaliacao: 4.5, lat: -22.7282, lng: -47.6495 },
            { id: 2, nome: "Ecoponto Paulicéia", endereco: "R. Javari, 150", tipo: "Ecoponto", horario: "Ter-Sáb 8h-16h", telefone: "(19) 3403-2200", avaliacao: 4.3, lat: -22.7145, lng: -47.6423 },
            { id: 3, nome: "Shopping Piracicaba", endereco: "Av. Limeira, 700", tipo: "Pilhas", horario: "Seg-Sáb 10h-22h", telefone: "(19) 3432-4545", avaliacao: 4.8, lat: -22.7410, lng: -47.6572 },
            { id: 4, nome: "ESALQ/USP", endereco: "Av. Pádua Dias, 11", tipo: "Eletrônicos", horario: "Seg-Sex 8h-17h", telefone: "(19) 3447-8500", avaliacao: 4.9, lat: -22.7129, lng: -47.6374 }
        ];

        const ranking = [
            { nome: "Pedro Graciano", pontos: 5480, nivel: "👑 Lenda Ambiental", streak: 127, avatar: "👑" },
            { nome: "Ana Beatriz", pontos: 5120, nivel: "🏆 Mestre Eco", streak: 112, avatar: "🌟" },
            { nome: "Carlos Eduardo", pontos: 4890, nivel: "🏆 Mestre Eco", streak: 98, avatar: "⚡" },
            { nome: "Mariana Santos", pontos: 4350, nivel: "🌳 Guardião", streak: 85, avatar: "🌸" },
            { nome: "Lucas Oliveira", pontos: 3980, nivel: "🌳 Guardião", streak: 76, avatar: "🌿" },
            { nome: "Fernanda Lima", pontos: 3520, nivel: "🍃 EcoHerói", streak: 67, avatar: "🍃" }
        ];

        let usuarioLogado = null;
        let tabAppAtiva = 'inicio';
        let inscricoesUsuario = [];
        let desafioAtual = null;
        let mapaInstance = null;
        let markers = [];
        let usuarios = [];

        // Carregar módulos dinamicamente
        async function carregarModulo(nome) {
            try {
                const response = await fetch(`pages/${nome}.html`);
                const html = await response.text();
                return html;
            } catch (error) {
                console.error(`Erro ao carregar ${nome}:`, error);
                return `<div class="card-moderno"><h2>Erro ao carregar módulo</h2><p>Não foi possível carregar o conteúdo de ${nome}</p></div>`;
            }
        }

        async function carregarUsuarios() {
            try {
                const response = await fetch(SHEETDB_URL);
                usuarios = await response.json();
            } catch (error) {
                usuarios = [
                    { nome: "João Silva", email: "joao@email.com", senha: "123456", telefone: "(19) 99999-1234", pontos: "2350", nivel: "🌳 EcoMestre", streak: "45", desafios: "28", conquistas: "Primeiro passo,Reciclador,Plantador" },
                    { nome: "Maria Santos", email: "maria@email.com", senha: "123456", telefone: "(19) 98888-5678", pontos: "3520", nivel: "🏆 EcoHerói", streak: "67", desafios: "42", conquistas: "Primeiro passo,Reciclador,Eventos,Streak 30" }
                ];
            }
        }

        function switchTab(tab) {
            document.getElementById('paneLogin').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('paneCadastro').style.display = tab === 'cadastro' ? 'block' : 'none';
            document.querySelectorAll('.auth-tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function mostrarAlerta(tipo, msg) {
            const area = document.getElementById('alertArea');
            area.innerHTML = `<div class="alert alert-${tipo}"><i class="fas ${tipo === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>${msg}</div>`;
            setTimeout(() => area.innerHTML = '', 3000);
        }

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginSenha').value;
            const localUser = usuarios.find(u => u.email === email && u.senha === senha);
            if (localUser) {
                usuarioLogado = localUser;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.add('active');
                atualizarHeader();
                tabAppAtiva = 'inicio';
                document.querySelectorAll('.app-tab').forEach(btn => btn.classList.remove('active'));
                document.querySelector('.app-tab').classList.add('active');
                renderAppContent();
                mostrarAlerta('success', `Bem-vindo, ${localUser.nome}!`);
            } else {
                mostrarAlerta('error', 'E-mail ou senha inválidos!');
            }
        }

        async function handleCadastro(event) {
            event.preventDefault();
            const nome = document.getElementById('cadastroNome').value;
            const email = document.getElementById('cadastroEmail').value;
            const senha = document.getElementById('cadastroSenha').value;
            const confirmar = document.getElementById('cadastroConfirmar').value;
            const telefone = document.getElementById('cadastroTelefone').value;
            if (senha !== confirmar) { mostrarAlerta('error', 'Senhas não coincidem'); return; }
            const novoUser = { nome, email, senha, telefone, pontos: "0", nivel: "🌱 EcoIniciante", streak: "1", desafios: "0", conquistas: "🌱 Primeiro passo" };
            usuarios.push(novoUser);
            mostrarAlerta('success', 'Conta criada! Faça login.');
            switchTab('login');
        }

        function logout() {
            usuarioLogado = null;
            document.getElementById('appScreen').classList.remove('active');
            document.getElementById('loginScreen').classList.remove('hidden');
            if (mapaInstance) mapaInstance.remove();
        }

        function atualizarHeader() {
            if (usuarioLogado) {
                document.getElementById('headerStreak').textContent = usuarioLogado.streak;
                document.getElementById('headerPoints').textContent = usuarioLogado.pontos;
                document.getElementById('headerAvatar').innerHTML = usuarioLogado.nome.charAt(0).toUpperCase();
            }
        }

        function mudarTabApp(tab) {
            tabAppAtiva = tab;
            document.querySelectorAll('.app-tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderAppContent();
        }

        async function renderAppContent() {
            const container = document.getElementById('appContent');
            
            // Dados para passar para os módulos
            const dados = {
                usuarioLogado,
                desafios,
                eventos,
                pontosColeta,
                ranking,
                inscricoesUsuario,
                funcoes: {
                    abrirUpload,
                    confirmarUpload,
                    inscreverEvento,
                    mostrarAlerta
                }
            };
            
            let conteudo = '';
            
            switch(tabAppAtiva) {
                case 'inicio':
                    conteudo = await carregarModulo('inicio');
                    break;
                case 'desafios':
                    conteudo = await carregarModulo('desafios');
                    break;
                case 'perfil':
                    conteudo = await carregarModulo('perfil');
                    break;
                case 'ranking':
                    conteudo = await carregarModulo('ranking');
                    break;
                case 'eventos':
                    conteudo = await carregarModulo('eventos');
                    break;
                case 'pontos':
                    conteudo = await carregarModulo('pontos');
                    break;
                default:
                    conteudo = await carregarModulo('inicio');
            }
            
            // Substituir placeholders pelos dados reais
            conteudo = conteudo.replace(/\{\{usuarioLogado\.nome\}\}/g, usuarioLogado?.nome || 'Usuário');
            conteudo = conteudo.replace(/\{\{usuarioLogado\.pontos\}\}/g, usuarioLogado?.pontos || '0');
            conteudo = conteudo.replace(/\{\{usuarioLogado\.streak\}\}/g, usuarioLogado?.streak || '0');
            conteudo = conteudo.replace(/\{\{usuarioLogado\.desafios\}\}/g, usuarioLogado?.desafios || '0');
            conteudo = conteudo.replace(/\{\{usuarioLogado\.nivel\}\}/g, usuarioLogado?.nivel || '🌱 EcoIniciante');
            
            container.innerHTML = conteudo;
            
            // Inicializar mapa se for a aba pontos
            if (tabAppAtiva === 'pontos' && typeof initMap === 'function') {
                setTimeout(() => initMap(pontosColeta), 100);
            }
        }

        function abrirUpload(id) {
            desafioAtual = desafios.find(d => d.id === id);
            const modal = document.getElementById('uploadModal');
            const content = document.getElementById('uploadContent');
            content.innerHTML = `<div><h2>📸 Comprovar: ${desafioAtual.titulo}</h2><p>${desafioAtual.dica}</p><input type="file" id="uploadFile" accept="image/*"><button class="btn-auth" onclick="confirmarUpload(${desafioAtual.id}, ${desafioAtual.pontos})">Enviar</button><button class="btn-auth" style="background:#666;" onclick="fecharModal('uploadModal')">Cancelar</button></div>`;
            modal.classList.add('active');
        }

        function confirmarUpload(id, pontos) {
            const novosPontos = parseInt(usuarioLogado.pontos) + pontos;
            usuarioLogado.pontos = novosPontos.toString();
            usuarioLogado.desafios = (parseInt(usuarioLogado.desafios) + 1).toString();
            if (novosPontos >= 5000) usuarioLogado.nivel = "👑 Lenda Ambiental";
            else if (novosPontos >= 3000) usuarioLogado.nivel = "🏆 Mestre Eco";
            else if (novosPontos >= 1500) usuarioLogado.nivel = "🌳 Guardião";
            else if (novosPontos >= 500) usuarioLogado.nivel = "🍃 EcoHerói";
            atualizarHeader();
            mostrarAlerta('success', `+${pontos} pontos!`);
            fecharModal('uploadModal');
            renderAppContent();
        }

        function fecharModal(modalId) { document.getElementById(modalId).classList.remove('active'); }
        function toggleChatbot() { document.getElementById('chatbotContainer').classList.toggle('open'); }
        
        function enviarMensagem() {
            const input = document.getElementById('chatbotInput');
            const msg = input.value.trim();
            if(!msg) return;
            const container = document.getElementById('chatbotMessages');
            container.innerHTML += `<div class="message user">${msg}</div>`;
            input.value = '';
            setTimeout(() => {
                let resposta = "🌿 Pergunte sobre reciclagem, compostagem ou pontos de coleta!";
                if(msg.toLowerCase().includes('reciclagem')) resposta = "♻️ Separe plástico, papel, vidro e metal. Em Piracicaba temos vários pontos de coleta!";
                else if(msg.toLowerCase().includes('compostagem')) resposta = "🌱 Compostagem transforma restos orgânicos em adubo. Reduz até 50% do lixo!";
                container.innerHTML += `<div class="message bot">${resposta}</div>`;
                container.scrollTop = container.scrollHeight;
            }, 500);
            container.scrollTop = container.scrollHeight;
        }

        carregarUsuarios();
        window.switchTab = switchTab;
        window.handleLogin = handleLogin;
        window.handleCadastro = handleCadastro;
        window.logout = logout;
        window.mudarTabApp = mudarTabApp;
        window.abrirUpload = abrirUpload;
        window.confirmarUpload = confirmarUpload;
        window.fecharModal = fecharModal;
        window.inscreverEvento = function(id) { inscricoesUsuario.push(id); mostrarAlerta('success', 'Inscrição realizada!'); renderAppContent(); };
        window.toggleChatbot = toggleChatbot;
        window.enviarMensagem = enviarMensagem;
    </script>
</body>
</html>
