<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SustentaPira · App Sustentável</title>
    
    <!-- Fontes e ícones -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FFFFFF;
            color: #5d3a1a;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* ===== TELA DE LOGIN ===== */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #FFFFFF;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            overflow-y: auto;
        }

        .login-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 500px;
            margin: auto;
        }

        .auth-card {
            background: #F5F5F5;
            border-radius: 32px;
            padding: 40px 30px;
            border: 1px solid #8b5a2b;
            box-shadow: 0 10px 30px rgba(93, 58, 26, 0.1);
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shine {
            0% { background-position: -100px; }
            40%, 100% { background-position: 200px; }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 64px;
            margin-bottom: 10px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        .logo-area h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .logo-area p {
            color: #8b4513;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ===== ESTILOS DAS ABAS ===== */
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #2a2a2a;
            padding: 6px;
            border-radius: 60px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 1px solid #3a3a3a;
        }
        
        .auth-tab {
            flex: 1;
            padding: 16px 20px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }
        
        .auth-tab i {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
        }
        
        .auth-tab.active {
            background: #8b4513;
            color: #FFFFFF;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.4);
            transform: scale(1.02);
        }
        
        .auth-tab.active i {
            color: #FFFFFF;
        }
        
        .auth-tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            color: #FFFFFF;
        }
        
        .auth-tab:hover:not(.active) i {
            color: #FFFFFF;
        }

        .auth-pane {
            display: none;
            animation: slideIn 0.4s ease;
        }

        .auth-pane.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #5d3a1a;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #8b4513;
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 48px;
            background: #FFFFFF;
            border: 2px solid #8b5a2b;
            border-radius: 16px;
            color: #5d3a1a;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #8b4513;
            box-shadow: 0 0 0 4px rgba(139, 69, 19, 0.1);
            background: #FFFFFF;
        }

        .btn-auth {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.5);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #8b4513;
        }

        .checkbox-group label {
            color: #5d3a1a;
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
        }

        .auth-links a {
            color: #8b4513;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0 20px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8b4513, transparent);
        }

        .divider span {
            padding: 0 15px;
            color: #8b4513;
            font-size: 14px;
        }

        .benefits {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0 0;
            padding: 20px;
            background: #F5F5F5;
            border-radius: 24px;
            border: 1px solid #8b5a2b;
        }

        .benefit-item {
            text-align: center;
        }

        .benefit-item i {
            font-size: 24px;
            color: #8b4513;
            margin-bottom: 8px;
        }

        .benefit-item span {
            display: block;
            font-size: 12px;
            color: #5d3a1a;
            font-weight: 600;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 16px;
            margin: 20px 0;
            border-left: 4px solid;
            background: #F5F5F5;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #5d3a1a;
        }

        .alert-success {
            border-left-color: #8b4513;
        }

        .alert-error {
            border-left-color: #f44336;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(139, 69, 19, 0.3);
            border-top-color: #8b4513;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== TELA PRINCIPAL DO APP ===== */
        .app-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .app-screen.hidden {
            display: none;
            opacity: 0;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            margin: 0 auto;
        }

        /* Header do app */
        .app-header {
            margin-bottom: 30px;
        }

        .user-info-card {
            background: #F5F5F5;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #8b5a2b;
            box-shadow: 0 5px 20px rgba(93, 58, 26, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .user-greeting {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }

        .user-info h2 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #3a2a1a;
        }

        .user-info p {
            color: #8b4513;
            font-size: 14px;
            font-weight: 600;
        }

        .user-stats {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
            min-width: 80px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #8b4513;
        }

        .stat-label {
            font-size: 12px;
            color: #5d3a1a;
            text-transform: uppercase;
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid #f44336;
            color: #f44336;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: #f44336;
            color: white;
        }

        /* Tabs do app */
        .app-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            background: #3a2a1a;
            padding: 10px;
            border-radius: 60px;
        }

        .app-tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: #FFFFFF;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .app-tab.active {
            background: #8b4513;
            color: #FFFFFF;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
        }

        .app-tab-content {
            display: none;
        }

        .app-tab-content.active {
            display: block;
        }

        /* Cards */
        .card-moderno {
            background: #F5F5F5;
            border-radius: 24px;
            padding: 25px;
            border: 1px solid #8b5a2b;
            box-shadow: 0 5px 20px rgba(93, 58, 26, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            color: #5d3a1a;
            margin-bottom: 20px;
        }

        .card-moderno:hover {
            transform: translateY(-5px);
            border-color: #8b4513;
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.15);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            margin: 5px;
        }

        .badge-success {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            color: white;
        }

        .badge-info {
            background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
            color: white;
        }

        .badge-warning {
            background: linear-gradient(135deg, #ff8f00 0%, #ff6f00 100%);
            color: white;
        }

        .badge-premium {
            background: linear-gradient(135deg, #7b1fa2 0%, #4a148c 100%);
            color: white;
        }

        .badge-gold {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #5d3a1a;
            font-weight: 700;
        }

        .badge-silver {
            background: linear-gradient(135deg, #C0C0C0 0%, #A9A9A9 100%);
            color: #5d3a1a;
            font-weight: 700;
        }

        .badge-bronze {
            background: linear-gradient(135deg, #CD7F32 0%, #B87333 100%);
            color: white;
            font-weight: 700;
        }

        .titulo-secao {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 15px;
            color: #3a2a1a;
        }

        .titulo-secao:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #8b4513, #b85e3a);
            border-radius: 2px;
        }

        /* ===== RANKING MELHORADO ===== */
        .ranking-container {
            padding: 10px 0;
        }

        .podium {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 15px;
            margin: 40px 0 50px;
            flex-wrap: wrap;
        }

        .podium-item {
            flex: 1;
            min-width: 150px;
            text-align: center;
            position: relative;
            border-radius: 24px 24px 0 0;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .podium-item:hover {
            transform: translateY(-10px);
        }

        .podium-item.first {
            background: linear-gradient(180deg, rgba(255,215,0,0.2) 0%, rgba(255,215,0,0.05) 100%);
            border-top: 3px solid #FFD700;
            box-shadow: 0 -10px 20px -10px rgba(255,215,0,0.3);
            order: 2;
        }

        .podium-item.second {
            background: linear-gradient(180deg, rgba(192,192,192,0.2) 0%, rgba(192,192,192,0.05) 100%);
            border-top: 3px solid #C0C0C0;
            box-shadow: 0 -10px 20px -10px rgba(192,192,192,0.3);
            order: 1;
        }

        .podium-item.third {
            background: linear-gradient(180deg, rgba(205,127,50,0.2) 0%, rgba(205,127,50,0.05) 100%);
            border-top: 3px solid #CD7F32;
            box-shadow: 0 -10px 20px -10px rgba(205,127,50,0.3);
            order: 3;
        }

        .podium-medal {
            font-size: 48px;
            margin: 10px 0;
            animation: pulse 2s infinite;
        }

        .podium-item.first .podium-medal {
            animation: pulse 2s infinite;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.5));
        }

        .podium-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            margin: 0 auto 15px;
            border: 3px solid currentColor;
        }

        .podium-item.first .podium-avatar {
            width: 100px;
            height: 100px;
            font-size: 48px;
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        .podium-name {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .podium-item.first .podium-name {
            font-size: 22px;
            color: #3a2a1a;
        }

        .podium-level {
            font-size: 14px;
            color: #8b4513;
            margin-bottom: 10px;
        }

        .podium-points {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }

        .podium-streak {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(139, 69, 19, 0.1);
            border-radius: 50px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .podium-streak i {
            color: #ff9800;
            margin-right: 5px;
        }

        .ranking-list {
            margin-top: 30px;
        }

        .ranking-card {
            background: #F5F5F5;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid #8b5a2b;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .ranking-card:hover {
            transform: translateX(5px);
            border-color: #8b4513;
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.1);
            background: #fafafa;
        }

        .ranking-card-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .ranking-user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
        }

        .ranking-position {
            font-size: 24px;
            font-weight: 800;
            min-width: 50px;
            text-align: center;
        }

        .ranking-position.top-4 {
            color: #8b4513;
        }

        .ranking-position.top-5 {
            color: #5d3a1a;
        }

        .ranking-avatar-small {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        .ranking-details {
            flex: 1;
        }

        .ranking-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .ranking-level {
            font-size: 12px;
            color: #8b4513;
            margin-bottom: 5px;
        }

        .ranking-stats {
            display: flex;
            gap: 20px;
            font-size: 12px;
        }

        .ranking-stats i {
            margin-right: 5px;
        }

        .ranking-stats .fa-fire {
            color: #ff9800;
        }

        .ranking-stats .fa-star {
            color: #8b4513;
        }

        .ranking-points-badge {
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            min-width: 80px;
            text-align: center;
        }

        .ranking-motivation {
            margin: 30px 0 20px;
            padding: 20px;
            background: linear-gradient(135deg, #f9f5f0, #f0e9e0);
            border-radius: 16px;
            border: 1px solid #8b5a2b;
            text-align: center;
            animation: pulse 2s infinite;
        }

        .ranking-motivation i {
            font-size: 32px;
            color: #8b4513;
            margin-bottom: 10px;
        }

        .ranking-motivation h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #3a2a1a;
        }

        .ranking-motivation p {
            color: #5d3a1a;
            margin-bottom: 15px;
        }

        .progress-challenge {
            width: 100%;
            height: 8px;
            background: #e0d5c0;
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-challenge-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b4513, #b85e3a);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .next-level-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #5d3a1a;
            margin-top: 5px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .auth-card {
                padding: 30px 20px;
            }

            .user-info-card {
                flex-direction: column;
                text-align: center;
            }

            .user-greeting {
                flex-direction: column;
            }

            .user-stats {
                justify-content: center;
                gap: 20px;
            }

            .app-tabs {
                justify-content: center;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }

            .perfil-header {
                flex-direction: column;
                text-align: center;
            }

            .podium {
                flex-direction: column;
                align-items: center;
            }

            .podium-item {
                width: 100%;
            }

            .ranking-card-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .ranking-points-badge {
                align-self: flex-end;
            }
        }

        @media (max-width: 480px) {
            .auth-tab {
                padding: 12px;
                font-size: 14px;
            }

            .benefits {

                    fetch(`${SHEETDB_URL}/search?email=${user.email}`)

                                localStorage.removeItem('sustentapira_user');

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginSenha').value;
            const lembrar = document.getElementById('lembrar').checked;

            const btn = document.getElementById('btnLogin');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner"></span> Entrando...';
            btn.disabled = true;

            try {
                // Buscar usuário na SheetDB
                const response = await fetch(`${SHEETDB_URL}/search?email=${email}`);
                const usuariosEncontrados = await response.json();
                
                const usuario = usuariosEncontrados.find(u => u.senha === senha);
                
                if (usuario) {
                    usuarioLogado = usuario;
                    
                    // Se "Lembrar meu acesso" estiver marcado, salvar no localStorage
                    if (lembrar) {
                        // Salvar apenas informações não sensíveis
                        const userToSave = {
                            id: usuario.id || usuario._id,
                            nome: usuario.nome,
                            email: usuario.email,
                            pontos: usuario.pontos,
                            nivel: usuario.nivel,
                            streak: usuario.streak,
                            desafios: usuario.desafios,
                            data_cadastro: usuario.data_cadastro
                        };
                        localStorage.setItem('sustentapira_user', JSON.stringify(userToSave));
                    } else {
                        // Se não estiver marcado, remover qualquer login salvo
                        localStorage.removeItem('sustentapira_user');
                    }
                    
                    mostrarAlerta('success', `Bem-vindo, ${usuario.nome}!`);
                    
                    setTimeout(() => {
                        document.getElementById('loginScreen').classList.add('hidden');
                        document.getElementById('appScreen').classList.remove('hidden');
                        atualizarUserInfo();
                        renderAppContent();
                    }, 1500);
                } else {
                    mostrarAlerta('error', 'E-mail ou senha inválidos!');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Erro no login:', error);
                mostrarAlerta('error', 'Erro ao conectar com o servidor');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function handleCadastro(event) {
            event.preventDefault();
            
            const nome = document.getElementById('cadastroNome').value;
            const email = document.getElementById('cadastroEmail').value;
            const senha = document.getElementById('cadastroSenha').value;
            const confirmar = document.getElementById('cadastroConfirmar').value;
            const telefone = document.getElementById('cadastroTelefone').value;

            if (senha !== confirmar) {
                mostrarAlerta('error', 'As senhas não coincidem!');
                return;
            }

            const btn = document.getElementById('btnCadastro');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner"></span> Criando conta...';
            btn.disabled = true;

            try {
                // Verificar se email já existe
                const response = await fetch(`${SHEETDB_URL}/search?email=${email}`);
                const usuariosExistentes = await response.json();
                
                if (usuariosExistentes.length > 0) {
                    mostrarAlerta('error', 'E-mail já cadastrado!');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    return;
                }

                const novoUsuario = {
                    nome: nome,
                    email: email,
                    senha: senha,
                    telefone: telefone || '',
                    cidade: "Piracicaba",
                    data_cadastro: new Date().toLocaleDateString('pt-BR'),
                    pontos: "0",
                    nivel: "🌱 EcoIniciante",
                    streak: "1",
                    desafios: "0",
                    conquistas: "🌱 Primeiro passo"
                };

                // Salvar na SheetDB
                const saveResponse = await fetch(SHEETDB_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [novoUsuario] })
                });

                const resultado = await saveResponse.json();
                
                if (resultado.created) {
                    mostrarAlerta('success', 'Conta criada com sucesso! Faça o login.');
                    
                    // Limpar formulário
                    document.getElementById('cadastroNome').value = '';
                    document.getElementById('cadastroEmail').value = '';
                    document.getElementById('cadastroTelefone').value = '';
                    document.getElementById('cadastroSenha').value = '';
                    document.getElementById('cadastroConfirmar').value = '';
                    
                    // Recarregar usuários
                    await carregarUsuarios();
                    
                    switchTab('login');
                } else {
                    mostrarAlerta('error', 'Erro ao criar conta');
                }
            } catch (error) {
                console.error('Erro no cadastro:', error);
                mostrarAlerta('error', 'Erro ao conectar com o servidor');
            }

            btn.innerHTML = originalText;
            btn.disabled = false;
        }

                    <i class="fas fa-trophy"></i>
                    <h3>🚀 Você pode chegar lá!</h3>
                    <p>Complete desafios e participe de eventos para ganhar pontos e subir no ranking!</p>
                    <div class="progress-challenge">
                        <div class="progress-challenge-fill" style="width: 65%;"></div>
                    </div>
                    <div class="next-level-info">
                        <span>Faltam 1.750 pontos</span>
                        <span>Próximo nível: EcoMestre</span>
                    </div>
                </div>
            `;
            
            // Restante do ranking
            html += '<div class="ranking-list">';
            
            ranking.slice(3).forEach((user, index) => {
                const posicao = index + 4;
                const medalClass = posicao <= 5 ? "top-4" : "top-5";
                
                html += `
                    <div class="ranking-card" onclick="mostrarMensagemMotivacional('${user.nome}', ${user.pontos})">
                        <div class="ranking-card-content">
                            <div class="ranking-user-info">
                                <div class="ranking-position ${medalClass}">${posicao}º</div>
                                <div class="ranking-avatar-small">👤</div>
                                <div class="ranking-details">
                                    <div class="ranking-name">${user.nome}</div>
                                    <div class="ranking-level">${user.nivel}</div>
                                    <div class="ranking-stats">
                                        <span><i class="fas fa-fire"></i> ${user.streak} dias</span>
                                        <span><i class="fas fa-star"></i> ${user.pontos} pts</span>
                                    </div>
                                </div>
                            </div>
                            <div class="ranking-points-badge">
                                ${user.pontos} pts
                            </div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            
            container.innerHTML = html;
        }

        function mostrarMensagemMotivacional(nome, pontos) {
            const mensagens = [
                "💪 Continue assim! Você está fazendo a diferença!",
                "🌱 Cada ponto conta para um futuro mais sustentável!",
                "🌟 Você é um exemplo para a comunidade!",
                "🚀 Continue subindo no ranking! O topo te espera!",
                "💚 Sua dedicação está transformando Piracicaba!",
                "🎯 Foque nos desafios e acumule mais pontos!",
                "🌿 A natureza agradece sua contribuição!"
            ];
            
            const mensagemAleatoria = mensagens[Math.floor(Math.random() * mensagens.length)];
            mostrarAlerta('success', mensagemAleatoria);
        }

        function renderEventos(container) {
            let html = '<h1 class="titulo-secao">Eventos</h1>';
            
            // Estatísticas
            const totalEventos = eventos.length;
            const eventosDisponiveis = eventos.filter(e => e.vagas === 0 || e.inscritos < e.vagas).length;
            const totalPontos = eventos.reduce((acc, e) => acc + e.pontos, 0);
            
            html += `
                <div class="card-grid" style="margin-bottom: 30px;">
                    <div class="stat-card" style="background: #F5F5F5; border: 1px solid #8b5a2b; border-radius: 16px; padding: 20px; text-align: center;">
                        <div class="stat-value" style="color: #3a2a1a; font-size: 32px; font-weight: 700;">${totalEventos}</div>
                        <div class="stat-label" style="color: #5d3a1a; font-weight: 600;">Eventos em 2026</div>
                    </div>
                    <div class="stat-card" style="background: #F5F5F5; border: 1px solid #8b5a2b; border-radius: 16px; padding: 20px; text-align: center;">
                        <div class="stat-value" style="color: #3a2a1a; font-size: 32px; font-weight: 700;">${eventosDisponiveis}</div>
                        <div class="stat-label" style="color: #5d3a1a; font-weight: 600;">Com vagas</div>
                    </div>
                    <div class="stat-card" style="background: #F5F5F5; border: 1px solid #8b5a2b; border-radius: 16px; padding: 20px; text-align: center;">
                        <div class="stat-value" style="color: #3a2a1a; font-size: 32px; font-weight: 700;">+${totalPontos}</div>
                        <div class="stat-label" style="color: #5d3a1a; font-weight: 600;">Pontos totais</div>
                    </div>
                </div>
            `;
            
            // Agrupar por mês
            const meses = {
                '01': 'Janeiro', '02': 'Fevereiro', '03': 'Março', '04': 'Abril',
                '05': 'Maio', '06': 'Junho', '07': 'Julho', '08': 'Agosto',
                '09': 'Setembro', '10': 'Outubro', '11': 'Novembro', '12': 'Dezembro'
            };
            
            const eventosPorMes = {};
            eventos.forEach(evento => {
                const mes = evento.data.split('/')[1];
                if (!eventosPorMes[mes]) eventosPorMes[mes] = [];
                eventosPorMes[mes].push(evento);
            });
            
            Object.keys(eventosPorMes).sort().forEach(mesNum => {
                const nomeMes = meses[mesNum];
                html += `<h2 style="margin: 30px 0 15px; color: #8b4513;">${nomeMes} 2026</h2>`;
                
                eventosPorMes[mesNum].forEach(evento => {
                    const inscrito = inscricoesUsuario.includes(evento.id);
                    
                    html += `
                        <div class="card-moderno" style="margin-bottom: 15px;">
                            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                                <div style="flex: 1;">
                                    <span class="badge badge-info">${evento.tipo.toUpperCase()}</span>
                                    <h3 style="margin: 10px 0; color: #3a2a1a;">${evento.titulo}</h3>
                                    <p style="color: #5d3a1a; margin-bottom: 15px;">${evento.descricao}</p>
                                    <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 10px;">
                                        <span style="color: #5d3a1a;"><i class="fas fa-calendar" style="color: #8b4513;"></i> ${evento.data}</span>
                                        <span style="color: #5d3a1a;"><i class="fas fa-clock" style="color: #8b4513;"></i> ${evento.hora}</span>
                                        <span style="color: #5d3a1a;"><i class="fas fa-map-marker-alt" style="color: #8b4513;"></i> ${evento.local}</span>
                                    </div>
                                    <span class="badge badge-success">+${evento.pontos} pontos</span>
                                    ${evento.vagas > 0 ? `<span class="badge badge-info">${evento.inscritos}/${evento.vagas} inscritos</span>` : ''}
                                </div>
                            </div>
                            ${!inscrito && (evento.vagas === 0 || evento.inscritos < evento.vagas) ? `
                                <div style="margin-top: 15px;">
                                    <button class="btn-auth" onclick="abrirInscricao(${evento.id})">📝 Inscrever-se</button>
                                </div>
                            ` : inscrito ? `
                                <div style="margin-top: 15px;">
                                    <span class="badge badge-success">✅ Inscrito</span>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
            });
            
            container.innerHTML = html;
        }

        function renderPontos(container) {
            const categorias = {};
            pontosColeta.forEach(ponto => {
                if (!categorias[ponto.categoria]) categorias[ponto.categoria] = [];
                categorias[ponto.categoria].push(ponto);
            });
            
            const iconesCategoria = {
                'geral': '🗑️',
                'pilhas': '🔋',
                'eletronicos': '💻',
                'oleo': '🫒',
                'vidros': '🥃',
                'papel': '📄',
                'roupas': '👕'
            };
            
            let html = '<h1 class="titulo-secao" style="color: #3a2a1a;">Pontos de Coleta em Piracicaba</h1>';
            html += '<p style="color: #5d3a1a; margin-bottom: 30px; font-weight: 500;">Rede completa com 38 pontos de descarte para diversos materiais.</p>';
            
            // Estatísticas
            html += `
                <div class="card-grid" style="margin-bottom: 30px;">
                    <div class="stat-card" style="background: #F5F5F5; border: 1px solid #8b5a2b; border-radius: 16px; padding: 20px; text-align: center;">
                        <div class="stat-value" style="color: #3a2a1a; font-size: 36px; font-weight: 700;">${pontosColeta.length}</div>
                        <div class="stat-label" style="color: #5d3a1a; font-weight: 600;">Total de Pontos</div>
                    </div>
                    <div class="stat-card" style="background: #F5F5F5; border: 1px solid #8b5a2b; border-radius: 16px; padding: 20px; text-align: center;">
                        <div class="stat-value" style="color: #3a2a1a; font-size: 36px; font-weight: 700;">${Object.keys(categorias).length}</div>
                        <div class="stat-label" style="color: #5d3a1a; font-weight: 600;">Categorias</div>
                    </div>
                    <div class="stat-card" style="background: #F5F5F5; border: 1px solid #8b5a2b; border-radius: 16px; padding: 20px; text-align: center;">
                        <div class="stat-value" style="color: #3a2a1a; font-size: 36px; font-weight: 700;">⭐ 4.5</div>
                        <div class="stat-label" style="color: #5d3a1a; font-weight: 600;">Avaliação média</div>
                    </div>
                </div>
            `;
            
            // Mostrar por categoria
            Object.keys(categorias).sort().forEach(categoria => {
                const icone = iconesCategoria[categoria] || '📍';
                html += `<h2 style="margin: 30px 0 15px; color: #8b4513;">${icone} ${categoria.toUpperCase()} (${categorias[categoria].length})</h2>`;
                html += '<div class="card-grid">';
                
                categorias[categoria].forEach(ponto => {
                    const estrelas = '★'.repeat(Math.round(ponto.avaliacao)) + '☆'.repeat(5 - Math.round(ponto.avaliacao));
                    
                    html += `
                        <div class="card-moderno">
                            <h3 style="color: #3a2a1a;">${ponto.nome}</h3>
                            <p style="color: #8b4513; margin: 5px 0; font-weight: 500;"><i class="fas fa-tag"></i> ${ponto.tipo}</p>
                            <p style="color: #5d3a1a; margin: 5px 0;"><i class="fas fa-map-pin"></i> ${ponto.endereco}</p>
                            <p style="color: #5d3a1a; margin: 5px 0;"><i class="fas fa-clock"></i> ${ponto.horario}</p>
                            <p style="color: #5d3a1a; margin: 5px 0;"><i class="fas fa-phone"></i> ${ponto.telefone}</p>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                                <span style="color: gold;">${estrelas}</span>
                                <span class="badge badge-info">${ponto.avaliacao}/5</span>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
            });
            
            container.innerHTML = html;
        }

        function abrirInscricao(eventoId) {
            const evento = eventos.find(e => e.id === eventoId);
            if (!evento) return;

            const modal = document.getElementById('inscricaoModal');
            const content = document.getElementById('inscricaoContent');
            
            content.innerHTML = `
                <div class="card-moderno">
                    <h2 style="margin-bottom: 20px; color: #3a2a1a;">📝 Confirmar Inscrição</h2>
                    <h3 style="color: #3a2a1a;">${evento.titulo}</h3>
                    <p style="color: #5d3a1a; margin: 15px 0;">${evento.descricao}</p>
                    <p style="color: #5d3a1a;"><i class="fas fa-calendar" style="color: #8b4513;"></i> ${evento.data} às ${evento.hora}</p>
                    <p style="color: #5d3a1a;"><i class="fas fa-map-marker-alt" style="color: #8b4513;"></i> ${evento.local}</p>
                    <p style="color: #8b4513; font-weight: 600;"><i class="fas fa-star"></i> +${evento.pontos} pontos</p>
                    
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button class="btn-auth" onclick="confirmarInscricao(${eventoId})">✅ Confirmar</button>
                        <button class="btn-auth" style="background: #666;" onclick="fecharModal('inscricaoModal')">❌ Cancelar</button>
                    </div>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function confirmarInscricao(eventoId) {
            inscricoesUsuario.push(eventoId);
            alert('✅ Inscrição realizada com sucesso! Você receberá um e-mail de confirmação.');
            fecharModal('inscricaoModal');
            renderAppContent();
        }

        function abrirUpload(desafioId) {
            const desafio = desafios.find(d => d.id === desafioId);
            if (!desafio) return;

            const modal = document.getElementById('uploadModal');
            const content = document.getElementById('uploadContent');
            
            content.innerHTML = `
                <div class="card-moderno">
                    <h2 style="margin-bottom: 20px; color: #3a2a1a;">📸 Comprovar: ${desafio.titulo}</h2>
                    <p style="background: #F5F5F5; border: 1px solid #8b5a2b; padding: 15px; border-radius: 12px; margin: 15px 0; color: #5d3a1a;">
                        <i class="fas fa-info-circle" style="color: #8b4513;"></i> ${desafio.dica}
                    </p>
                    <div style="border: 2px dashed #8b4513; border-radius: 16px; padding: 30px; text-align: center; margin: 20px 0;">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 48px; color: #8b4513; margin-bottom: 10px;"></i>
                        <p style="color: #5d3a1a;">Clique para selecionar ou arraste uma imagem</p>
                        <input type="file" accept="image/*" id="uploadFile" style="margin-top: 10px; color: #5d3a1a;">
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-auth" onclick="confirmarUpload(${desafioId})">📤 Enviar comprovante</button>
                        <button class="btn-auth" style="background: #666;" onclick="fecharModal('uploadModal')">❌ Cancelar</button>
                    </div>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function confirmarUpload(desafioId) {
            const fileInput = document.getElementById('uploadFile');
            if (!fileInput || !fileInput.files[0]) {
                alert('Por favor, selecione uma imagem!');
                return;
            }

            const desafio = desafios.find(d => d.id === desafioId);
            
            // Simular validação
            const pontosAtuais = parseInt(usuarioLogado.pontos) || 0;
            usuarioLogado.pontos = (pontosAtuais + desafio.pontos).toString();
            
            const desafiosAtuais = parseInt(usuarioLogado.desafios) || 0;
            usuarioLogado.desafios = (desafiosAtuais + 1).toString();
            
            // Atualizar nível
            const pontos = parseInt(usuarioLogado.pontos);
            if (pontos >= 5000) usuarioLogado.nivel = "🏆 EcoHerói";
            else if (pontos >= 1000) usuarioLogado.nivel = "🌳 EcoMestre";
            else if (pontos >= 500) usuarioLogado.nivel = "🍃 EcoGuardião";
            else if (pontos >= 100) usuarioLogado.nivel = "🌿 EcoAmigo";
            
            atualizarUserInfo();
            
            alert(`✅ Comprovante validado! Você ganhou ${desafio.pontos} pontos.`);
            fecharModal('uploadModal');
            renderAppContent();
        }

        function fecharModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
    </script>
</body>
</html>
