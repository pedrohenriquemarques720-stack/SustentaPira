<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SustentaPira · App Sustentável</title>
    
    <!-- Fontes e ícones -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Biblioteca para decodificar JWT -->
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FFFFFF;
            color: #5d3a1a;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* ===== TELA DE LOGIN ===== */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #FFFFFF;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            overflow-y: auto;
        }

        .login-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 500px;
            margin: auto;
        }

        .auth-card {
            background: #F5F5F5;
            border-radius: 32px;
            padding: 40px 30px;
            border: 1px solid #8b5a2b;
            box-shadow: 0 10px 30px rgba(93, 58, 26, 0.1);
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 64px;
            margin-bottom: 10px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo-area h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .logo-area p {
            color: #8b4513;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ===== ESTILOS CORRIGIDOS DAS ABAS ===== */
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #2a2a2a;
            padding: 6px;
            border-radius: 60px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 1px solid #3a3a3a;
        }
        
        .auth-tab {
            flex: 1;
            padding: 16px 20px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }
        
        .auth-tab i {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
        }
        
        .auth-tab.active {
            background: #8b4513;
            color: #FFFFFF;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.4);
            transform: scale(1.02);
        }
        
        .auth-tab.active i {
            color: #FFFFFF;
        }
        
        .auth-tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            color: #FFFFFF;
        }
        
        .auth-tab:hover:not(.active) i {
            color: #FFFFFF;
        }

        .auth-pane {
            display: none;
            animation: slideIn 0.4s ease;
        }

        .auth-pane.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #5d3a1a;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #8b4513;
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 48px;
            background: #FFFFFF;
            border: 2px solid #8b5a2b;
            border-radius: 16px;
            color: #5d3a1a;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #8b4513;
            box-shadow: 0 0 0 4px rgba(139, 69, 19, 0.1);
            background: #FFFFFF;
        }

        .btn-auth {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.5);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #8b4513;
        }

        .checkbox-group label {
            color: #5d3a1a;
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
        }

        .auth-links a {
            color: #8b4513;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0 20px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8b4513, transparent);
        }

        .divider span {
            padding: 0 15px;
            color: #8b4513;
            font-size: 14px;
        }

        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-social {
            padding: 12px 30px;
            border: 2px solid #8b5a2b;
            background: #FFFFFF;
            border-radius: 16px;
            color: #5d3a1a;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 300px;
        }

        .btn-social:hover {
            border-color: #8b4513;
            background: #F5F5F5;
        }

        .btn-social.google {
            background: #FFFFFF;
            color: #5d3a1a;
        }

        .btn-social.google i {
            color: #DB4437;
        }

        .benefits {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0 0;
            padding: 20px;
            background: #F5F5F5;
            border-radius: 24px;
            border: 1px solid #8b5a2b;
        }

        .benefit-item {
            text-align: center;
        }

        .benefit-item i {
            font-size: 24px;
            color: #8b4513;
            margin-bottom: 8px;
        }

        .benefit-item span {
            display: block;
            font-size: 12px;
            color: #5d3a1a;
            font-weight: 600;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 16px;
            margin: 20px 0;
            border-left: 4px solid;
            background: #F5F5F5;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #5d3a1a;
        }

        .alert-success {
            border-left-color: #8b4513;
        }

        .alert-error {
            border-left-color: #f44336;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(139, 69, 19, 0.3);
            border-top-color: #8b4513;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== TELA PRINCIPAL DO APP ===== */
        .app-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .app-screen.hidden {
            display: none;
            opacity: 0;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            margin: 0 auto;
        }

        /* Header do app */
        .app-header {
            margin-bottom: 30px;
        }

        .user-info-card {
            background: #F5F5F5;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #8b5a2b;
            box-shadow: 0 5px 20px rgba(93, 58, 26, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .user-greeting {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }

        .user-info h2 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #3a2a1a;
        }

        .user-info p {
            color: #8b4513;
            font-size: 14px;
            font-weight: 600;
        }

        .user-stats {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
            min-width: 80px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #8b4513;
        }

        .stat-label {
            font-size: 12px;
            color: #5d3a1a;
            text-transform: uppercase;
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid #f44336;
            color: #f44336;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: #f44336;
            color: white;
        }

        /* Tabs do app */
        .app-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            background: #3a2a1a;
            padding: 10px;
            border-radius: 60px;
        }

        .app-tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: #FFFFFF;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .app-tab.active {
            background: #8b4513;
            color: #FFFFFF;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
        }

        .app-tab-content {
            display: none;
        }

        .app-tab-content.active {
            display: block;
        }

        /* Cards */
        .card-moderno {
            background: #F5F5F5;
            border-radius: 24px;
            padding: 25px;
            border: 1px solid #8b5a2b;
            box-shadow: 0 5px 20px rgba(93, 58, 26, 0.1);
            transition: transform 0.3s ease;
            color: #5d3a1a;
            margin-bottom: 20px;
        }

        .card-moderno:hover {
            transform: translateY(-5px);
            border-color: #8b4513;
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.15);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            margin: 5px;
        }

        .badge-success {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            color: white;
        }

        .badge-info {
            background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
            color: white;
        }

        .badge-warning {
            background: linear-gradient(135deg, #ff8f00 0%, #ff6f00 100%);
            color: white;
        }

        .badge-premium {
            background: linear-gradient(135deg, #7b1fa2 0%, #4a148c 100%);
            color: white;
        }

        .titulo-secao {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 15px;
            color: #3a2a1a;
        }

        .titulo-secao:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #8b4513, #b85e3a);
            border-radius: 2px;
        }

        /* Perfil detalhado */
        .perfil-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .perfil-avatar-large {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border: 3px solid #8b4513;
            color: white;
        }

        .perfil-info h3 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #3a2a1a;
        }

        .perfil-info p {
            color: #5d3a1a;
            margin: 5px 0;
        }

        .perfil-level-box {
            background: #F5F5F5;
            border: 1px solid #8b5a2b;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 10px;
            background: #e0d5c0;
            border-radius: 5px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b4513, #b85e3a);
            border-radius: 5px;
            transition: width 0.3s ease;
        }

        .conquistas-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .conquista-item {
            background: #F5F5F5;
            border: 1px solid #8b5a2b;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            min-width: 100px;
        }

        .conquista-item i {
            font-size: 32px;
            color: #8b4513;
            margin-bottom: 8px;
        }

        .conquista-item span {
            color: #5d3a1a;
            font-weight: 600;
            font-size: 12px;
            display: block;
            margin-top: 5px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .auth-card {
                padding: 30px 20px;
            }

            .user-info-card {
                flex-direction: column;
                text-align: center;
            }

            .user-greeting {
                flex-direction: column;
            }

            .user-stats {
                justify-content: center;
                gap: 20px;
            }

            .app-tabs {
                justify-content: center;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }

            .perfil-header {
                flex-direction: column;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .auth-tab {
                padding: 12px;
                font-size: 14px;
            }

            .social-buttons {
                grid-template-columns: 1fr;
            }

            .benefits {
                grid-template-columns: 1fr;
            }

            .benefit-item {
                display: flex;
                align-items: center;
                gap: 10px;
                text-align: left;
            }

            .stat-value {
                font-size: 22px;
            }
        }

        /* Estilo para o botão do Google quando renderizado */
        .btn-social.google .nsm7Bb-HzV7m-LgbsSe {
            width: 100% !important;
            min-width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
        }
    </style>
</head>
<body>
    <!-- TELA DE LOGIN -->
    <div class="login-screen" id="loginScreen">
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="logo-area">
                    <div class="logo-icon">🌿</div>
                    <h1>SustentaPira</h1>
                    <p>Sustentabilidade em ação</p>
                </div>

                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')" id="tabLogin">
                        <i class="fas fa-sign-in-alt"></i>
                        <span>Entrar</span>
                    </button>
                    <button class="auth-tab" onclick="switchTab('cadastro')" id="tabCadastro">
                        <i class="fas fa-user-plus"></i>
                        <span>Criar conta</span>
                    </button>
                </div>

                <div id="alertArea"></div>

                <div class="auth-content">
                    <!-- Painel de Login -->
                    <div class="auth-pane active" id="paneLogin">
                        <form onsubmit="handleLogin(event)">
                            <div class="form-group">
                                <label>E-mail</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-envelope input-icon"></i>
                                    <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Senha</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-lock input-icon"></i>
                                    <input type="password" id="loginSenha" placeholder="••••••••" required>
                                </div>
                            </div>

                            <div class="checkbox-group">
                                <input type="checkbox" id="lembrar">
                                <label for="lembrar">Lembrar meu acesso</label>
                            </div>

                            <button type="submit" class="btn-auth" id="btnLogin">
                                <i class="fas fa-sign-in-alt"></i>
                                Entrar no SustentaPira
                            </button>

                            <div class="auth-links">
                                <a href="#" onclick="esqueciSenha(event)">Esqueceu sua senha?</a>
                            </div>
                        </form>
                    </div>

                    <!-- Painel de Cadastro -->
                    <div class="auth-pane" id="paneCadastro">
                        <form onsubmit="handleCadastro(event)">
                            <div class="form-group">
                                <label>Nome completo</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-user input-icon"></i>
                                    <input type="text" id="cadastroNome" placeholder="João Silva" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>E-mail</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-envelope input-icon"></i>
                                    <input type="email" id="cadastroEmail" placeholder="joao@email.com" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Telefone</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-phone input-icon"></i>
                                    <input type="tel" id="cadastroTelefone" placeholder="(19) 99999-9999">
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Senha</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-lock input-icon"></i>
                                    <input type="password" id="cadastroSenha" placeholder="Mínimo 6 caracteres" required minlength="6">
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Confirmar senha</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-lock input-icon"></i>
                                    <input type="password" id="cadastroConfirmar" placeholder="Digite novamente" required>
                                </div>
                            </div>

                            <div class="checkbox-group">
                                <input type="checkbox" id="termos" required>
                                <label for="termos">Eu aceito os <a href="#" style="color: #8b4513; font-weight: 600;">Termos de Uso</a></label>
                            </div>

                            <button type="submit" class="btn-auth" id="btnCadastro">
                                <i class="fas fa-user-plus"></i>
                                Criar minha conta
                            </button>
                        </form>
                    </div>
                </div>

                <div class="divider">
                    <span>ou continue com</span>
                </div>

                <div class="social-buttons">
                    <div class="btn-social google" id="googleButton">
                        <i class="fab fa-google"></i>
                        <span>Google</span>
                    </div>
                </div>

const GOOGLE_CLIENT_ID = '90349703902-sda2ga75pgctr9gh5qe2dg4fs9658c2v.apps.googleusercontent.com';

// Função chamada ao clicar no botão
function loginComGoogle() {
    const redirectUri = window.location.origin + window.location.pathname; // ex: http://localhost:8501/
    const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' +
        'client_id=' + encodeURIComponent(GOOGLE_CLIENT_ID) + '&' +
        'redirect_uri=' + encodeURIComponent(redirectUri) + '&' +
        'response_type=id_token&' +
        'scope=openid%20email%20profile&' +
        'nonce=' + Math.random().toString(36).substring(2);
    window.location.href = authUrl; // Redireciona para o Google
}

// Processa o retorno quando o usuário é redirecionado de volta
function handleGoogleRedirect() {
    const hash = window.location.hash.substring(1); // Remove o # inicial
    if (hash && hash.includes('id_token')) {
        const params = new URLSearchParams(hash);
        const idToken = params.get('id_token');
        if (idToken) {
            // Decodifica o token JWT manualmente (sem bibliotecas extras)
            try {
                const base64Url = idToken.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                const userData = JSON.parse(jsonPayload);
                
                // Verifica ou cria o usuário na SheetDB
                verificarOuCriarUsuarioGoogle(userData);
                
                // Limpa a hash da URL para não ficar feio
                window.history.replaceState({}, document.title, window.location.pathname);
            } catch (e) {
                console.error('Erro ao decodificar token', e);
                mostrarAlerta('error', 'Erro ao processar login com Google');
            }
        }
    }
}

            const meses = {
                '01': 'Janeiro', '02': 'Fevereiro', '03': 'Março', '04': 'Abril',
                '05': 'Maio', '06': 'Junho', '07': 'Julho', '08': 'Agosto',
                '09': 'Setembro', '10': 'Outubro', '11': 'Novembro', '12': 'Dezembro'
            };
            
            const eventosPorMes = {};
            eventos.forEach(evento => {
                const mes = evento.data.split('/')[1];
                if (!eventosPorMes[mes]) eventosPorMes[mes] = [];
                eventosPorMes[mes].push(evento);
            });
            
            Object.keys(eventosPorMes).sort().forEach(mesNum => {
                const nomeMes = meses[mesNum];
                html += `<h2 style="margin: 30px 0 15px; color: #8b4513;">${nomeMes} 2026</h2>`;
                
                eventosPorMes[mesNum].forEach(evento => {
                    const inscrito = inscricoesUsuario.includes(evento.id);
                    
                    html += `
                        <div class="card-moderno" style="margin-bottom: 15px;">
                            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                                <div style="flex: 1;">
                                    <span class="badge badge-info">${evento.tipo.toUpperCase()}</span>
                                    <h3 style="margin: 10px 0; color: #3a2a1a;">${evento.titulo}</h3>
                                    <p style="color: #5d3a1a; margin-bottom: 15px;">${evento.descricao}</p>
                                    <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 10px;">
                                        <span style="color: #5d3a1a;"><i class="fas fa-calendar" style="color: #8b4513;"></i> ${evento.data}</span>
                                        <span style="color: #5d3a1a;"><i class="fas fa-clock" style="color: #8b4513;"></i> ${evento.hora}</span>
                                        <span style="color: #5d3a1a;"><i class="fas fa-map-marker-alt" style="color: #8b4513;"></i> ${evento.local}</span>
                                    </div>
                                    <span class="badge badge-success">+${evento.pontos} pontos</span>
                                    ${evento.vagas > 0 ? `<span class="badge badge-info">${evento.inscritos}/${evento.vagas} inscritos</span>` : ''}
                                </div>
                            </div>
                            ${!inscrito && (evento.vagas === 0 || evento.inscritos < evento.vagas) ? `
                                <div style="margin-top: 15px;">
                                    <button class="btn-auth" onclick="abrirInscricao(${evento.id})">📝 Inscrever-se</button>
                                </div>
                            ` : inscrito ? `
                                <div style="margin-top: 15px;">
                                    <span class="badge badge-success">✅ Inscrito</span>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
            });
            
            container.innerHTML = html;
        }

        function renderPontos(container) {
            const categorias = {};
            pontosColeta.forEach(ponto => {
                if (!categorias[ponto.categoria]) categorias[ponto.categoria] = [];
                categorias[ponto.categoria].push(ponto);
            });
            
            const iconesCategoria = {
                'geral': '🗑️',
                'pilhas': '🔋',
                'eletronicos': '💻',
                'oleo': '🫒',
                'vidros': '🥃',
                'papel': '📄',
                'roupas': '👕'
            };
            
            let html = '<h1 class="titulo-secao" style="color: #3a2a1a;">Pontos de Coleta em Piracicaba</h1>';
            html += '<p style="color: #5d3a1a; margin-bottom: 30px; font-weight: 500;">Rede completa com 38 pontos de descarte para diversos materiais.</p>';
            
            // Estatísticas
            html += `
                <div class="card-grid" style="margin-bottom: 30px;">
                    <div class="stat-card" style="background: #F5F5F5; border: 1px solid #8b5a2b; border-radius: 16px; padding: 20px; text-align: center;">
                        <div class="stat-value" style="color: #3a2a1a; font-size: 36px; font-weight: 700;">${pontosColeta.length}</div>
                        <div class="stat-label" style="color: #5d3a1a; font-weight: 600;">Total de Pontos</div>
                    </div>
                    <div class="stat-card" style="background: #F5F5F5; border: 1px solid #8b5a2b; border-radius: 16px; padding: 20px; text-align: center;">
                        <div class="stat-value" style="color: #3a2a1a; font-size: 36px; font-weight: 700;">${Object.keys(categorias).length}</div>
                        <div class="stat-label" style="color: #5d3a1a; font-weight: 600;">Categorias</div>
                    </div>
                    <div class="stat-card" style="background: #F5F5F5; border: 1px solid #8b5a2b; border-radius: 16px; padding: 20px; text-align: center;">
                        <div class="stat-value" style="color: #3a2a1a; font-size: 36px; font-weight: 700;">⭐ 4.5</div>
                        <div class="stat-label" style="color: #5d3a1a; font-weight: 600;">Avaliação média</div>
                    </div>
                </div>
            `;
            
            // Mostrar por categoria
            Object.keys(categorias).sort().forEach(categoria => {
                const icone = iconesCategoria[categoria] || '📍';
                html += `<h2 style="margin: 30px 0 15px; color: #8b4513;">${icone} ${categoria.toUpperCase()} (${categorias[categoria].length})</h2>`;
                html += '<div class="card-grid">';
                
                categorias[categoria].forEach(ponto => {
                    const estrelas = '★'.repeat(Math.round(ponto.avaliacao)) + '☆'.repeat(5 - Math.round(ponto.avaliacao));
                    
                    html += `
                        <div class="card-moderno">
                            <h3 style="color: #3a2a1a;">${ponto.nome}</h3>
                            <p style="color: #8b4513; margin: 5px 0; font-weight: 500;"><i class="fas fa-tag"></i> ${ponto.tipo}</p>
                            <p style="color: #5d3a1a; margin: 5px 0;"><i class="fas fa-map-pin"></i> ${ponto.endereco}</p>
                            <p style="color: #5d3a1a; margin: 5px 0;"><i class="fas fa-clock"></i> ${ponto.horario}</p>
                            <p style="color: #5d3a1a; margin: 5px 0;"><i class="fas fa-phone"></i> ${ponto.telefone}</p>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                                <span style="color: gold;">${estrelas}</span>
                                <span class="badge badge-info">${ponto.avaliacao}/5</span>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
            });
            
            container.innerHTML = html;
        }

        function abrirInscricao(eventoId) {
            const evento = eventos.find(e => e.id === eventoId);
            if (!evento) return;

            const modal = document.getElementById('inscricaoModal');
            const content = document.getElementById('inscricaoContent');
            
            content.innerHTML = `
                <div class="card-moderno">
                    <h2 style="margin-bottom: 20px; color: #3a2a1a;">📝 Confirmar Inscrição</h2>
                    <h3 style="color: #3a2a1a;">${evento.titulo}</h3>
                    <p style="color: #5d3a1a; margin: 15px 0;">${evento.descricao}</p>
                    <p style="color: #5d3a1a;"><i class="fas fa-calendar" style="color: #8b4513;"></i> ${evento.data} às ${evento.hora}</p>
                    <p style="color: #5d3a1a;"><i class="fas fa-map-marker-alt" style="color: #8b4513;"></i> ${evento.local}</p>
                    <p style="color: #8b4513; font-weight: 600;"><i class="fas fa-star"></i> +${evento.pontos} pontos</p>
                    
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button class="btn-auth" onclick="confirmarInscricao(${eventoId})">✅ Confirmar</button>
                        <button class="btn-auth" style="background: #666;" onclick="fecharModal('inscricaoModal')">❌ Cancelar</button>
                    </div>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function confirmarInscricao(eventoId) {
            inscricoesUsuario.push(eventoId);
            alert('✅ Inscrição realizada com sucesso! Você receberá um e-mail de confirmação.');
            fecharModal('inscricaoModal');
            renderAppContent();
        }

        function abrirUpload(desafioId) {
            const desafio = desafios.find(d => d.id === desafioId);
            if (!desafio) return;

            const modal = document.getElementById('uploadModal');
            const content = document.getElementById('uploadContent');
            
            content.innerHTML = `
                <div class="card-moderno">
                    <h2 style="margin-bottom: 20px; color: #3a2a1a;">📸 Comprovar: ${desafio.titulo}</h2>
                    <p style="background: #F5F5F5; border: 1px solid #8b5a2b; padding: 15px; border-radius: 12px; margin: 15px 0; color: #5d3a1a;">
                        <i class="fas fa-info-circle" style="color: #8b4513;"></i> ${desafio.dica}
                    </p>
                    <div style="border: 2px dashed #8b4513; border-radius: 16px; padding: 30px; text-align: center; margin: 20px 0;">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 48px; color: #8b4513; margin-bottom: 10px;"></i>
                        <p style="color: #5d3a1a;">Clique para selecionar ou arraste uma imagem</p>
                        <input type="file" accept="image/*" id="uploadFile" style="margin-top: 10px; color: #5d3a1a;">
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-auth" onclick="confirmarUpload(${desafioId})">📤 Enviar comprovante</button>
                        <button class="btn-auth" style="background: #666;" onclick="fecharModal('uploadModal')">❌ Cancelar</button>
                    </div>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function confirmarUpload(desafioId) {
            const fileInput = document.getElementById('uploadFile');
            if (!fileInput || !fileInput.files[0]) {
                alert('Por favor, selecione uma imagem!');
                return;
            }

            const desafio = desafios.find(d => d.id === desafioId);
            
            // Simular validação
            const pontosAtuais = parseInt(usuarioLogado.pontos) || 0;
            usuarioLogado.pontos = (pontosAtuais + desafio.pontos).toString();
            
            const desafiosAtuais = parseInt(usuarioLogado.desafios) || 0;
            usuarioLogado.desafios = (desafiosAtuais + 1).toString();
            
            // Atualizar nível
            const pontos = parseInt(usuarioLogado.pontos);
            if (pontos >= 5000) usuarioLogado.nivel = "🏆 EcoHerói";
            else if (pontos >= 1000) usuarioLogado.nivel = "🌳 EcoMestre";
            else if (pontos >= 500) usuarioLogado.nivel = "🍃 EcoGuardião";
            else if (pontos >= 100) usuarioLogado.nivel = "🌿 EcoAmigo";
            
            atualizarUserInfo();
            
            alert(`✅ Comprovante validado! Você ganhou ${desafio.pontos} pontos.`);
            fecharModal('uploadModal');
            renderAppContent();
        }

        function fecharModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
    </script>
</body>
</html>
