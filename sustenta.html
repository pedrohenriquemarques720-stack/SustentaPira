<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SustentaPira · App Sustentável</title>
    
    <!-- Fontes e ícones -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Leaflet CSS e JS para o mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FFFFFF;
            color: #5d3a1a;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* ===== TELA DE LOGIN ===== */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #FFFFFF;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            overflow-y: auto;
        }

        .login-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 500px;
            margin: auto;
        }

        .auth-card {
            background: #F5F5F5;
            border-radius: 32px;
            padding: 40px 30px;
            border: 1px solid #8b5a2b;
            box-shadow: 0 10px 30px rgba(93, 58, 26, 0.1);
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shine {
            0% { background-position: -100px; }
            40%, 100% { background-position: 200px; }
        }

        @keyframes glow {
            0% { box-shadow: 0 0 5px rgba(139, 69, 19, 0.3); }
            50% { box-shadow: 0 0 20px rgba(139, 69, 19, 0.6); }
            100% { box-shadow: 0 0 5px rgba(139, 69, 19, 0.3); }
        }

        @keyframes logoGlow {
            0% { filter: drop-shadow(0 0 5px rgba(139, 69, 19, 0.3)); }
            50% { filter: drop-shadow(0 0 20px rgba(139, 69, 19, 0.6)); }
            100% { filter: drop-shadow(0 0 5px rgba(139, 69, 19, 0.3)); }
        }

                /* ===== ANIMAÇÃO DE BALDE DE ÁGUA ===== */
        @keyframes splashWaterAnimation {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0px);
            }
            20% {
                opacity: 0.8;
                transform: translateY(-15px) scale(1.05) rotate(2deg);
                filter: blur(1px);
            }
            45% {
                opacity: 0.5;
                transform: translateY(25px) scale(0.98);
                filter: blur(3px);
            }
            70% {
                opacity: 0.2;
                transform: translateY(55px) scale(0.94);
                filter: blur(5px);
            }
            100% {
                opacity: 0;
                transform: translateY(90px) scale(0.9);
                filter: blur(7px);
                visibility: hidden;
            }
        }

        @keyframes waterDropFall {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(calc(var(--dx, 0) * 1.2), calc(var(--dy, 0) * 1.2 + 80px)) scale(0.4);
            }
        }

        .app-tab-content {
            display: none;
            position: relative;
        }

        .app-tab-content.active {
            display: block;
        }

        .tab-water-splash {
            animation: splashWaterAnimation 0.65s cubic-bezier(0.4, 1.2, 0.6, 1) forwards !important;
            pointer-events: none;
            position: relative;
            z-index: 10;
        }

        .water-drop {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            width: 7px;
            height: 11px;
            background: radial-gradient(circle, #6ec8ff 0%, #2a8eff 80%);
            border-radius: 50% 50% 45% 55%;
            filter: blur(1px);
            box-shadow: 0 0 6px #3a9eff;
            animation: waterDropFall 0.85s ease-out forwards;
        }

        .water-ripple-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(100, 200, 255, 0.45) 0%, rgba(70, 130, 200, 0.25) 40%, transparent 85%);
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        /* ===== ANIMAÇÃO DE BALDE DE ÁGUA / LIMPEZA NAS ABAS ===== */
        @keyframes splashWater {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0px);
            }
            10% {
                opacity: 0.95;
                transform: translateY(-8px) scale(1.02) rotate(1deg);
                filter: blur(1px);
            }
            25% {
                opacity: 0.9;
                transform: translateY(5px) scale(1.01) rotate(-0.5deg);
                filter: blur(1.5px);
            }
            50% {
                opacity: 0.7;
                transform: translateY(25px) scale(0.98);
                filter: blur(3px);
            }
            75% {
                opacity: 0.4;
                transform: translateY(45px) scale(0.95);
                filter: blur(4px);
            }
            100% {
                opacity: 0;
                transform: translateY(70px) scale(0.92);
                filter: blur(6px);
                visibility: hidden;
            }
        }

        @keyframes waterDropSplash {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
                filter: blur(0px);
            }
            20% {
                opacity: 0.9;
                transform: translate(calc(var(--x, 0) * 0.3), calc(var(--y, 0) * 0.2 - 15px)) scale(1.1) rotate(15deg);
                filter: blur(1px);
            }
            50% {
                opacity: 0.6;
                transform: translate(calc(var(--x, 0) * 0.8), calc(var(--y, 0) * 0.5 + 20px)) scale(0.9) rotate(-5deg);
                filter: blur(2px);
            }
            100% {
                opacity: 0;
                transform: translate(calc(var(--x, 0) * 1.2), calc(var(--y, 0) * 0.8 + 60px)) scale(0.7) rotate(10deg);
                filter: blur(3px);
            }
        }

        @keyframes waterRipple {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
                filter: blur(0px);
            }
            50% {
                transform: scale(1.5);
                opacity: 0.4;
                filter: blur(2px);
            }
            100% {
                transform: scale(2.2);
                opacity: 0;
                filter: blur(4px);
            }
        }

        .app-tab-content {
            display: none;
            position: relative;
            transition: all 0.2s ease;
        }

        .app-tab-content.active {
            display: block;
        }

        .tab-water-cleaning {
            animation: splashWater 0.7s cubic-bezier(0.34, 1.2, 0.64, 1) forwards !important;
            transform-origin: center center;
            overflow: hidden;
            position: relative;
            pointer-events: none;
        }

        .water-drop-effect {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 8px;
            height: 12px;
            background: radial-gradient(circle, rgba(135, 206, 250, 0.95) 0%, rgba(70, 130, 200, 0.8) 40%, rgba(30, 144, 255, 0.6) 100%);
            border-radius: 50% 50% 45% 55%;
            filter: blur(1px);
            box-shadow: 0 0 8px rgba(0, 160, 255, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.5);
            animation: waterDropSplash 0.9s ease-out forwards;
        }

        .splash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), 
                        rgba(100, 200, 255, 0.5) 0%, 
                        rgba(70, 130, 200, 0.3) 30%, 
                        rgba(30, 144, 255, 0.15) 60%,
                        transparent 85%);
            z-index: 9998;
            opacity: 0;
            transition: opacity 0.15s ease-out;
            backdrop-filter: blur(2px);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 64px;
            margin-bottom: 10px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        .logo-area h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .logo-area p {
            color: #8b4513;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ===== ESTILOS DAS ABAS ===== */
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #2a2a2a;
            padding: 6px;
            border-radius: 60px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 1px solid #3a3a3a;
        }
        
        .auth-tab {
            flex: 1;
            padding: 16px 20px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }
        
        .auth-tab i {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
        }
        
        .auth-tab.active {
            background: #8b4513;
            color: #FFFFFF;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.4);
            transform: scale(1.02);
        }
        
        .auth-tab.active i {
            color: #FFFFFF;
        }
        
        .auth-tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            color: #FFFFFF;
        }
        
        .auth-tab:hover:not(.active) i {
            color: #FFFFFF;
        }

        .auth-pane {
            display: none;
            animation: slideIn 0.4s ease;
        }

        .auth-pane.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #5d3a1a;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #8b4513;
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 48px;
            background: #FFFFFF;
            border: 2px solid #8b5a2b;
            border-radius: 16px;
            color: #5d3a1a;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #8b4513;
            box-shadow: 0 0 0 4px rgba(139, 69, 19, 0.1);
            background: #FFFFFF;
        }

        .btn-auth {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.5);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #8b4513;
        }

        .checkbox-group label {
            color: #5d3a1a;
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
        }

        .auth-links a {
            color: #8b4513;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .footer-links {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .footer-links a {
            color: #8b4513;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
        }
        
        .footer-links a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0 20px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8b4513, transparent);
        }

        .divider span {
            padding: 0 15px;
            color: #8b4513;
            font-size: 14px;
        }

        .benefits {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0 0;
            padding: 20px;
            background: #F5F5F5;
            border-radius: 24px;
            border: 1px solid #8b5a2b;
        }

        .benefit-item {
            text-align: center;
        }

        .benefit-item i {
            font-size: 24px;
            color: #8b4513;
            margin-bottom: 8px;
        }

        .benefit-item span {
            display: block;
            font-size: 12px;
            color: #5d3a1a;
            font-weight: 600;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 16px;
            margin: 20px 0;
            border-left: 4px solid;
            background: #F5F5F5;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #5d3a1a;
        }

        .alert-success {
            border-left-color: #8b4513;
        }

        .alert-error {
            border-left-color: #f44336;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(139, 69, 19, 0.3);
            border-top-color: #8b4513;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== TELA PRINCIPAL DO APP ===== */
        .app-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .app-screen.hidden {
            display: none;
            opacity: 0;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            margin: 0 auto;
        }

        /* ===== HEADER SUPERIOR MELHORADO COM LOGO ===== */
        .top-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding: 15px 20px;
            background: linear-gradient(145deg, #F5F5F5, #f0e9e0);
            border-radius: 50px;
            border: 1px solid #8b5a2b;
            box-shadow: 0 5px 20px rgba(93, 58, 26, 0.1);
            position: relative;
            overflow: hidden;
        }

        .top-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(139,69,19,0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: glow 4s infinite;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 2;
            cursor: pointer;
        }

        .logo-container:hover .logo-image {
            transform: scale(1.05) rotate(5deg);
        }

        .logo-image {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
            animation: logoGlow 3s infinite;
            transition: all 0.3s ease;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-text h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .logo-text p {
            font-size: 12px;
            color: #5d3a1a;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 2;
        }

        .header-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(139, 69, 19, 0.1);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid #8b5a2b;
            transition: all 0.3s ease;
        }

        .header-stat:hover {
            background: rgba(139, 69, 19, 0.15);
            transform: translateY(-2px);
        }

        .header-stat i {
            color: #8b4513;
            font-size: 18px;
        }

        .header-stat span {
            font-weight: 600;
            color: #3a2a1a;
        }

        .header-stat .stat-highlight {
            color: #8b4513;
            font-weight: 700;
            margin-left: 5px;
        }

        .header-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            cursor: pointer;
            border: 2px solid #8b4513;
            transition: all 0.3s ease;
            position: relative;
        }

        .header-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 0 3px rgba(139, 69, 19, 0.3);
        }

        .header-avatar .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #4caf50;
            border-radius: 50%;
            border: 2px solid white;
        }

        .logout-btn-header {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid #f44336;
            color: #f44336;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .logout-btn-header:hover {
            background: #f44336;
            color: white;
        }

        /* Tabs do app */
        .app-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            background: #3a2a1a;
            padding: 10px;
            border-radius: 60px;
        }

        .app-tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: #FFFFFF;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .app-tab.active {
            background: #8b4513;
            color: #FFFFFF;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
        }

        .app-tab-content {
            display: none;
        }

        .app-tab-content.active {
            display: block;
        }

        /* Cards */
        .card-moderno {
            background: #F5F5F5;
            border-radius: 24px;
            padding: 25px;
            border: 1px solid #8b5a2b;
            box-shadow: 0 5px 20px rgba(93, 58, 26, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            color: #5d3a1a;
            margin-bottom: 20px;
        }

        .card-moderno:hover {
            transform: translateY(-5px);
            border-color: #8b4513;
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.15);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            margin: 5px;
        }

        .badge-success {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            color: white;
        }

        .badge-info {
            background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
            color: white;
        }

        .badge-warning {
            background: linear-gradient(135deg, #ff8f00 0%, #ff6f00 100%);
            color: white;
        }

        .badge-premium {
            background: linear-gradient(135deg, #7b1fa2 0%, #4a148c 100%);
            color: white;
        }

        .badge-gold {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #5d3a1a;
            font-weight: 700;
        }

        .badge-silver {
            background: linear-gradient(135deg, #C0C0C0 0%, #A9A9A9 100%);
            color: #5d3a1a;
            font-weight: 700;
        }

        .badge-bronze {

        // ========== FUNÇÃO DO EFEITO DE ÁGUA ==========
        function triggerWaterEffect(targetElement, callback) {
            if (!targetElement) return;
            
            targetElement.classList.add('tab-water-splash');
            const rect = targetElement.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            // Criar gotículas de água
            for (let i = 0; i < 45; i++) {
                setTimeout(() => {
                    const drop = document.createElement('div');
                    drop.className = 'water-drop';
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 100;
                    const x = centerX + Math.cos(angle) * distance - 20;
                    const y = centerY + Math.sin(angle) * distance - 30;
                    drop.style.left = x + 'px';
                    drop.style.top = y + 'px';
                    drop.style.setProperty('--dx', (Math.random() - 0.5) * 70 + 'px');
                    drop.style.setProperty('--dy', (Math.random() - 0.5) * 50 + 'px');
                    document.body.appendChild(drop);
                    setTimeout(() => drop.remove(), 850);
                }, i * 12);
            }
            
            // Efeito de brilho/onda
            const bg = document.getElementById('waterRippleBg');
            if (bg) {
                bg.style.setProperty('--x', centerX + 'px');
                bg.style.setProperty('--y', centerY + 'px');
                bg.style.opacity = '0.7';
                setTimeout(() => bg.style.opacity = '0', 450);
            }
            
            setTimeout(() => {
                targetElement.classList.remove('tab-water-splash');
                if (callback) callback();
            }, 650);
        }

            document.querySelectorAll('.app-tab').forEach(btn => {
                btn.classList.remove('active');
                if ((tab === 'inicio' && btn.textContent.includes('Início')) ||
                    (tab === 'desafios' && btn.textContent.includes('Desafios')) ||
                    (tab === 'perfil' && btn.textContent.includes('Perfil')) ||
                    (tab === 'ranking' && btn.textContent.includes('Ranking')) ||
                    (tab === 'eventos' && btn.textContent.includes('Eventos')) ||
                    (tab === 'pontos' && btn.textContent.includes('Pontos'))) {
                    btn.classList.add('active');
                }
            });
            
            if (currentContent) {
                triggerWaterEffect(currentContent, () => {
                    tabAppAtiva = tab;
                    renderAppContent();
                });
            } else {

            const senha = document.getElementById('cadastroSenha').value;
            const confirmar = document.getElementById('cadastroConfirmar').value;
            const telefone = document.getElementById('cadastroTelefone').value;

            if (senha !== confirmar) {
                mostrarAlerta('error', 'As senhas não coincidem!');
                return;
            }

            const btn = document.getElementById('btnCadastro');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner"></span> Criando conta...';

            try {
                // Verificar se email já existe
                const response = await fetch(`${SHEETDB_URL}/search?email=${email}`);
                const usuariosExistentes = await response.json();
                
                if (usuariosExistentes.length > 0) {

                    btn.disabled = false;
                    return;

                    email: email,
                    senha: senha,

                    cidade: "Piracicaba",

                    streak: "1",
                    desafios: "0",
                    conquistas: "🌱 Primeiro passo"
                };

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [novoUsuario] })
                });

                const resultado = await saveResponse.json();
                
                if (resultado.created) {

        function triggerWaterCleaningEffect(targetElement, callback) {
            if (!targetElement) return;
            targetElement.classList.add('tab-water-cleaning');
            const rect = targetElement.getBoundingClientRect();
            
            for (let i = 0; i < 32; i++) {
                setTimeout(() => {
                    const drop = document.createElement('div');
                    drop.className = 'water-drop-effect';
                    const x = rect.left + Math.random() * rect.width;
                    const y = rect.top + Math.random() * rect.height;
                    drop.style.left = x + 'px';
                    drop.style.top = y + 'px';
                    drop.style.setProperty('--x', (Math.random() - 0.5) * 40 + 'px');
                    drop.style.setProperty('--y', (Math.random() - 0.5) * 40 + 'px');
                    document.body.appendChild(drop);
                    setTimeout(() => drop.remove(), 900);
                }, i * 20);
            }
            
            const overlay = document.getElementById('splashOverlay');
            if (overlay) {
                overlay.style.setProperty('--x', (rect.left + rect.width/2) + 'px');
                overlay.style.setProperty('--y', (rect.top + rect.height/2) + 'px');
                overlay.style.opacity = '0.8';
                setTimeout(() => overlay.style.opacity = '0', 500);
            }
            
            setTimeout(() => {
                targetElement.classList.remove('tab-water-cleaning');
                if (callback) callback();
            }, 700);
        }

                // ========== FUNÇÃO COM EFEITO DE ÁGUA ==========
        function triggerWaterEffect(targetElement, callback) {
            if (!targetElement) return;
            
            targetElement.classList.add('tab-water-splash');
            const rect = targetElement.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            // Criar gotículas de água
            for (let i = 0; i < 45; i++) {
                setTimeout(() => {
                    const drop = document.createElement('div');
                    drop.className = 'water-drop';
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 100;
                    const x = centerX + Math.cos(angle) * distance - 20;
                    const y = centerY + Math.sin(angle) * distance - 30;
                    drop.style.left = x + 'px';
                    drop.style.top = y + 'px';
                    drop.style.setProperty('--dx', (Math.random() - 0.5) * 70 + 'px');
                    drop.style.setProperty('--dy', (Math.random() - 0.5) * 50 + 'px');
                    document.body.appendChild(drop);
                    setTimeout(() => drop.remove(), 850);
                }, i * 12);
            }
            
            // Efeito de brilho/onda
            const bg = document.getElementById('waterRippleBg');
            if (bg) {
                bg.style.setProperty('--x', centerX + 'px');
                bg.style.setProperty('--y', centerY + 'px');
                bg.style.opacity = '0.7';
                setTimeout(() => bg.style.opacity = '0', 450);
            }
            
            setTimeout(() => {
                targetElement.classList.remove('tab-water-splash');
                if (callback) callback();
            }, 650);
        }

            function mudarTabApp(tab) {
                if (tabAppAtiva === tab) return;
                
                const currentContent = document.querySelector('.app-tab-content.active');
                
                document.querySelectorAll('.app-tab').forEach(btn => {
                    btn.classList.remove('active');
                    if ((tab === 'inicio' && btn.textContent.includes('Início')) ||
                        (tab === 'desafios' && btn.textContent.includes('Desafios')) ||
                        (tab === 'perfil' && btn.textContent.includes('Perfil')) ||
                        (tab === 'ranking' && btn.textContent.includes('Ranking')) ||
                        (tab === 'eventos' && btn.textContent.includes('Eventos')) ||
                        (tab === 'pontos' && btn.textContent.includes('Pontos'))) {
                        btn.classList.add('active');
                    }
                });
               
            if (currentContent) {
                triggerWaterCleaningEffect(currentContent, () => {
                    tabAppAtiva = tab;
                    renderAppContent();
                });
            } else {
                tabAppAtiva = tab;
                renderAppContent();
            }
        }

                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                                <span style="color: gold;">${estrelas}</span>
                                <span class="badge badge-info">${ponto.avaliacao}/5</span>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
            });
            
            container.innerHTML = `<div class="app-tab-content active">${html}</div>`;
            
            // Inicializar o mapa após adicionar o conteúdo ao DOM
            setTimeout(() => {
                inicializarMapa();
            }, 100);
        }
        
        function inicializarMapa() {
            if (mapaPontos) {
                mapaPontos.remove();
                mapaPontos = null;
            }
            
            const mapaDiv = document.getElementById('mapaPontos');
            if (!mapaDiv) return;
            
            // Centro de Piracicaba
            const centroPiracicaba = [-22.7253, -47.6492];
            
            // Inicializar o mapa
            mapaPontos = L.map('mapaPontos').setView(centroPiracicaba, 14);
            
            // Adicionar camada de tiles (OpenStreetMap)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; CartoDB',
                subdomains: 'abcd',
                maxZoom: 19,
                minZoom: 12
            }).addTo(mapaPontos);
            
            // Cores para cada categoria
            const coresCategoria = {
                'geral': '#8b4513',
                'pilhas': '#ff9800',
                'eletronicos': '#2196f3',
                'oleo': '#4caf50',
                'vidros': '#9c27b0',
                'papel': '#00bcd4',
                'roupas': '#e91e63'
            };
            
            // Adicionar marcadores para cada ponto
            pontosColeta.forEach(ponto => {
                if (ponto.lat && ponto.lng) {
                    const cor = coresCategoria[ponto.categoria] || '#8b4513';
                    
                    const markerIcon = L.divIcon({
                        className: 'custom-marker',
                        html: `<div style="background-color: ${cor}; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);">${ponto.icone}</div>`,
                        iconSize: [30, 30],
                        popupAnchor: [0, -15]
                    });
                    
                    const estrelas = '★'.repeat(Math.round(ponto.avaliacao)) + '☆'.repeat(5 - Math.round(ponto.avaliacao));
                    const popupContent = `
                        <div style="font-family: 'Inter', sans-serif; min-width: 200px;">
                            <h3 style="margin: 0 0 8px 0; color: #3a2a1a;">${ponto.nome}</h3>
                            <p style="margin: 5px 0; color: #8b4513;"><strong>${ponto.tipo}</strong></p>
                            <p style="margin: 5px 0;"><i class="fas fa-map-pin"></i> ${ponto.endereco}</p>
                            <p style="margin: 5px 0;"><i class="fas fa-clock"></i> ${ponto.horario}</p>
                            <p style="margin: 5px 0;"><i class="fas fa-phone"></i> ${ponto.telefone}</p>
                            <div style="margin-top: 8px;">
                                <span style="color: gold;">${estrelas}</span>
                                <span style="margin-left: 8px;">${ponto.avaliacao}/5</span>
                            </div>
                        </div>
                    `;
                    
                    L.marker([ponto.lat, ponto.lng], { icon: markerIcon })
                        .addTo(mapaPontos)
                        .bindPopup(popupContent);
                }
            });
            
            // Adicionar uma legenda
            const legend = L.control({ position: 'bottomright' });
            legend.onAdd = function(map) {
                const div = L.DomUtil.create('div', 'info legend');
                div.style.backgroundColor = 'white';
                div.style.padding = '10px';
                div.style.borderRadius = '8px';
                div.style.border = '1px solid #8b5a2b';
                div.style.fontSize = '12px';
                div.style.fontFamily = "'Inter', sans-serif";
                div.innerHTML = '<strong>Categorias</strong><br>';
                
                const categoriasLegenda = {
                    '🗑️ Geral': '#8b4513',
                    '🔋 Pilhas': '#ff9800',
                    '💻 Eletrônicos': '#2196f3',
                    '🫒 Óleo': '#4caf50',
                    '🥃 Vidros': '#9c27b0',
                    '📄 Papel': '#00bcd4',
                    '👕 Roupas': '#e91e63'
                };
                
                for (const [nome, cor] of Object.entries(categoriasLegenda)) {
                    div.innerHTML += `
                        <div style="display: flex; align-items: center; margin-top: 5px;">
                            <div style="width: 20px; height: 20px; background-color: ${cor}; border-radius: 50%; margin-right: 8px;"></div>
                            <span>${nome}</span>
                        </div>
                    `;
                }
                
                return div;
            };
            legend.addTo(mapaPontos);
        }

        function abrirInscricao(eventoId) {
            const evento = eventos.find(e => e.id === eventoId);
            if (!evento) return;

            const modal = document.getElementById('inscricaoModal');
            const content = document.getElementById('inscricaoContent');
            
            content.innerHTML = `
                <div class="card-moderno">
                    <h2 style="margin-bottom: 20px; color: #3a2a1a;">📝 Confirmar Inscrição</h2>
                    <h3 style="color: #3a2a1a;">${evento.titulo}</h3>
                    <p style="color: #5d3a1a; margin: 15px 0;">${evento.descricao}</p>
                    <p style="color: #5d3a1a;"><i class="fas fa-calendar" style="color: #8b4513;"></i> ${evento.data} às ${evento.hora}</p>
                    <p style="color: #5d3a1a;"><i class="fas fa-map-marker-alt" style="color: #8b4513;"></i> ${evento.local}</p>
                    <p style="color: #8b4513; font-weight: 600;"><i class="fas fa-star"></i> +${evento.pontos} pontos</p>
                    
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button class="btn-auth" onclick="confirmarInscricao(${eventoId})">✅ Confirmar</button>
                        <button class="btn-auth" style="background: #666;" onclick="fecharModal('inscricaoModal')">❌ Cancelar</button>
                    </div>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function confirmarInscricao(eventoId) {
            inscricoesUsuario.push(eventoId);
            alert('✅ Inscrição realizada com sucesso! Você receberá um e-mail de confirmação.');
            fecharModal('inscricaoModal');
            renderAppContent();
        }

        function abrirUpload(desafioId) {
            const desafio = desafios.find(d => d.id === desafioId);
            if (!desafio) return;

            const modal = document.getElementById('uploadModal');
            const content = document.getElementById('uploadContent');
            
            content.innerHTML = `
                <div class="card-moderno">
                    <h2 style="margin-bottom: 20px; color: #3a2a1a;">📸 Comprovar: ${desafio.titulo}</h2>
                    <p style="background: #F5F5F5; border: 1px solid #8b5a2b; padding: 15px; border-radius: 12px; margin: 15px 0; color: #5d3a1a;">
                        <i class="fas fa-info-circle" style="color: #8b4513;"></i> ${desafio.dica}
                    </p>
                    <div style="border: 2px dashed #8b4513; border-radius: 16px; padding: 30px; text-align: center; margin: 20px 0;">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 48px; color: #8b4513; margin-bottom: 10px;"></i>
                        <p style="color: #5d3a1a;">Clique para selecionar ou arraste uma imagem</p>
                        <input type="file" accept="image/*" id="uploadFile" style="margin-top: 10px; color: #5d3a1a;">
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-auth" onclick="confirmarUpload(${desafioId})">📤 Enviar comprovante</button>
                        <button class="btn-auth" style="background: #666;" onclick="fecharModal('uploadModal')">❌ Cancelar</button>
                    </div>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function confirmarUpload(desafioId) {
            const fileInput = document.getElementById('uploadFile');
            if (!fileInput || !fileInput.files[0]) {
                alert('Por favor, selecione uma imagem!');
                return;
            }

            const desafio = desafios.find(d => d.id === desafioId);
            
            const pontosAtuais = parseInt(usuarioLogado.pontos) || 0;
            usuarioLogado.pontos = (pontosAtuais + desafio.pontos).toString();
            
            const desafiosAtuais = parseInt(usuarioLogado.desafios) || 0;
            usuarioLogado.desafios = (desafiosAtuais + 1).toString();
            
            const pontos = parseInt(usuarioLogado.pontos);
            if (pontos >= 5000) usuarioLogado.nivel = "🏆 EcoHerói";
            else if (pontos >= 1000) usuarioLogado.nivel = "🌳 EcoMestre";
            else if (pontos >= 500) usuarioLogado.nivel = "🍃 EcoGuardião";
            else if (pontos >= 100) usuarioLogado.nivel = "🌿 EcoAmigo";
            
            atualizarUserInfo();
            atualizarHeaderInfo();
            
            alert(`✅ Comprovante validado! Você ganhou ${desafio.pontos} pontos.`);
            fecharModal('uploadModal');
            renderAppContent();
        }

        function fecharModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function fecharModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
    </script>
</body>
</html>
