        function renderEstatisticas() {

                    <div class="stat-label">Total de Pontos</div>
                </div>

                'Eletrônicos': '💻',
                'Óleo': '🫒',
                'Vidros': '🥃',
                'Papel': '📄',
                'Roupas': '👕'

            const iconesCategoria = {
                'Ecoponto': '🗑️',
                'Pilhas': '🔋',
                'Eletrônicos': '💻',
                'Óleo': '🫒',
                'Vidros': '🥃',
                'Papel': '📄',
                'Roupas': '👕'
            };
            
            let html = '';
            Object.keys(categorias).sort().forEach(categoria => {
                const icone = iconesCategoria[categoria] || '📍';
                html += `
                    <div class="categoria-card">
                        <div class="categoria-titulo">
                            ${icone} ${categoria.toUpperCase()}
                            <span class="badge-tipo">${categorias[categoria].length} pontos</span>
                        </div>
                        <div class="pontos-grid">
                `;
                
                categorias[categoria].forEach(ponto => {
                    const estrelas = '★'.repeat(Math.round(ponto.avaliacao)) + '☆'.repeat(5 - Math.round(ponto.avaliacao));
                    html += `
                        <div class="ponto-card">
                            <div class="ponto-nome">${ponto.nome}</div>
                            <div class="ponto-info"><i class="fas fa-map-pin"></i> ${ponto.endereco}</div>
                            <div class="ponto-info"><i class="fas fa-clock"></i> ${ponto.horario}</div>
                            <div class="ponto-info"><i class="fas fa-phone"></i> ${ponto.telefone}</div>
                            <div class="avaliacao">
                                <span class="stars">${estrelas}</span>
                                <span style="font-size: 12px; color: #666;">(${ponto.avaliacao})</span>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div></div>`;
            });
            
            document.getElementById('categoriasSection').innerHTML = html;
        }

        function initMapa() {
            if (mapaInstance) mapaInstance.remove();
            
            mapaInstance = L.map('map').setView([-22.728, -47.649], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB',
                subdomains: 'abcd',
                maxZoom: 19,
                minZoom: 11
            }).addTo(mapaInstance);
            
            function adicionarMarcadores(filtro = 'todos') {
                if (markers.length) markers.forEach(m => mapaInstance.removeLayer(m));
                markers = [];
                
                const filtrados = filtro === 'todos' ? pontosColeta : pontosColeta.filter(p => p.tipo === filtro);
                const iconesMap = { 'Ecoponto':'🗑️', 'Pilhas':'🔋', 'Eletrônicos':'💻', 'Óleo':'🫒', 'Vidros':'🥃', 'Papel':'📄', 'Roupas':'👕' };
                
                filtrados.forEach(ponto => {
                    const iconHtml = `<div style="background-color:#2c5e2e; width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; border:2px solid white; box-shadow:0 2px 8px rgba(0,0,0,0.3);">${iconesMap[ponto.tipo] || '📍'}</div>`;
                    const icon = L.divIcon({ html: iconHtml, iconSize: [38,38], popupAnchor: [0, -19] });
                    
                    const estrelas = '★'.repeat(Math.round(ponto.avaliacao)) + '☆'.repeat(5 - Math.round(ponto.avaliacao));
                    const popupContent = `
                        <div style="min-width:260px; font-family:'Inter',sans-serif;">
                            <h3 style="color:#2c5e2e; margin-bottom:12px;">${ponto.nome}</h3>
                            <p><i class="fas fa-tag"></i> <strong>${ponto.tipo}</strong></p>
                            <p><i class="fas fa-map-pin"></i> ${ponto.endereco}</p>
                            <p><i class="fas fa-clock"></i> ${ponto.horario}</p>
                            <p><i class="fas fa-phone"></i> ${ponto.telefone}</p>
                            <p><i class="fas fa-star" style="color:#ffb800;"></i> ${estrelas} (${ponto.avaliacao}/5)</p>
                            <div style="margin-top:12px; padding-top:8px; border-top:1px solid #eee; font-size:11px; color:#666;">
                                <i class="fas fa-leaf"></i> Ponto oficial - Piracicaba Sustentável
                            </div>
                        </div>
                    `;
                    
                    const marker = L.marker([ponto.lat, ponto.lng], { icon }).bindPopup(popupContent, { maxWidth: 320 }).addTo(mapaInstance);
                    markers.push(marker);
                });
                
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                const activeBtn = document.querySelector(`.filter-btn[data-filter="${filtro}"]`);
                if (activeBtn) activeBtn.classList.add('active');
                else document.querySelector('.filter-btn[data-filter="todos"]')?.classList.add('active');
            }
            
            adicionarMarcadores('todos');
            
            // Eventos dos filtros
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const filtro = btn.getAttribute('data-filter');
                    adicionarMarcadores(filtro);
                });
            });
            
            document.getElementById('resetFiltro')?.addEventListener('click', () => adicionarMarcadores('todos'));
            document.getElementById('zoomPlus')?.addEventListener('click', () => mapaInstance.zoomIn());
            document.getElementById('zoomMinus')?.addEventListener('click', () => mapaInstance.zoomOut());
            
            // Ajustar bounds para mostrar todos os pontos
            setTimeout(() => {
                const bounds = L.latLngBounds(pontosColeta.map(p => [p.lat, p.lng]));
                mapaInstance.fitBounds(bounds, { padding: [50, 50] });
            }, 200);
        }

        // Inicializar tudo
        renderEstatisticas();
        renderFiltros();
        renderCategorias();
        initMapa();
    </script>
</body>
</html>
