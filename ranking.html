<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SustentaPira · Ranking dos Campeões</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #faf8f5; color: #2c3e2f; min-height: 100vh; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        
        .ranking-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .titulo-secao {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #2c5e2e, #8b4513);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            display: inline-block;
        }
        .titulo-secao::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #8b4513, #b85e3a);
            border-radius: 2px;
        }
        
        /* Cards de Estatísticas */
        .ranking-header-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .rank-stat-card {
            background: white;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(139,69,19,0.1);
        }
        .rank-stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .rank-stat-icon {
            font-size: 40px;
            color: #8b4513;
            margin-bottom: 10px;
        }
        .rank-stat-value {
            font-size: 36px;
            font-weight: 800;
            color: #2c3e2f;
        }
        .rank-stat-label {
            font-size: 14px;
            color: #6b5a4a;
            margin-top: 5px;
        }
        
        /* Pódio 3D */
        .podium-3d-container {
            background: linear-gradient(135deg, #f8f4ef, #f0e9e0);
            border-radius: 48px;
            padding: 40px 20px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }
        .podium-3d-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="rgba(139,69,19,0.03)" stroke-width="2"/></svg>') repeat;
            opacity: 0.5;
        }
        .podium-crown {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        .podium-title {
            text-align: center;
            margin-bottom: 30px;
        }
        .podium-title h2 {
            font-size: 24px;
            color: #8b4513;
        }
        .podium-title p {
            color: #6b5a4a;
            font-size: 14px;
        }
        .podium-grid {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 30px;
            flex-wrap: wrap;
        }
        .podium-item {
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        .podium-item:hover {
            transform: translateY(-10px);
        }
        .podium-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 3px solid white;
        }
        .podium-item.first .podium-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            font-size: 60px;
        }
        .podium-item.second .podium-avatar {
            background: linear-gradient(135deg, #C0C0C0, #A9A9A9);
        }
        .podium-item.third .podium-avatar {
            background: linear-gradient(135deg, #CD7F32, #B87333);
        }
        .podium-name {
            font-weight: 800;
            font-size: 18px;
        }
        .podium-points {
            font-size: 24px;
            font-weight: 800;
            color: #8b4513;
        }
        .podium-level {
            font-size: 12px;
            background: rgba(139,69,19,0.1);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
        }
        .podium-streak {
            font-size: 12px;
            color: #ff6b35;
            margin-top: 5px;
        }
        .podium-base {
            margin-top: 15px;
            height: 8px;
            background: linear-gradient(90deg, #8b4513, #b85e3a);
            border-radius: 4px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }
        .podium-item.first .podium-base {
            width: 100%;
            height: 12px;
        }
        
        /* Tabela de Ranking */
        .ranking-table-premium {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .ranking-header {
            display: grid;
            grid-template-columns: 80px 80px 1fr 120px 100px;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            color: white;
            padding: 18px 20px;
            font-weight: 700;
        }
        .ranking-row-premium {
            display: grid;
            grid-template-columns: 80px 80px 1fr 120px 100px;
            padding: 16px 20px;
            border-bottom: 1px solid #f0e8e0;
            transition: all 0.3s;
            align-items: center;
        }
        .ranking-row-premium:hover {
            background: #faf5f0;
            transform: translateX(5px);
        }
        .rank-position {
            font-weight: 800;
            font-size: 18px;
        }
        .rank-position.top-1 {
            color: #FFD700;
            text-shadow: 0 0 5px rgba(255,215,0,0.5);
        }
        .rank-position.top-2 {
            color: #C0C0C0;
        }
        .rank-position.top-3 {
            color: #CD7F32;
        }
        .rank-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #e0d5c8, #d0c5b8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .rank-name {
            font-weight: 700;
            font-size: 16px;
        }
        .rank-level {
            font-size: 12px;
            color: #8b4513;
            margin-top: 2px;
        }
        .rank-points {
            font-weight: 800;
            font-size: 18px;
            color: #8b4513;
        }
        .rank-streak {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ff6b35;
        }
        
        /* Card de Motivação */
        .motivation-card {
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            border-radius: 28px;
            padding: 30px;
            color: white;
            text-align: center;
        }
        .progress-to-top {
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            height: 8px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: #ffd966;
            height: 100%;
            border-radius: 20px;
            transition: width 0.5s;
        }
        
        @media (max-width: 768px) {
            .ranking-header-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .ranking-header, .ranking-row-premium {
                grid-template-columns: 50px 60px 1fr 80px 70px;
                font-size: 12px;
                gap: 5px;
            }
            .podium-avatar {
                width: 70px;
                height: 70px;
                font-size: 32px;
            }
            .podium-item.first .podium-avatar {
                width: 90px;
                height: 90px;
                font-size: 45px;
            }
            .rank-stat-value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="ranking-container">
        <h1 class="titulo-secao">🏆 Ranking dos Campeões</h1>
        
        <!-- Estatísticas do Ranking -->
        <div class="ranking-header-stats" id="rankingStats"></div>
        
        <!-- Pódio 3D -->
        <div class="podium-3d-container">
            <div class="podium-crown">👑</div>
            <div class="podium-title">
                <h2>Pódio dos Campeões</h2>
                <p>Os melhores da comunidade sustentável</p>
            </div>
            <div class="podium-grid" id="podiumContainer"></div>
        </div>
        
        <!-- Tabela de Ranking -->
        <div class="ranking-table-premium">
            <div class="ranking-header">
                <div>Posição</div>
                <div></div>
                <div>Participante</div>
                <div>Pontos</div>
                <div>Streak</div>
            </div>
            <div id="rankingList"></div>
        </div>
        
        <!-- Card de Motivação -->
        <div class="motivation-card" id="motivationCard"></div>
    </div>

    <script>
        // ========== DADOS DO RANKING ==========
        const ranking = [
            { nome: "Pedro Graciano", pontos: 5480, nivel: "👑 Lenda Ambiental", streak: 127, avatar: "👑", conquistas: 24 },
            { nome: "Ana Beatriz", pontos: 5120, nivel: "🏆 Mestre Eco", streak: 112, avatar: "🌟", conquistas: 22 },
            { nome: "Carlos Eduardo", pontos: 4890, nivel: "🏆 Mestre Eco", streak: 98, avatar: "⚡", conquistas: 20 },
            { nome: "Mariana Santos", pontos: 4350, nivel: "🌳 Guardião", streak: 85, avatar: "🌸", conquistas: 18 },
            { nome: "Lucas Oliveira", pontos: 3980, nivel: "🌳 Guardião", streak: 76, avatar: "🌿", conquistas: 16 },
            { nome: "Fernanda Lima", pontos: 3520, nivel: "🍃 EcoHerói", streak: 67, avatar: "🍃", conquistas: 14 },
            { nome: "Rafael Souza", pontos: 3180, nivel: "🍃 EcoHerói", streak: 58, avatar: "💚", conquistas: 12 },
            { nome: "Juliana Costa", pontos: 2840, nivel: "🌱 EcoAmigo", streak: 49, avatar: "🌱", conquistas: 10 },
            { nome: "Roberto Alves", pontos: 2560, nivel: "🌱 EcoAmigo", streak: 42, avatar: "🌻", conquistas: 9 },
            { nome: "Cristina Lima", pontos: 2230, nivel: "🌱 EcoAmigo", streak: 38, avatar: "🦋", conquistas: 8 },
            { nome: "André Souza", pontos: 1980, nivel: "🌿 EcoIniciante", streak: 31, avatar: "🐝", conquistas: 7 },
            { nome: "Patrícia Oliveira", pontos: 1750, nivel: "🌿 EcoIniciante", streak: 28, avatar: "🐞", conquistas: 6 },
            { nome: "Ricardo Mendes", pontos: 1520, nivel: "🌿 EcoIniciante", streak: 24, avatar: "🍄", conquistas: 5 },
            { nome: "Camila Ferreira", pontos: 1280, nivel: "🌱 EcoNovato", streak: 19, avatar: "🌼", conquistas: 4 },
            { nome: "Felipe Nascimento", pontos: 950, nivel: "🌱 EcoNovato", streak: 15, avatar: "🌙", conquistas: 3 }
        ];

        // Dados do usuário logado (exemplo)
        const usuarioLogado = {
            nome: "João Silva",
            pontos: 2350,
            nivel: "🌳 EcoMestre",
            streak: 45
        };

        // ========== FUNÇÕES ==========
        function mostrarMensagemMotivacional() {
            const mensagens = [
                "💪 Continue assim! Você está fazendo a diferença!",
                "🌱 Cada ponto conta para um futuro mais sustentável!",
                "🌟 Você é um exemplo para a comunidade!",
                "🚀 Continue subindo no ranking! O topo te espera!",
                "💚 Sua dedicação está transformando Piracicaba!",
                "🎯 Foque nos desafios e acumule mais pontos!",
                "🌿 A natureza agradece sua contribuição!",
                "⚡ Você está mais perto do que imagina!"
            ];
            const mensagemAleatoria = mensagens[Math.floor(Math.random() * mensagens.length)];
            alert(mensagemAleatoria);
        }

        function renderRanking() {
            // Estatísticas
            const totalParticipantes = ranking.length;
            const totalPontos = ranking.reduce((a, b) => a + b.pontos, 0);
            const mediaPontos = Math.round(totalPontos / totalParticipantes);
            const maiorStreak = Math.max(...ranking.map(r => r.streak));
            
            document.getElementById('rankingStats').innerHTML = `
                <div class="rank-stat-card">
                    <div class="rank-stat-icon"><i class="fas fa-users"></i></div>
                    <div class="rank-stat-value">${totalParticipantes}</div>
                    <div class="rank-stat-label">Participantes</div>
                </div>
                <div class="rank-stat-card">
                    <div class="rank-stat-icon"><i class="fas fa-chart-line"></i></div>
                    <div class="rank-stat-value">${mediaPontos}</div>
                    <div class="rank-stat-label">Média de Pontos</div>
                </div>
                <div class="rank-stat-card">
                    <div class="rank-stat-icon"><i class="fas fa-fire"></i></div>
                    <div class="rank-stat-value">${maiorStreak}</div>
                    <div class="rank-stat-label">Maior Streak</div>
                </div>
                <div class="rank-stat-card">
                    <div class="rank-stat-icon"><i class="fas fa-trophy"></i></div>
                    <div class="rank-stat-value">${totalPontos}</div>
                    <div class="rank-stat-label">Pontos Totais</div>
                </div>
            `;
            
            // Pódio (Top 3)
            const top3 = ranking.slice(0, 3);
            let podiumHtml = '';
            top3.forEach((user, idx) => {
                const classe = idx === 0 ? "first" : idx === 1 ? "second" : "third";
                podiumHtml += `
                    <div class="podium-item ${classe}" onclick="mostrarMensagemMotivacional()">
                        <div class="podium-avatar">${user.avatar}</div>
                        <div class="podium-name">${user.nome}</div>
                        <div class="podium-points">${user.pontos} pts</div>
                        <div class="podium-level">${user.nivel}</div>
                        <div class="podium-streak"><i class="fas fa-fire"></i> ${user.streak} dias</div>
                        <div class="podium-base"></div>
                    </div>
                `;
            });
            document.getElementById('podiumContainer').innerHTML = podiumHtml;
            
            // Tabela de Ranking
            let rankingHtml = '';
            ranking.forEach((user, idx) => {
                const posClass = idx === 0 ? "top-1" : idx === 1 ? "top-2" : idx === 2 ? "top-3" : "";
                rankingHtml += `
                    <div class="ranking-row-premium" onclick="mostrarMensagemMotivacional()">
                        <div class="rank-position ${posClass}">${idx + 1}º</div>
                        <div class="rank-avatar">${user.avatar}</div>
                        <div>
                            <div class="rank-name">${user.nome}</div>
                            <div class="rank-level">${user.nivel}</div>
                        </div>
                        <div class="rank-points">${user.pontos}</div>
                        <div class="rank-streak"><i class="fas fa-fire"></i> ${user.streak}</div>
                    </div>
                `;
            });
            document.getElementById('rankingList').innerHTML = rankingHtml;
            
            // Card de Motivação
            const userPontos = usuarioLogado.pontos;
            const pontosParaTop1 = ranking[0].pontos - userPontos;
            const progressoTop1 = Math.min(100, (userPontos / ranking[0].pontos) * 100);
            
            document.getElementById('motivationCard').innerHTML = `
                <h3><i class="fas fa-chart-line"></i> Sua Jornada até o Topo</h3>
                <p>${usuarioLogado.nome} está a ${pontosParaTop1 > 0 ? pontosParaTop1 : 0} pontos de alcançar o 1º lugar!</p>
                <div class="progress-to-top">
                    <div class="progress-fill" style="width: ${progressoTop1}%;"></div>
                </div>
                <p>Complete desafios e participe de eventos para acumular pontos e subir no ranking!</p>
                <div style="margin-top: 20px; display: flex; gap: 15px; justify-content: center;">
                    <div style="background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 30px;">
                        <i class="fas fa-trophy"></i> ${ranking[0].pontos - userPontos > 0 ? ranking[0].pontos - userPontos : 0} pts para o topo
                    </div>
                    <div style="background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 30px;">
                        <i class="fas fa-chart-simple"></i> ${usuarioLogado.pontos} pts atuais
                    </div>
                </div>
            `;
        }
        
        // Inicializar
        renderRanking();
        
        // Expor funções globalmente
        window.mostrarMensagemMotivacional = mostrarMensagemMotivacional;
    </script>
</body>
</html>
