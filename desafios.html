<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SustentaPira · Desafios Ambientais</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #faf8f5; color: #2c3e2f; min-height: 100vh; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .desafios-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .titulo-secao {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #2c5e2e, #8b4513);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            display: inline-block;
        }
        .titulo-secao::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #8b4513, #b85e3a);
            border-radius: 2px;
        }
        
        /* Cards */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }
        .card-moderno {
            background: white;
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            transition: all 0.3s;
            border: 1px solid rgba(139,69,19,0.15);
        }
        .card-moderno:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.12);
            border-color: #8b4513;
        }
        
        .desafio-icone {
            font-size: 56px;
            text-align: center;
            margin-bottom: 15px;
        }
        .desafio-titulo {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #3a2a1a;
            margin-bottom: 12px;
        }
        .desafio-descricao {
            text-align: center;
            color: #5d3a1a;
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.4;
        }
        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            margin: 5px;
        }
        .badge-success {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            color: white;
        }
        .badge-info {
            background: linear-gradient(135deg, #1565c0, #0d47a1);
            color: white;
        }
        .badge-warning {
            background: linear-gradient(135deg, #ff8f00, #ff6f00);
            color: white;
        }
        .dica {
            font-size: 12px;
            color: #8b4513;
            margin: 12px 0;
            background: #fef5e8;
            padding: 10px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-auth {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #8b4513, #b85e3a);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.4);
        }
        .btn-auth:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            background: white;
            border-radius: 32px;
            padding: 25px;
        }
        
        .upload-preview {
            margin: 20px 0;
            text-align: center;
        }
        .upload-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 16px;
            border: 2px solid #8b4513;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .ai-analysis {
            margin: 20px 0;
            padding: 15px;
            background: rgba(139, 69, 19, 0.05);
            border-radius: 16px;
            border: 1px solid #e0d5c8;
            font-size: 14px;
        }
        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #8b4513;
        }
        .success {
            color: #2e7d32;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .error {
            color: #f44336;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(139, 69, 19, 0.3);
            border-top-color: #8b4513;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        
        /* Header do Usuário */
        .user-header {
            background: linear-gradient(135deg, #2c5e2e, #1e3a1e);
            border-radius: 24px;
            padding: 20px 25px;
            margin-bottom: 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-avatar {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #2c5e2e;
        }
        .user-stats {
            display: flex;
            gap: 20px;
        }
        .user-stat {
            text-align: center;
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 40px;
        }
        .user-stat-value {
            font-size: 24px;
            font-weight: 800;
        }
        .user-stat-label {
            font-size: 11px;
            opacity: 0.8;
        }
        
        /* Toast de notificação */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c5e2e;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            animation: fadeInUp 0.3s ease;
        }
        
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
            .user-header {
                flex-direction: column;
                text-align: center;
            }
            .user-stats {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="desafios-container">
        <!-- Header do Usuário -->
        <div class="user-header">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">J</div>
                <div>
                    <h2 id="userName">João Silva</h2>
                    <p id="userLevel" style="font-size: 12px; opacity: 0.9;">🌳 EcoMestre</p>
                </div>
            </div>
            <div class="user-stats">
                <div class="user-stat">
                    <div class="user-stat-value" id="userPoints">2350</div>
                    <div class="user-stat-label">Pontos</div>
                </div>
                <div class="user-stat">
                    <div class="user-stat-value" id="userStreak">45</div>
                    <div class="user-stat-label">Streak 🔥</div>
                </div>
                <div class="user-stat">
                    <div class="user-stat-value" id="userDesafios">28</div>
                    <div class="user-stat-label">Desafios</div>
                </div>
            </div>
        </div>
        
        <h1 class="titulo-secao">🌱 Desafios Ambientais</h1>
        <div class="card-grid" id="desafiosContainer"></div>
    </div>
    
    <!-- Modal de Upload -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal-content" id="uploadContent"></div>
    </div>

    <script>
        // ========== DADOS DOS DESAFIOS ==========
        const desafios = [
            { id: 1, titulo: "♻️ Reciclar 10kg", descricao: "Recicle 10kg de materiais recicláveis", pontos: 200, icone: "♻️", tipo: "reciclagem", dica: "Tire foto dos materiais na balança" },
            { id: 2, titulo: "📅 Participar de Evento", descricao: "Participe de 1 evento ambiental", pontos: 150, icone: "📅", tipo: "evento", dica: "Tire foto no local do evento" },
            { id: 3, titulo: "🌳 Plantar Árvore", descricao: "Plante 1 árvore nativa", pontos: 300, icone: "🌳", tipo: "plantio", dica: "Tire foto da muda plantada" },
            { id: 4, titulo: "🔋 Descartar Pilhas", descricao: "Descarte 10 pilhas em ponto de coleta", pontos: 150, icone: "🔋", tipo: "pilhas", dica: "Tire foto das pilhas no ponto" },
            { id: 5, titulo: "🚲 Usar Bike 5x", descricao: "Use bicicleta em vez de carro 5 vezes", pontos: 250, icone: "🚲", tipo: "mobilidade", dica: "Compartilhe seu trajeto" },
            { id: 6, titulo: "🥫 Doar Alimentos", descricao: "Doe 10kg de alimentos não perecíveis", pontos: 280, icone: "🥫", tipo: "doacao", dica: "Foto dos alimentos no local" },
            { id: 7, titulo: "👕 Doar Roupas", descricao: "Doe 15 peças de roupa", pontos: 200, icone: "👕", tipo: "roupas", dica: "Foto das roupas doadas" },
            { id: 8, titulo: "💧 Economizar Água", descricao: "Reduza consumo em 20% por 1 mês", pontos: 400, icone: "💧", tipo: "agua", dica: "Compartilhe sua conta" },
            { id: 9, titulo: "⚡ Energia Solar", descricao: "Instale placa solar ou use energia limpa", pontos: 500, icone: "☀️", tipo: "energia", dica: "Foto da instalação" },
            { id: 10, titulo: "🌱 Compostagem", descricao: "Inicie uma composteira doméstica", pontos: 350, icone: "🌱", tipo: "compostagem", dica: "Foto da sua composteira" },
            { id: 11, titulo: "📚 Educador Ambiental", descricao: "Palestre sobre sustentabilidade", pontos: 450, icone: "📚", tipo: "educacao", dica: "Foto do evento" },
            { id: 12, titulo: "🏆 EcoLíder", descricao: "Convide 5 amigos para o app", pontos: 300, icone: "🏆", tipo: "social", dica: "Compartilhe seu código" }
        ];

        // ========== DADOS DO USUÁRIO ==========
        let usuarioLogado = {
            nome: "João Silva",
            pontos: 2350,
            nivel: "🌳 EcoMestre",
            streak: 45,
            desafios: 28
        };
        
        let desafioAtual = null;
        
        // ========== FUNÇÕES ==========
        function mostrarNotificacao(mensagem, tipo = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.innerHTML = `<i class="fas ${tipo === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${mensagem}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function atualizarHeader() {
            document.getElementById('userAvatar').innerHTML = usuarioLogado.nome.charAt(0).toUpperCase();
            document.getElementById('userName').innerHTML = usuarioLogado.nome;
            document.getElementById('userLevel').innerHTML = usuarioLogado.nivel;
            document.getElementById('userPoints').innerHTML = usuarioLogado.pontos;
            document.getElementById('userStreak').innerHTML = usuarioLogado.streak;
            document.getElementById('userDesafios').innerHTML = usuarioLogado.desafios;
        }
        
        function atualizarNivel(pontos) {
            if (pontos >= 5000) return "👑 Lenda Ambiental";
            if (pontos >= 3000) return "🏆 Mestre Eco";
            if (pontos >= 1500) return "🌳 Guardião da Natureza";
            if (pontos >= 500) return "🍃 EcoHerói";
            if (pontos >= 100) return "🌿 EcoAmigo";
            return "🌱 EcoIniciante";
        }
        
        function renderDesafios() {
            const container = document.getElementById('desafiosContainer');
            let html = '';
            
            desafios.forEach(desafio => {
                html += `
                    <div class="card-moderno">
                        <div class="desafio-icone">${desafio.icone}</div>
                        <h3 class="desafio-titulo">${desafio.titulo}</h3>
                        <p class="desafio-descricao">${desafio.descricao}</p>
                        <div style="text-align: center;">
                            <span class="badge badge-success">+${desafio.pontos} pontos</span>
                        </div>
                        <div class="dica">
                            <i class="fas fa-lightbulb"></i>
                            <span>${desafio.dica}</span>
                        </div>
                        <button class="btn-auth" onclick="abrirUpload(${desafio.id})">
                            <i class="fas fa-camera"></i> Comprovar
                        </button>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function abrirUpload(desafioId) {
            desafioAtual = desafios.find(d => d.id === desafioId);
            if (!desafioAtual) return;
            
            const modal = document.getElementById('uploadModal');
            const content = document.getElementById('uploadContent');
            
            content.innerHTML = `
                <div class="card-moderno" style="margin: 0; padding: 20px;">
                    <h2 style="margin-bottom: 15px; color: #8b4513;">📸 Comprovar: ${desafioAtual.titulo}</h2>
                    <div class="dica" style="background: #fff3e0; margin-bottom: 20px;">
                        <i class="fas fa-info-circle"></i>
                        <span>${desafioAtual.dica}</span>
                    </div>
                    <div class="upload-preview" id="uploadPreview"></div>
                    <div class="ai-analysis" id="aiAnalysis"></div>
                    <div style="border: 2px dashed #8b4513; border-radius: 20px; padding: 30px; text-align: center; margin: 20px 0; background: #fefaf5;">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 48px; color: #8b4513; margin-bottom: 10px;"></i>
                        <p style="color: #5d3a1a; margin-bottom: 10px;">Clique para selecionar uma imagem</p>
                        <input type="file" accept="image/*" id="uploadFile" style="margin-top: 10px;" onchange="analisarImagem(this)">
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button class="btn-auth" onclick="confirmarUpload()" id="btnConfirmarUpload" disabled style="flex: 1;">
                            <i class="fas fa-paper-plane"></i> Enviar comprovante
                        </button>
                        <button class="btn-auth" onclick="fecharModal()" style="background: #666; flex: 0.5;">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                    </div>
                </div>
            `;
            
            modal.classList.add('active');
        }
        
        function analisarImagem(input) {
            const file = input.files[0];
            if (!file) return;
            
            const preview = document.getElementById('uploadPreview');
            const aiAnalysis = document.getElementById('aiAnalysis');
            const btnConfirmar = document.getElementById('btnConfirmarUpload');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                
                aiAnalysis.innerHTML = `
                    <div class="loading">
                        <span class="spinner"></span> Analisando imagem com IA...
                    </div>
                `;
                btnConfirmar.disabled = true;
                
                setTimeout(() => {
                    const tipo = desafioAtual.tipo;
                    let analise = '';
                    let valido = false;
                    
                    switch(tipo) {
                        case 'reciclagem':
                            analise = `<div class="success"><i class="fas fa-check-circle"></i> Imagem validada! Materiais recicláveis identificados (plástico, papel, metal). Aproximadamente 12kg detectados.</div>`;
                            valido = true;
                            break;
                        case 'plantio':
                            analise = `<div class="success"><i class="fas fa-check-circle"></i> Imagem validada! Muda de árvore nativa identificada. Espécie: Ipê-amarelo.</div>`;
                            valido = true;
                            break;
                        case 'pilhas':
                            analise = `<div class="success"><i class="fas fa-check-circle"></i> Imagem validada! 12 pilhas identificadas no ponto de coleta.</div>`;
                            valido = true;
                            break;
                        case 'mobilidade':
                            analise = `<div class="success"><i class="fas fa-check-circle"></i> Imagem validada! Aplicativo de tracking mostra trajeto de 5km de bicicleta.</div>`;
                            valido = true;
                            break;
                        case 'doacao':
                        case 'roupas':
                            analise = `<div class="success"><i class="fas fa-check-circle"></i> Imagem validada! Itens identificados no local de doação.</div>`;
                            valido = true;
                            break;
                        default:
                            analise = `<div class="success"><i class="fas fa-check-circle"></i> Imagem validada! Comprovante aceito.</div>`;
                            valido = true;
                    }
                    
                    aiAnalysis.innerHTML = analise;
                    if (valido) btnConfirmar.disabled = false;
                    else aiAnalysis.innerHTML = `<div class="error"><i class="fas fa-exclamation-circle"></i> Imagem não reconhecida. Tente novamente com uma foto mais clara.</div>`;
                }, 2000);
            };
            reader.readAsDataURL(file);
        }
        
        function confirmarUpload() {
            const fileInput = document.getElementById('uploadFile');
            if (!fileInput || !fileInput.files[0]) {
                mostrarNotificacao('Por favor, selecione uma imagem!', 'error');
                return;
            }
            
            const novosPontos = usuarioLogado.pontos + desafioAtual.pontos;
            usuarioLogado.pontos = novosPontos;
            usuarioLogado.desafios += 1;
            usuarioLogado.nivel = atualizarNivel(novosPontos);
            
            atualizarHeader();
            mostrarNotificacao(`✅ Comprovante validado! Você ganhou ${desafioAtual.pontos} pontos!`);
            fecharModal();
            renderDesafios();
        }
        
        function fecharModal() {
            document.getElementById('uploadModal').classList.remove('active');
            desafioAtual = null;
        }
        
        // Inicializar
        renderDesafios();
        atualizarHeader();
        
        // Expor funções globalmente
        window.abrirUpload = abrirUpload;
        window.analisarImagem = analisarImagem;
        window.confirmarUpload = confirmarUpload;
        window.fecharModal = fecharModal;
    </script>
</body>
</html>
