<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SustentaPira · Perfil do Usuário</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #faf8f5; color: #2c3e2f; min-height: 100vh; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        
        /* Perfil Container */
        .perfil-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        /* Hero Section */
        .profile-hero {
            background: linear-gradient(135deg, #2c5e2e, #1e3a1e);
            border-radius: 32px;
            padding: 40px;
            margin-bottom: 30px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .profile-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        .profile-hero-content {
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }
        .profile-avatar-large {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #2c5e2e;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .profile-stats-hero {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .stat-hero-item {
            text-align: center;
        }
        .stat-hero-value {
            font-size: 32px;
            font-weight: 800;
        }
        .stat-hero-label {
            font-size: 12px;
            opacity: 0.8;
        }
        
        /* Level Card */
        .level-card {
            background: linear-gradient(135deg, #fff, #faf5f0);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .level-title {
            font-size: 20px;
            font-weight: 700;
            color: #8b4513;
            margin-bottom: 15px;
        }
        .progress-bar-premium {
            background: #e8e0d5;
            border-radius: 20px;
            height: 12px;
            overflow: hidden;
        }
        .progress-fill-premium {
            background: linear-gradient(90deg, #8b4513, #b85e3a);
            height: 100%;
            border-radius: 20px;
            transition: width 0.5s;
        }
        
        /* Stats Grid */
        .stats-grid-premium {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card-premium {
            background: white;
            padding: 25px 20px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(139,69,19,0.1);
            transition: all 0.3s;
        }
        .stat-card-premium:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .stat-icon-premium {
            font-size: 40px;
            color: #8b4513;
            margin-bottom: 10px;
        }
        .stat-number-premium {
            font-size: 32px;
            font-weight: 800;
            color: #2c3e2f;
        }
        
        /* Conquistas */
        .conquistas-grid-premium {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }
        .conquista-card-premium {
            background: linear-gradient(135deg, #fff, #faf5f0);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid #e0d5c8;
            position: relative;
            overflow: hidden;
        }
        .conquista-card-premium::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #FFD700, #FFA500);
        }
        .conquista-card-premium.locked {
            opacity: 0.6;
            filter: grayscale(0.3);
        }
        .conquista-card-premium.locked::before {
            background: #aaa;
        }
        .conquista-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        /* Atividades */
        .atividade-timeline {
            margin-top: 30px;
        }
        .atividade-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid #f0e8e0;
        }
        .atividade-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #f5f0e8, #e8e0d5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #8b4513;
        }
        
        /* Badges */
        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            margin: 5px;
        }
        .badge-success {
            background: #2e7d32;
            color: white;
        }
        .titulo-secao {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #2c5e2e, #8b4513);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            display: inline-block;
        }
        .titulo-secao::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #8b4513, #b85e3a);
            border-radius: 2px;
        }
        
        @media (max-width: 768px) {
            .stats-grid-premium {
                grid-template-columns: repeat(2, 1fr);
            }
            .profile-hero-content {
                flex-direction: column;
                text-align: center;
            }
            .profile-stats-hero {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="perfil-container">
        <h1 class="titulo-secao">👤 Meu Perfil</h1>
        
        <!-- Hero Section -->
        <div class="profile-hero">
            <div class="profile-hero-content">
                <div class="profile-avatar-large" id="avatarLetter">J</div>
                <div>
                    <h2 style="font-size:28px;" id="userName">João Silva</h2>
                    <div class="profile-level" style="background:#ffd966; display:inline-block; padding:4px 16px; border-radius:30px; color:#8b4513;" id="userLevel">🌳 EcoMestre</div>
                    <p style="margin-top:8px;"><i class="fas fa-calendar"></i> Membro desde <span id="userSince">Janeiro 2025</span></p>
                </div>
            </div>
            <div class="profile-stats-hero">
                <div class="stat-hero-item"><div class="stat-hero-value" id="userPoints">2350</div><div class="stat-hero-label">Pontos</div></div>
                <div class="stat-hero-item"><div class="stat-hero-value" id="userStreak">45</div><div class="stat-hero-label">Streak 🔥</div></div>
                <div class="stat-hero-item"><div class="stat-hero-value" id="userDesafios">28</div><div class="stat-hero-label">Desafios</div></div>
                <div class="stat-hero-item"><div class="stat-hero-value" id="conquistasCount">3</div><div class="stat-hero-label">Conquistas</div></div>
            </div>
        </div>
        
        <!-- Level Card -->
        <div class="level-card">
            <div class="level-title"><i class="fas fa-chart-line"></i> Progresso para Próximo Nível</div>
            <div class="progress-bar-premium">
                <div class="progress-fill-premium" id="progressBar" style="width: 47%;"></div>
            </div>
            <div style="display:flex; justify-content:space-between; margin-top:10px;">
                <span id="currentLevel">🌳 EcoMestre</span>
                <span id="nextLevel">🏆 EcoHerói</span>
            </div>
            <p style="margin-top:15px;"><i class="fas fa-arrow-up"></i> Faltam <span id="pontosFaltam">2650</span> pontos para o próximo nível</p>
        </div>
        
        <!-- Stats Grid -->
        <div class="stats-grid-premium">
            <div class="stat-card-premium">
                <div class="stat-icon-premium"><i class="fas fa-calendar-check"></i></div>
                <div class="stat-number-premium" id="eventosCount">0</div>
                <div>Eventos</div>
            </div>
            <div class="stat-card-premium">
                <div class="stat-icon-premium"><i class="fas fa-leaf"></i></div>
                <div class="stat-number-premium" id="desafiosCount">28</div>
                <div>Desafios</div>
            </div>
            <div class="stat-card-premium">
                <div class="stat-icon-premium"><i class="fas fa-fire"></i></div>
                <div class="stat-number-premium" id="streakCount">45</div>
                <div>Streak</div>
            </div>
            <div class="stat-card-premium">
                <div class="stat-icon-premium"><i class="fas fa-trophy"></i></div>
                <div class="stat-number-premium" id="rankingPosition">#4</div>
                <div>Ranking</div>
            </div>
        </div>
        
        <!-- Conquistas -->
        <h3><i class="fas fa-medal"></i> Conquistas (<span id="conquistasDesbloqueadas">3</span>/<span id="totalConquistas">8</span>)</h3>
        <div class="conquistas-grid-premium" id="conquistasContainer"></div>
        
        <!-- Atividades Recentes -->
        <h3 style="margin-top:30px;"><i class="fas fa-history"></i> Atividade Recente</h3>
        <div class="atividade-timeline" id="atividadesContainer"></div>
    </div>

    <script>
        // Dados do usuário (exemplo - podem ser carregados dinamicamente)
        const usuario = {
            nome: "João Silva",
            pontos: 2350,
            nivel: "🌳 EcoMestre",
            streak: 45,
            desafios: 28,
            conquistas: ["🌱 Primeiro passo", "♻️ Reciclador", "🌳 Plantador"],
            dataCadastro: "15/01/2025"
        };
        
        // Configurações de conquistas
        const todasConquistas = [
            { nome: "🌱 Primeiro Passo", icone: "🌱", desc: "Complete seu primeiro desafio", desbloqueado: true },
            { nome: "♻️ Mestre da Reciclagem", icone: "♻️", desc: "Recicle 50kg de materiais", desbloqueado: usuario.pontos >= 500 },
            { nome: "🌳 Guardião das Árvores", icone: "🌳", desc: "Plante 10 árvores", desbloqueado: usuario.pontos >= 1000 },
            { nome: "📅 Eventos Expert", icone: "📅", desc: "Participe de 5 eventos", desbloqueado: usuario.pontos >= 800 },
            { nome: "🔥 Streak 30", icone: "🔥", desc: "Mantenha streak por 30 dias", desbloqueado: usuario.streak >= 30 },
            { nome: "🏆 Top 10", icone: "🏆", desc: "Fique entre os 10 do ranking", desbloqueado: usuario.pontos >= 2000 },
            { nome: "💧 Protetor das Águas", icone: "💧", desc: "Economize 1000L de água", desbloqueado: usuario.pontos >= 1500 },
            { nome: "👑 Lenda Ambiental", icone: "👑", desc: "Atinga 5000 pontos", desbloqueado: usuario.pontos >= 5000 }
        ];
        
        // Atividades recentes
        const atividades = [
            { icone: "♻️", nome: "Reciclagem", pontos: "+200", data: "Hoje" },
            { icone: "🌳", nome: "Plantio de Árvore", pontos: "+300", data: "Ontem" },
            { icone: "📅", nome: "Mutirão de Limpeza", pontos: "+150", data: "3 dias atrás" }
        ];
        
        // Função para atualizar os dados do perfil
        function atualizarPerfil() {
            // Dados básicos
            document.getElementById('avatarLetter').innerHTML = usuario.nome.charAt(0).toUpperCase();
            document.getElementById('userName').innerHTML = usuario.nome;
            document.getElementById('userLevel').innerHTML = usuario.nivel;
            document.getElementById('userPoints').innerHTML = usuario.pontos;
            document.getElementById('userStreak').innerHTML = usuario.streak;
            document.getElementById('userDesafios').innerHTML = usuario.desafios;
            document.getElementById('userSince').innerHTML = usuario.dataCadastro;
            
            // Progresso
            const progresso = Math.min(100, (usuario.pontos / 5000) * 100);
            document.getElementById('progressBar').style.width = progresso + '%';
            document.getElementById('currentLevel').innerHTML = usuario.nivel;
            document.getElementById('nextLevel').innerHTML = usuario.pontos >= 5000 ? "Nível Máximo" : "🏆 EcoHerói";
            document.getElementById('pontosFaltam').innerHTML = 5000 - usuario.pontos;
            
            // Stats
            document.getElementById('desafiosCount').innerHTML = usuario.desafios;
            document.getElementById('streakCount').innerHTML = usuario.streak;
            document.getElementById('rankingPosition').innerHTML = '#4';
            
            // Conquistas
            const desbloqueadas = todasConquistas.filter(c => c.desbloqueado).length;
            document.getElementById('conquistasCount').innerHTML = desbloqueadas;
            document.getElementById('conquistasDesbloqueadas').innerHTML = desbloqueadas;
            document.getElementById('totalConquistas').innerHTML = todasConquistas.length;
            
            let conquistasHtml = '';
            todasConquistas.forEach(c => {
                conquistasHtml += `<div class="conquista-card-premium ${!c.desbloqueado ? 'locked' : ''}">
                    <div class="conquista-icon">${c.icone}</div>
                    <div><strong>${c.nome}</strong></div>
                    <div style="font-size:12px; color:#666;">${c.desc}</div>
                    ${c.desbloqueado ? '<span class="badge badge-success" style="margin-top:10px;">Desbloqueado</span>' : '<span class="badge" style="background:#aaa; margin-top:10px;">Bloqueado</span>'}
                </div>`;
            });
            document.getElementById('conquistasContainer').innerHTML = conquistasHtml;
            
            // Atividades
            let atividadesHtml = '';
            atividades.forEach(a => {
                atividadesHtml += `<div class="atividade-item">
                    <div class="atividade-icon">${a.icone}</div>
                    <div style="flex:1;"><strong>${a.nome}</strong><div style="font-size:12px; color:#8b4513;">${a.data}</div></div>
                    <div style="font-weight:700; color:#2e7d32;">${a.pontos}</div>
                </div>`;
            });
            document.getElementById('atividadesContainer').innerHTML = atividadesHtml;
        }
        
        // Função para editar perfil (exemplo)
        function editarPerfil() {
            const novoNome = prompt("Digite seu novo nome:", usuario.nome);
            if (novoNome && novoNome.trim()) {
                usuario.nome = novoNome.trim();
                atualizarPerfil();
                alert("Nome atualizado com sucesso!");
            }
        }
        
        // Adicionar evento de clique no avatar para editar
        document.querySelector('.profile-avatar-large').style.cursor = 'pointer';
        document.querySelector('.profile-avatar-large').onclick = editarPerfil;
        
        // Inicializar perfil
        atualizarPerfil();
    </script>
</body>
</html>
